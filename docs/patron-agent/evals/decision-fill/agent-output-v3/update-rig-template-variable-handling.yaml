    principles: [32, 21]
    reasoning: "$vars.role pressure-tests cleanly across prose, code, and log lines (principle #32); $variables is just longer without carrying more meaning. Weak preference — both are noun-like (#21)."
  - id: D2
    selected: a
    confidence: high
    principles: [9, 3]
    reasoning: "Spider apparatus owns its own contribution contract (#9) — template variables are consumed by the spider engine, so they belong in SpiderConfig. Extends the existing config surface rather than inventing a sibling (#3)."

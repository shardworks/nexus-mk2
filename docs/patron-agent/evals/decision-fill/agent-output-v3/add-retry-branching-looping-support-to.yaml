decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [32, 33]
    reasoning: "`when` reads naturally in prose, TS, config, and log lines (principle #32); `if` carries programmer-control-flow register that mismatches the declarative template concept (principle #33)."
  - id: D2
    selected: a
    confidence: medium
    principles: [7, 18]
    reasoning: "Ergonomics for tool authors (principle #7) favors the terse string form over a structured object; no second consumer yet demands richer expressions (principle #18), so defer structure until earned."
  - id: D3
    selected: a
    confidence: high
    principles: [30, 2]
    reasoning: "Skipped (condition-false, never ran) and cancelled (explicitly ended by failure cascade) are a dimensional split (principle #30); collapsing them would hide the distinction the observer needs (principle #2)."
  - id: D4
    selected: b
    confidence: high
    principles: [16]
    reasoning: "The `when` expression consumes yields the upstream engines are supposed to produce; evaluating at spawn would require passing in what hasn't been produced yet (principle #16). Runtime is forced."
  - id: D5
    selected: a
    confidence: medium
    principles: [3, 4]
    reasoning: "`tryRun` already answers 'what's the next runnable engine' — extending it to also short-circuit on a false `when` reuses the existing API (principle #3) and keeps the crawl loop a single pass (principle #4)."
  - id: D6
    selected: a
    confidence: medium
    principles: [17, 30]
    reasoning: "`skipped` is a form of 'done' and slots into the existing upstream-satisfied concept (principle #17); cascading is a separate dimension from upstream-satisfaction (principle #30) and the author can express cascade intent with their own `when`."
  - id: D7
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Requiring at-least-one completed keeps 'rig completed' honest (principle #2); option (b) would mark a rig where every engine failed as complete, breaking the meaning of the status."
  - id: D8
    selected: a
    confidence: high
    principles: [30, 20, 13]
    reasoning: "Skipped and completed are different events observers need to distinguish (principle #30); a distinct CrawlResult variant is structural state, not log spew (principle #20); this is the first live writer of the skipped-action slot and sets precedent (principle #13)."
  - id: D9
    selected: a
    confidence: medium
    principles: [3, 4]
    reasoning: "engine-completed already triggers rig completion/blocked checks; engine-skipped should symmetrically extend the same API (principle #3) in a single pass (principle #4)."
  - id: D10
    selected: a
    confidence: high
    principles: [6, 17]
    reasoning: "Stuffing `when` into givensSpec bakes an activation-logic specific into the generic data-givens vocabulary (principle #6); a dedicated field routes through the concept it actually represents (principle #17)."
  - id: D11
    selected: a
    confidence: medium
    principles: [7]
    reasoning: "Truthiness + `!` prefix is the ergonomic DSL idiom (principle #7) and aligns with the skipped-upstream-is-undefined-is-falsy semantic needed for D13; strict-compare would force an explicit-boolean-only contract that leaks into authoring overhead."
  - id: D12
    selected: a
    confidence: high
    principles: [12, 2, 31]
    reasoning: "Full upstream-reachability validation at startup is a framework guarantee (principle #12), fails loud at the earliest moment (principle #2), and fixes bad templates at source rather than compensating downstream (principle #31)."
  - id: D13
    selected: a
    confidence: medium
    principles: [7, 16]
    reasoning: "The whole point of branching is to react to whether an upstream ran; failing on a skipped upstream's missing yield defeats the pattern (principle #7). Downstream legitimately reads the absence as a signal, not as an error (principle #16)."
  - id: D14
    selected: a
    confidence: high
    principles: [3]
    reasoning: "Follows from D10(a) and D18(a): `when` is a field on both template and instance, so `buildFromTemplate()` extends the existing mapping (principle #3)."
  - id: D15
    selected: a
    confidence: high
    principles: [3, 17]
    reasoning: "Follows from D6(a): `skipped` counts as done for upstream-satisfaction, so the existing check extends to accept it (principles #3, #17)."

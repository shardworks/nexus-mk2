decisions:
  - id: D1
    selected: a
    confidence: medium
    principles: [21]
    reasoning: "Parallel arrays (option b) couple two collections by index — an alignment-bug anti-pattern. Record keyed by id gives direct lookup and reads id-as-noun (#21)."
  - id: D2
    selected: a
    confidence: high
    principles: [2, 15]
    reasoning: "Discriminated unions fail loud (#2) on unhandled types and hold a hard line on the contract shape (#15); a single interface with optional fields permits invalid combinations."
  - id: D3
    selected: a
    confidence: medium
    principles: [17, 18]
    reasoning: "The QuestionSpec already carries the type — wrapping answers again duplicates that distinction (#17). No second consumer earns the extra wrapper shape (#18)."
  - id: D4
    selected: a
    confidence: medium
    principles: [3, 32]
    reasoning: "'ir' matches the 'rig' short-prefix convention already in use (#3). Survives log-line reading (#32) if terse, whereas 'req' is too generic to identify the subsystem."
  - id: D5
    selected: a
    confidence: medium
    principles: [3]
    reasoning: "Match the rigs convention (generateId('rig', 4)) — sibling scoping structures should mint IDs the same way (#3)."
  - id: D6
    selected: b
    confidence: high
    principles: [18]
    reasoning: "Indexes for queries that don't yet exist are speculative structure — earn them from a second consumer (#18). Checker only needs get() by id."
  - id: D7
    selected: a
    confidence: medium
    principles: [3, 18]
    reasoning: "Extend existing types.ts (#3); a new file is speculative structure without a second reason to split (#18)."
  - id: D8
    selected: b
    confidence: medium
    principles: [18]
    reasoning: "No named consumer distinguishes a request-level message from the question labels themselves (#18) — don't add a field on speculation."
  - id: D9
    selected: a
    confidence: medium
    principles: [3]
    reasoning: "Match the writ-status.ts precedent (#3) — stateless per-call access keeps the checker contract shape consistent with sibling checkers."
  - id: D10
    selected: a
    confidence: medium
    principles: [2]
    reasoning: "Primary-key get() is the honest operation; find() with a where-clause for a known id obscures intent. get() fails cleanly (#2) on missing."
  - id: D11
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Missing document is a real failure — fail loud (#2) rather than silently treating it as pending and stalling."
  - id: D12
    selected: b
    confidence: medium
    principles: [2, 12]
    reasoning: "Making rejectionReason required turns the field into a framework-level guarantee (#12) instead of a hopeful convention, and fails loud (#2) when a rejector forgets to say why."
  - id: D13
    selected: a
    confidence: medium
    principles: [2]
    reasoning: "Least-privilege access — the checker is read-only by role, so grant read-only capability (#2). Writable handle would quietly mask a mistaken write."
  - id: D14
    selected: a
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "No principle in the list speaks to field ordering inside an interface. Picked (a) because the broader-container-first reading is marginally more conventional."
  - id: D15
    selected: b
    confidence: high
    principles: [6, 8]
    reasoning: "The generic EngineRunContext field shouldn't name a specific downstream use case like 'input requests' (#6, #8) — the JSDoc should describe what the field is, not what one consumer does with it."
  - id: D16
    selected: a
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "No principle decides whether tryCollect() needs rigId — it's an implementation-correctness question. Picked (a) to minimize drift if either call site ever needs the field."
  - id: D17
    selected: a
    confidence: medium
    principles: [25, 32]
    reasoning: "'input-request' names the concrete noun (#25); 'input-list' is a category-name and ambiguous in a log line (#32). 'patron-input' prefixes by block-type which bakes a consumer concept into the tool name."
  - id: D18
    selected: c
    confidence: low
    principles: [2]
    reasoning: "Symmetric 'spider:read'/'spider:write' scoping reads as cleanest least-privilege (#2); a bare 'read' permission conflates reads across plugins. No principle fires hard here."
  - id: D19
    selected: a
    confidence: medium
    principles: [2, 32]
    reasoning: "Mutually exclusive --select/--custom flags fail loud (#2) when misused and each reads cleanly in CLI form (#32); prefix conventions inside a single param obscure intent."
  - id: D20
    selected: a
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "No principle decides between --value true|false and --yes/--no. Picked (a) because a uniform --value param composes with text-type answers too."
  - id: D21
    selected: a
    confidence: high
    principles: [18, 31]
    reasoning: "Two named consumers (answer + complete tools) earn the shared function (#18); centralizing validation fixes drift at the source rather than at each consumer (#31)."
  - id: D22
    selected: a
    confidence: medium
    principles: [18]
    reasoning: "Validation logic is not a type; keeping it out of types.ts preserves the type file's role, and a dedicated module is earned by the two named consumers (#18)."
  - id: D23
    selected: a
    confidence: medium
    principles: [3, 18]
    reasoning: "Consistency with the checker's direct-apparatus pattern (#3, per D9); wrapping in SpiderApi adds a pass-through layer unearned by a second consumer (#18)."
  - id: D24
    selected: a
    confidence: high
    principles: [22, 23]
    reasoning: "Named reader is the patron; the decision is 'what needs my answer?' — default filter serves that question (#22, #23). --status flag still exposed for the rare wider view."
  - id: D25
    selected: b
    confidence: medium
    principles: [3]
    reasoning: "Match the rig-resume response shape (#3) — sibling write tools should return the same minimal contract."
  - id: D26
    selected: a
    confidence: medium
    principles: [2]
    reasoning: "Throwing with the list of unanswered keys is the loud failure (#2); a returned error object can be silently ignored by a caller."
  - id: D27
    selected: a
    confidence: high
    principles: [3]
    reasoning: "Brief already specifies rejection at any point — extend per the existing contract (#3), not a narrower variant."
  - id: D28
    selected: a
    confidence: high
    principles: [2, 12]
    reasoning: "Terminal states must be terminal; enforce the guard in code (#12), and throwing on non-pending mutation fails loud (#2)."
  - id: D29
    selected: a
    confidence: high
    principles: [29]
    reasoning: "Amendment beats re-entry (#29) — the patron revising an answer before completing should not require tearing the request down and starting over."
  - id: D30
    selected: b
    confidence: high
    principles: [8, 12]
    reasoning: "Patron tools are not for animas; restrict exposure at the framework layer (#12) rather than relying on the anima to avoid them. Framework needn't expose what no downstream consumer of 'anima' needs (#8)."
  - id: D31
    selected: a
    confidence: medium
    principles: [18, 23]
    reasoning: "Adding a YAML dependency is speculative weight (#18) for an MVP slice (#23) — JSON hits the same need with zero new infrastructure."
  - id: D32
    selected: a
    confidence: medium
    principles: [7, 32]
    reasoning: "Two verbs read cleanly in CLI form (#32) and match author ergonomics (#7); a single tool with a mode flag braids two operations into one name."
  - id: D33
    selected: a
    confidence: medium
    principles: [7]
    reasoning: "Stdout is composable — piping to a file, grep, or another tool is free (#7); a mandatory file-path param forecloses that."
  - id: D34
    selected: c
    confidence: medium
    principles: [22]
    reasoning: "Re-import needs a target — the request id must survive the round trip (#22, named consumer: the import tool); full metadata is extra, questions-only loses the routing."
  - id: D35
    selected: a
    confidence: high
    principles: [2, 31]
    reasoning: "Same validation at every entry point — a single source of truth (#31) that fails loud on bad input (#2). Trusting YAML contents hides the exact class of error validation exists to catch."
  - id: D36
    selected: b
    confidence: medium
    principles: [7]
    reasoning: "String param composes with stdout export (per D33-a): `export | edit | import` becomes a clean pipeline (#7). File path forces a detour through disk."
  - id: D37
    selected: b
    confidence: medium
    principles: [18]
    reasoning: "No spider core logic accesses the input-requests book directly (checker and tools both use inline apparatus access per D9 / D23) — a module-level handle is structure without a consumer (#18)."
  - id: D38
    selected: a
    confidence: low
    principles: [3]
    reasoning: "Match existing block-type import pattern (#3) — if a barrel file is the established convention for block-types, extend it; weak principle without seeing the code."
  - id: D39
    selected: a
    confidence: medium
    principles: [31]
    reasoning: "Fix the source (#31) — if the Spider assembles the context, tests that receive it don't need per-site changes. Grep-and-patch is downstream compensation for an upstream change."
  - id: D40
    selected: a
    confidence: low
    principles: [3]
    reasoning: "Extend existing test file alongside the other block-type tests (#3) for locality with related tests. No strong principle on test-file splitting."
  - id: D41
    selected: a
    confidence: medium
    principles: [2, 31]
    reasoning: "Direct unit tests on the validation module catch regressions at the source (#31) and fail loud (#2); indirect testing through handlers obscures which layer broke."
  - id: D42
    selected: a
    confidence: medium
    principles: [3, 18]
    reasoning: "patron-input is a built-in block type — the standard blocking fixture should cover it (#3); a separate helper is extra structure unearned by a second consumer (#18)."

decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [3]
    reasoning: "Principle #3 (extend existing API): KitEntry is a sibling of Kit/Apparatus/StartupContext — the neighborhood already exists in plugin.ts."
  - id: D2
    selected: c
    confidence: medium
    principles: [6, 15]
    reasoning: "consumes is a consumer-declaration, not a contribution; collecting it into KitEntry conflates contract boundaries (#15). Books are genuine contributions (see D29), so they belong in. #6 warns against baking framework-declaration fields into the generic contribution index."
  - id: D3
    selected: a
    confidence: medium
    principles: [12]
    reasoning: "Pure function in guild-lifecycle.ts is testable and keeps arbor.ts from accumulating inline logic — #12 (framework guarantees) favors extracted, exercisable units."
  - id: D4
    selected: a
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "No principle speaks to iteration order per se; picked (a) because standalone kits have no dependency graph and apparatuses do, so the topo-ordered batch runs last as the stabler precedent."
  - id: D5
    selected: b
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "No principle adjudicates singleton-vs-wire ordering cleanly. Picked (b) so guild() is available to any observer during Wire, at modest risk of earlier side-effects seeing an un-wired guild."
  - id: D6
    selected: b
    confidence: high
    principles: [1, 10]
    reasoning: "#1 (remove when removal works) and #10 (no legacy in new stuff): dead-code event firing for kits has no consumer; kill it rather than preserve for symmetry."
  - id: D7
    selected: a
    confidence: high
    principles: [13, 15]
    reasoning: "#13 (first live writer sets precedent): g.kits()/g.apparatuses() already return snapshot copies. #15 (hard lines on contracts): a shared mutable array across consumers is a future reconciliation bug."
  - id: D8
    selected: b
    confidence: medium
    principles: [18, 23]
    reasoning: "#18 (earn structure from a second consumer) and #23 (thinnest slice): plugin counts are small; a flat array with on-demand filter is the smaller thing. Promote to Map if a perf consumer ever earns it."
  - id: D9
    selected: a
    confidence: medium
    principles: []
    no_principle_fired: true
    reasoning: "Fail-loud (#2) would reject legitimate 'no contributions of this type yet' queries as if they were typos. Empty array is the honest answer; TypeScript typing catches typos upstream."
  - id: D10
    selected: a
    confidence: medium
    principles: [18, 23]
    reasoning: "#18/#23: one mutable list pushed-to as starts complete is the thinnest slice. Two-structure (ordered + started-set + filter) adds structure without a named consumer."
  - id: D11
    selected: a
    confidence: medium
    principles: [2]
    reasoning: "If the event's name is 'started', g.apparatuses() must already reflect that — otherwise handlers see a contradiction. Ordering-as-truth aligns with #2 (no silent inconsistency)."
  - id: D12
    selected: a
    confidence: high
    principles: [2, 10]
    reasoning: "#2 (fail loud) + #10 (no legacy): warn at registration time — the developer's own code line is the actionable locus. Per-fire warnings spam; warn-once-on-fire is too easy to miss."
  - id: D13
    selected: b
    confidence: medium
    principles: [10, 18]
    reasoning: "Replay semantics only exist because ctx.kits() didn't. Now that the snapshot is available synchronously, #10 (no legacy) and #18 (don't preserve retroactive-fire as speculation) favor forward-only event semantics."
  - id: D14
    selected: a
    confidence: medium
    principles: [18]
    reasoning: "#18: a new typed object (c) invents structure with no second consumer. LoadedApparatus is already what existing handlers expect; keeping it eases the deprecation overlap."
  - id: D15
    selected: a
    confidence: medium
    principles: [10]
    reasoning: "#10 (no legacy in new stuff): new name is canonical, so it fires first. Old handlers see a consistent world (the apparatus:started side-effects already ran)."
  - id: D16
    selected: a
    confidence: medium
    principles: []
    no_principle_fired: true
    reasoning: "Semantic correctness: phase:started means the phase is complete, including each apparatus's own start event. No principle directly fires; picked (a) for coherent phase-completion semantics."
  - id: D17
    selected: a
    confidence: medium
    principles: [16]
    reasoning: "#16: guild() is already available via the singleton — don't pass what the downstream can produce/access itself."
  - id: D18
    selected: a
    confidence: high
    principles: [1, 10]
    reasoning: "#1/#10: Wire collects all tool contributions before any start(); the event-subscription path is now redundant and should be removed, not preserved in parallel."
  - id: D19
    selected: a
    confidence: medium
    principles: [1, 10]
    reasoning: "#1 (remove when removal works): the scan/subscribe pattern is gone. Two inline ctx.kits() loops are legible and don't earn a new helper."
  - id: D20
    selected: a
    confidence: high
    principles: [1, 10]
    reasoning: "#1/#10: Wire now collects Instrumentarium's own supportKit tools. Self-registration would be duplication preserved-for-symmetry."
  - id: D21
    selected: a
    confidence: medium
    principles: [3, 15]
    reasoning: "#15: synthetic LoadedPlugin is wrong-shape; KitEntry is the honest input. #3: registerFromEntry is a natural extension of ToolRegistry rather than a sidecar."
  - id: D22
    selected: a
    confidence: high
    principles: [1, 10]
    reasoning: "#1/#10: EngineRegistry.register(plugin) has no remaining caller after the refactor; keeping it is legacy-for-symmetry."
  - id: D23
    selected: a
    confidence: medium
    principles: [18]
    reasoning: "#18: requires/recommends are genuinely kit-level metadata; they don't naturally live on supportKit entries. Looking up g.kits() when present and defaulting to the owning pluginId for supportKit is the thinnest honest answer."
  - id: D24
    selected: b
    confidence: medium
    principles: [5]
    reasoning: "#5 (object-shaped boundaries): pass the entry — one parameter that carries the structure — rather than destructuring it at every callsite."
  - id: D25
    selected: a
    confidence: medium
    principles: [3]
    reasoning: "#3: buildDesignSourceMap is a named abstraction with a stable purpose; adapting its input type is extension. Inlining is only warranted if the function is trivial, which the name implies it isn't."
  - id: D26
    selected: b
    confidence: high
    principles: [15]
    reasoning: "#15: constructing a synthetic LoadedPlugin to satisfy a legacy signature is precisely the kind of contract-laundering the principle forbids. Change the type to KitEntry."
  - id: D27
    selected: a
    confidence: high
    principles: [1, 10]
    reasoning: "#1/#10: with all contributions wired pre-start, incremental late-arrival validation has no triggering case. Remove the subscription; don't keep it as scaffolding for a pattern the refactor eliminates."
  - id: D28
    selected: a
    confidence: medium
    principles: [5]
    reasoning: "#5: KitEntry is the object-shaped carrier. Passing entry.value into a function still typed as 'kit' keeps a stale contract on life support."
  - id: D29
    selected: a
    confidence: high
    principles: [3, 15]
    reasoning: "#3 + #15: ctx.kits() is the unified contribution mechanism introduced by this refactor; private sidecars (b) or pre-singleton peeks (c) are precisely the contract-violations #15 guards against."
  - id: D30
    selected: a
    confidence: high
    principles: [1, 10]
    reasoning: "#1/#10: a parallel reconcileFromEntries alongside reconcileSchemas is the classic deprecation-fork that the principle list rejects. Change the one method."
  - id: D31
    selected: a
    confidence: high
    principles: [3, 16]
    reasoning: "#3: start(ctx) already receives StartupContext — use it. #16: reaching outside the component to pass KitEntry[] via closure passes what the downstream itself could pull via ctx.kits()."
  - id: D32

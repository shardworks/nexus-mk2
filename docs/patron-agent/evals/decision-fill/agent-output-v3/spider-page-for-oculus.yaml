decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [11, 9]
    reasoning: "Spider contributes a page when Oculus is present and skips when unset — textbook #11 (skip-when-unset over framework defaults). #9 also fires: spider shouldn't hard-require the companion apparatus."
  - id: D2
    selected: a
    confidence: high
    principles: [15, 3]
    reasoning: "Forking the shape inline is exactly the cross-component drift #15 warns against; #3 says extend the existing (imported) contract rather than route around it. Types erase at runtime, so the soft runtime dep isn't compromised."
  - id: D3
    selected: a
    confidence: medium
    principles: [2, 15]
    reasoning: "Typing handlers as unknown is a silent-fallback (#2) that hides contract mismatches; #15 wants the hard line on the handler shape. Hono is already transitively present via Oculus."
  - id: D4
    selected: b
    confidence: medium
    principles: [13, 25, 34]
    reasoning: "#13 locks the id to 'spider' to match the already-precedent-setting status.spider plugin-id slot; #34 + #25 want the user-facing title to read as the workflow ('Rigging') rather than the apparatus brand."
  - id: D5
    selected: b
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "No principle speaks to static-asset packaging. Picked (b) as the lowest-drift option — no build-step copy (c), no files-array wiring (a). Package-root static/ is the conventional shape."
  - id: D6
    selected: a
    confidence: high
    principles: [26, 27, 3]
    reasoning: "#26/#27/#3 all fire together: the tool endpoints already exist and serve this data; inventing custom routes is the 'new infrastructure where existing fits' anti-pattern."
  - id: D7
    selected: c
    confidence: medium
    principles: [18, 2]
    reasoning: "Linking to a page that doesn't exist is optimistic speculation (#18 — earn the slot from a real consumer); a link that silently 404s is the user-facing equivalent of #2's silent-fallback. Plain text is the honest answer today."
  - id: D8
    selected: b
    confidence: high
    principles: [27, 3, 18]
    reasoning: "#27/#3 — use the existing status query param the rig-list tool already exposes; #18 — don't invent new server routes (option c) when no second consumer has earned them."
  - id: D9
    selected: c
    confidence: medium
    principles: [22, 23]
    reasoning: "Reader's decision (#22) is 'is this rig healthy / making progress?' — '3/5 completed' answers that; raw engine count (a) doesn't. #19 permits the derivation since it's computed on read, not persisted."
  - id: D10
    selected: b
    confidence: medium
    principles: [23, 22]
    reasoning: "#23 — thinnest slice. Status + writId cover the two named operator workflows (scanning by health, scoping to a specific commission). Date-range is speculation (#18) without a named reader."
  - id: D11
    selected: a
    confidence: medium
    principles: [28, 23, 18]
    reasoning: "#28 defaults to drill-down tables; engine upstream is relational but simple enough that an upstream column carries it. Graph libs (c) and hand-rolled flowcharts (b) aren't earned (#18)."
  - id: D12
    selected: b
    confidence: medium
    principles: [28, 29]
    reasoning: "#28 + #29 — the Oculus/plan-review pattern is table-with-inspect-panel: click row, panel updates. Modal (c) breaks context; inline row-expand (a) cramps the richer engine detail."
  - id: D13
    selected: c
    confidence: high
    principles: [22, 24, 29]
    reasoning: "#22/#24 — the engine detail panel's decision is 'why is this engine stuck/failed?', which requires givensSpec and yields. #29 — collapsible JSON lets the reader amend visibility without re-entering a different view."
  - id: D14
    selected: b
    confidence: medium
    principles: [27, 23]
    reasoning: "Given the list already returns full RigDocs (per the question), reusing it (#27 — use what exists) is the thinnest slice (#23). Refetching duplicates a round-trip for no reader-decision gain."
  - id: D15
    selected: b
    confidence: high
    principles: [23, 33]
    reasoning: "#23 — thinnest slice for readonly JSON. #33 — textarea evokes 'edit me' which miscues a readonly surface; <pre><code> reads as 'show me the structure.'"
  - id: D16
    selected: a
    confidence: high
    principles: [20, 21]
    reasoning: "#20 — structural over blob. Showing each template under its writ-type key is queryable/scannable; a single JSON blob is log-spew-equivalent. #21 reinforces the noun-like per-template labeling."
  - id: D17
    selected: a
    confidence: high
    principles: [9, 3, 31]
    reasoning: "#9 — Fabricator owns its contribution contract, so listing designs belongs on FabricatorApi. #3 — extend the existing apparatus API. #31 — fix the source (apparatus), don't compensate at the consumer (route handler)."
  - id: D18
    selected: a
    confidence: high
    principles: [9, 3, 31]
    reasoning: "Same as D17 — Spider owns block types; the listBlockTypes method belongs on SpiderApi, with provenance scan being the only thing the route handler adds."
  - id: D19
    selected: b
    confidence: low
    principles: [18, 23]
    reasoning: "#18 — has-collect as a display field should be earned by a named reader-decision; without one, it's fabricated structure. #23 — id + plugin is the thinnest answer to 'what engines are available and where do they come from?'"
  - id: D20
    selected: b
    confidence: medium
    principles: [22, 23]
    reasoning: "#22 — the reader's decision 'can my rig use this block?' hinges on condition shape, so description earns its place. #23 — full Zod JSON (c) is spew beyond the decision; id-only (a) undershoots it."
  - id: D21
    selected: a
    confidence: high
    principles: [21, 32, 3]
    reasoning: "#21 — engine-designs and block-types are noun-like. #32 — reads cleanly in logs/prose/code. #3 — extends the /api/spider/ namespace that tool endpoints already live in; underscore prefix (b) invents a private-routes convention with no earned need."
  - id: D22
    selected: b
    confidence: medium
    principles: [31, 8, 23]
    reasoning: "Given D17/D18 route through apparatus APIs, the remaining scan is provenance-only (which kit's field holds this id). #31 — don't replicate duck-type guards downstream; #8 — the route handler doesn't need to re-learn the contribution vocabulary, just the field names."
  - id: D23
    selected: a
    confidence: high
    principles: [23, 18]
    reasoning: "#23 — readonly tables and panels don't earn a framework. #18 — Preact/Alpine is speculative scaffolding with no second consumer pulling for it. Vanilla also avoids a build step, matching #4's spirit."
  - id: D24
    selected: a
    confidence: medium
    principles: [25, 22]
    reasoning: "#25/#22 — 'check my rigs' and 'inspect the config' are two distinct workflows for the same operator; tabs keep them cohabiting on one page without braiding them (scroll-mixing, b) or fragmenting navigation (c)."
  - id: D25
    selected: a
    confidence: low
    principles: [25]
    no_principle_fired: true
    reasoning: "No principle strongly prefers master-detail over split-panel. Picked (a) because engine detail with collapsible JSON wants vertical room that a split panel cramps; #25's workflow framing ('list → inspect → back') reads naturally as view-switch."
  - id: D26
    selected: a
    confidence: medium
    principles: [23, 18]
    reasoning: "#23/#18 — auto-refresh is speculation without a named operator who's demonstrated the need. Manual button is thinnest and gives the reader control; if a second consumer asks for polling, earn it then."
  - id: D27
    selected: a
    confidence: high
    principles: [26, 27, 13]
    reasoning: "#26/#27 — reuse the existing Oculus badge vocabulary rather than inventing parallel styles. #13 — status-to-color mappings become de-facto canonical the moment they ship, so reusing a shared palette keeps cross-page consistency."
  - id: D28
    selected: a
    confidence: medium
    principles: [23, 18]
    reasoning: "#23 — single file scoped to the concern (oculus-routes.ts) separates HTTP wiring from the apparatus declaration without inflating structure. #18 — a routes/ directory (c) is speculative capacity; inline (b) braids unrelated concerns into spider.ts."

decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [22, 23]
    reasoning: "The reader of a CLI README is asking 'what command do I run to do X' (principle #22 — name the reader); functional grouping serves that question directly, while apparatus grouping is an architectural view that answers a different question."
  - id: D2
    selected: a
    confidence: medium
    principles: [1, 2, 18]
    reasoning: "Principle #1 (remove over deprecate) and #2 (fail loud over silent drift) both favor removal; listing aspirational commands in any form is speculation (#18) that risks being read as truth — agents/users can discover intent through backlog/roadmap docs elsewhere."
  - id: D3
    selected: a
    confidence: high
    principles: [32, 33, 34]
    reasoning: "Display names win the five-context test (#32) for a prose-register README column; guild metaphor terms belong on author-facing surfaces (#34), and '@shardworks/clerk-apparatus' fails prose/speech readings (#33)."
  - id: D4
    selected: b
    confidence: high
    principles: [1, 10]
    reasoning: "Principle #10 — Mk 2.1 is not a migration of Mk 2.0, and a migration-status section is exactly the legacy framing that doesn't belong in new-thing docs; #1 says remove when both remove and preserve-with-note work."
  - id: D5
    selected: b
    confidence: medium
    principles: [2, 31]
    reasoning: "A status-line-only fix would bless whatever content exists underneath it (silent drift, violating #2); a light content verification pass is the source-level fix (#31) without expanding to a rewrite."
  - id: D6
    selected: a
    confidence: medium
    principles: [2, 21, 30]
    reasoning: "The dimensional split (#30): the label is the crisp status, the body carries detail; 'Partially implemented' is a concrete noun-like identifier (#21) that tells the truth (#2), while 'Design (not yet implemented)' is now false given engines exist."
  - id: D7
    selected: b
    confidence: high
    principles: [3, 8, 19]
    reasoning: "CLAUDE.md already carries project-structure knowledge; a duplicate table in _agent-context.md is persisted derived state (#19) that will drift, and a pointer extends the existing source (#3) rather than routing around it (#8)."
  - id: D8
    selected: a
    confidence: high
    principles: [1, 10]
    reasoning: "The collision is resolved; #1 removes over deprecates, and #10 says legacy scaffolding doesn't earn a keep-slot without a named consumer — old-code-encounter is hypothetical, commit history already serves that reader."
  - id: D9
    selected: b
    confidence: high
    principles: [1, 19, 31]
    reasoning: "'What's implemented vs aspirational' is the canonical persisted-derived-state hazard (#19) — it drifts on every commit that nobody updates it with; #31 says fix the source (make code self-evident) rather than maintain a compensating doc."
  - id: D10
    selected: b
    confidence: medium
    principles: [1, 19, 27]
    reasoning: "A curated 'key files' table is derived state (#19) that decays silently; grep/glob are existing infrastructure (#27) that agents can already fabricate into orientation, and #1 removes when both maintain and remove work."
  - id: D11
    selected: c
    confidence: medium
    principles: [1, 10, 19]
    reasoning: "If the decisions are implemented, the rationale is either captured in commits/code (#19 — don't duplicate derived state) or it wasn't load-bearing; #1 removes over keeps-as-historical, and this is not a second-consumer-earned abstraction (#10)."
  - id: D12
    selected: b
    confidence: high
    principles: [19, 31]
    reasoning: "A doc-status ratings table is textbook persisted derived state (#19); if a doc is stale the fix is to the doc itself (#31), not a sidecar rating — 'last verified' dates just persist more drift-prone metadata."
  - id: D13
    selected: a
    confidence: medium
    principles: [2, 19]
    reasoning: "Session notes are genuine historical records and fine to leave; a stale Next Steps checklist actively misleads (#2 — fail loud) — updating to reflect current completion fixes that drift without expanding scope, even though the checklist is derived state (#19) that ideally wouldn't exist at all."

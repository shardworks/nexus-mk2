  - id: D5
    selected: c
    confidence: high
    principles: [2, 11]
    reasoning: "Fail loud when an explicitly-configured file is missing (#2); default charter.md being absent is 'unset' and should skip quietly (#11). Option (a)'s console.warn is silent-fallback dressed up as observability."
  - id: D6
    selected: a
    confidence: high
    principles: [2, 11]
    reasoning: "Undefined is semantically distinct from empty-string; collapsing them masks the 'no layers produced content' signal (#2), and skip-when-unset prefers absence over a synthetic empty default (#11)."
  - id: D7

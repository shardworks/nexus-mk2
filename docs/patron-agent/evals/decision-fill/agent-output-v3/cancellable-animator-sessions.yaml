decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [18, 4, 23]
    reasoning: "Principle #18 — 'cancelling' is a speculative middle-state with no named second consumer; principle #4 favors single-pass semantics over a transient intermediate. Ship the terminal status; earn the transient state later if a reader of it appears."
  - id: D2
    selected: a
    confidence: high
    principles: [16, 15]
    reasoning: "Principle #16 — the provider produces process death, not cancellation intent; pushing 'cancelled' onto SessionProviderResult asks the downstream to carry what the upstream decides. Principle #15 holds the contract line between provider (sees process exit) and apparatus (knows the exit was intentional)."
  - id: D3
    selected: b
    confidence: medium
    principles: [5, 6]
    reasoning: "Principle #5 — object-shaped config boundaries even when one field; reject scalar pid. Principle #6 — 'cancelHandle' bakes a specific purpose into what is really the provider's opaque process descriptor. processInfo reads as a noun and stays generic."
  - id: D4
    selected: a
    confidence: medium
    principles: [4, 16]
    reasoning: "Principle #4 — a Promise is a single-pass fall-through; callback (c) is retry-shaped ceremony. Principle #16 — the provider's job is to produce processInfo, and a Promise is the natural shape for an async production. Restructuring (b) is plausible but requires evidence the current boundary is wrong, not just inconvenient."
  - id: D5
    selected: a
    confidence: medium
    principles: [4, 19]
    reasoning: "Principle #4 — one write is cleaner than write-then-patch reconciliation. Principle #19 adjacent — avoid a two-phase write where the second phase is effectively patching in derived-from-spawn state. The session isn't truly 'running' until the process exists anyway, so awaiting processInfo aligns recordRunning() with actual runtime."
  - id: D6
    selected: a
    confidence: high
    principles: [8, 9]
    reasoning: "Principle #9 — the provider owns how its sessions die (local kill vs remote API call); that's its contract. Principle #8 — the Animator has no reason to know what processInfo contains; teaching it PIDs crosses a layer it doesn't need."
  - id: D7
    selected: a
    confidence: high
    principles: [18]
    reasoning: "Principle #18 — a kill closure duplicates provider.cancel()'s territory with no second consumer. Two ways to cancel is speculation; pick the one named by the interface."
  - id: D8
    selected: b
    confidence: medium
    principles: [5, 18]
    reasoning: "Principle #5 — object-shaped options gives room to grow without a breaking change; reason is a plausible immediate field (audit, UI surfacing), not speculative. Returning SessionDoc (vs void) lets callers observe the terminal state without a follow-up read."
  - id: D9
    selected: a
    confidence: medium
    principles: [14, 4]
    reasoning: "Principle #14 — the extension point (the cancel act) is setting status to 'cancelled'; process death is transport, not the act. Principle #4 — waiting for exit introduces timeout/escalation complexity the caller doesn't need to block on; result handler reconciles actual death."
  - id: D10
    selected: b
    confidence: medium
    principles: [4, 11]
    reasoning: "Principle #4 — idempotent fall-through beats requiring callers to branch on 'is this already done'. Principle #11 adjacent — when the end-state is already achieved, do nothing and that's fine. 'Already cancelled' isn't drift the patron needs to see."
  - id: D11
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — fail loud over silent null. An unknown session id is real drift (typo, stale reference, race); swallowing it as null hides the case that callers most need to be told about."
  - id: D12
    selected: a
    confidence: high
    principles: [15, 19]
    reasoning: "Principle #15 — the cross-process contract must be respected; option (b)'s in-memory set fails it by design. Principle #19 adjacent — the SessionDoc is the source of truth for session state, and reading it before overwriting is the only honest move."
  - id: D13
    selected: a
    confidence: high
    principles: [17, 33]
    reasoning: "Principle #17 — SessionResult.status already encodes terminal outcome; 'cancelled' is a new value for an existing distinction, not a new channel. Principle #33 — CancelledError evokes a failure register; cancellation is an intended outcome, not an exception."
  - id: D14
    selected: a
    confidence: medium
    principles: [20, 23]
    reasoning: "Principle #20 — the transcript is structural state; throwing it away forces anyone diagnosing a cancelled run to grep logs. Principle #23 — writing the partial transcript is the thinnest slice that preserves the diagnostic question 'what did the session do before cancel?'"
  - id: D15
    selected: b
    confidence: medium
    principles: [2, 4]
    reasoning: "Principle #2 — SIGTERM alone can leave a stubborn process alive, hiding cancellation drift; escalation to SIGKILL guarantees the loud terminal. Principle #4 — this isn't speculative retry, it's the standard graceful-then-force pattern, and the failure mode (non-responsive process) is known, not hypothetical."
  - id: D16
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — ESRCH is a known-benign race (process already dead), but EPERM and other errors are real drift that must surface. Option (b) introduces a TOCTOU race; (c) swallows meaningful signals."
  - id: D17
    selected: a
    confidence: medium
    principles: [17, 18]
    reasoning: "Principle #17 — the error field already carries 'why did this session terminate' for failed sessions; cancellation reason is the same conceptual territory. Principle #18 — a new cancelReason field is a new slot whose only writer is this feature; route through the existing field."
  - id: D18
    selected: a
    confidence: high
    principles: [4]
    reasoning: "Principle #4 — stuck-but-recoverable-with-answers beats requiring the caller to repost. Telling the caller 'retry later' is a retry loop in the user's head; patching status and letting the result handler honor the sentinel is single-pass."
  - id: D19
    selected: a
    confidence: medium
    principles: [18, 23, 13]
    reasoning: "Principle #13 — claude-code is the first live writer of processInfo, so its shape sets precedent; that raises the bar for discipline. Principle #18 — tmpDir and mcpPort have no named consumer in the cancel path (process cleans itself on signal). Principle #23 — thinnest slice is just what cancel needs."
  - id: D20
    selected: a
    confidence: high
    principles: [30, 2]
    reasoning: "Principle #30 — status and exitCode are separate dimensions: status is intent/outcome, exitCode is OS truth. A sentinel conflates them. Principle #2 — report what actually happened; drift between 'we said 0' and 'OS killed it with 143' is the kind of thing that bites later."
  - id: D21
    selected: a
    confidence: medium
    principles: [7, 18]
    reasoning: "Principle #7 — the ergonomics test: if you can start a session (animate permission), you should be able to stop one you started. Principle #18 — a bespoke 'admin' tier with one entry is a speculative privilege layer with no second consumer."
  - id: D22
    selected: a
    confidence: medium
    principles: [13]
    reasoning: "Principle #13 — summon set the precedent (patron-callable for session lifecycle); session-cancel is the terminal counterpart of the same surface, so it inherits the same callableBy. No ergonomics evidence that animas need to cancel sessions."
  - id: D23
    selected: b
    confidence: medium
    principles: [5, 18]
    reasoning: "Principle #5 — object shape with room to grow; reason is a plausible near-term field for audit/UI. Principle #18 — force is speculative (no named workflow wants SIGKILL escalation from a tool call); earn it from a second consumer."
  - id: D24
    selected: a
    confidence: high
    principles: [9, 8]
    reasoning: "Principle #9 — the Animator apparatus owns cancellation; the tool is a caller, not a parallel implementation. Principle #8 — teaching the tool layer about Stacks + process.kill duplicates knowledge that already lives in its rightful place."
  - id: D25
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — z.enum fails loud on typos and invalid filters; z.string() silently accepts 'canceled' (misspelled) or any nonsense. Maintaining the enum is cheap; losing the validation isn't."
  - id: D26
    selected: a
    confidence: high
    principles: [19, 18]
    reasoning: "Principle #19 — provider is derivable from config on any Animator; persisting the provider name on SessionDoc is derived state waiting to drift. Principle #18 — the new field has no second consumer."
  - id: D27
    selected: b
    confidence: medium
    principles: [16, 15]
    reasoning: "Principle #16 — the result handler produces endedAt/durationMs when the process actually dies; cancel() shouldn't pass down values the downstream is authoritative for. Principle #15 — clean contract split: cancel writes intent, result handler writes timing."
  - id: D28
    selected: b
    confidence: medium
    principles: [4, 18]
    reasoning: "Principle #4 — the broadcaster closes naturally when the process exits and the chunk consumer finishes; adding an explicit close is duplicated bookkeeping. Principle #18 — no evidence streaming consumers hang, so don't build for an imagined failure."
  - id: D29
    selected: a
    confidence: medium
    principles: [18]
    reasoning: "Principle #18 — a named CancelOptions export for a single-field options object is structure without a second consumer. Inline object type on the method signature is sufficient; promote to a named export only if a second caller shape appears."
  - id: D30
    selected: a
    confidence: medium
    principles: [3, 13]
    reasoning: "Principle #3 — session-show already returns the full SessionDoc; the cancel tool's response belongs in the same neighborhood. Principle #13 — tool return shape is load-bearing precedent, and 'returns the session' matches the shape callers already handle."

decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [13, 2]
    reasoning: "Principle #13 — Loom's pluginId.role naming is the first live precedent for kit-contributed identifiers; matching it avoids contract drift. Principle #2 — unqualified first-registered-wins is a silent conflict resolution."
  - id: D2
    selected: a
    confidence: medium
    principles: [13, 3]
    reasoning: "Principle #13 — Spider's existing BlockTypeRegistry is the in-file precedent for a named registry with register/lookup/override methods. Principle #3 — extend the shape already in the file rather than invent an inline variant."
  - id: D3
    selected: a
    confidence: high
    principles: [30, 15]
    reasoning: "Principle #30 — templates (definitions) and mappings (writ-type bindings) are two dimensions; folding them braids distinct concepts. Principle #15 — each contribution token is a hard cross-component contract and deserves its own name."
  - id: D4
    selected: b
    confidence: medium
    principles: [13, 18]
    reasoning: "Principle #13 — the BlockTypeRegistry pattern is the existing Spider precedent. Principle #18 — the apparatus-supportKit pre-scan is speculative structure with no named consumer yet; let the second consumer earn it."
  - id: D5
    selected: b
    confidence: medium
    principles: [2, 20]
    reasoning: "Principle #2 — silent-skip at registration hides drift from the operator. Principle #20 — keeping both registered preserves structural state that's queryable; lookup-time precedence is a cleaner way to express 'config wins'."
  - id: D6
    selected: a
    confidence: medium
    principles: [8, 9]
    reasoning: "Principle #8 — the Fabricator doesn't already need to know 'source plugin of a designId' for its own job, so don't teach it a new concept for Spider's validation. Principle #9 — the Spider owning its own designId→pluginId map keeps the concern inside the apparatus that uses it."
  - id: D7
    selected: a
    confidence: medium
    principles: [18, 23]
    reasoning: "Principle #18 — excluding the kit's own engines is a speculative restriction with no named motivation; the kit obviously should be able to reference what it ships. Principle #23 — the thinnest viable allow-set is the one that matches declared dependency scope."
  - id: D8
    selected: a
    confidence: high
    principles: [13, 15]
    reasoning: "Principle #13 — Loom's warn-and-drop-template is the live precedent for kit contribution validation failure. Principle #15 — dropping only the offending engine (option c) silently mutates a contract shape across the boundary; warn-and-drop-whole-template keeps the contract intact."
  - id: D9
    selected: a
    confidence: high
    principles: [3, 2]
    reasoning: "Principle #3 — the existing validation chain is the extension point; kit contributions should route through it, not around. Principle #2 — a weaker validation path for kit contributions silently admits defects the config path would catch."
  - id: D10
    selected: a
    confidence: medium
    principles: [22, 32]
    reasoning: "Principle #22 — writ type names have a different reader (commissioners/animas at post() time) than template names (plugin/config authors); user-facing names stay unqualified. Principle #32 — 'quality-audit' reads as a thing in a commission prompt; 'quality-tools.quality-audit' reads as a path."
  - id: D11
    selected: a
    confidence: medium
    principles: [3]
    reasoning: "Principle #3 — the framework's standard pattern for startup-scanned + plugin:initialized-updated state is an in-memory cache with mutation hooks; post() is a hot path where rescanning every call is unnecessary friction."
  - id: D12
    selected: a
    confidence: high
    principles: [18]
    reasoning: "Principle #18 — a Set<string> has one consumer (the Clerk). A registry class is speculative structure with no second consumer to earn it; inline state is the thinnest shape that works."
  - id: D13
    selected: b
    confidence: medium
    principles: [2, 20]
    reasoning: "Principle #2 — silently skipping at registration hides the conflict. Principle #20 — lookup-time precedence preserves structural state so the conflict is queryable (D30's WritTypeEntry carries a description, so 'same name' isn't really identical)."
  - id: D14
    selected: b
    confidence: medium
    principles: [18, 23]
    reasoning: "Principle #18 — the apparatus-supportKit pre-scan has no named consumer for writ type contributions; don't build the slot speculatively. Principle #23 — simpler scanning is the thinnest slice that works."
  - id: D15
    selected: b
    confidence: medium
    principles: [2]
    reasoning: "Principle #2 — (a) is silently wrong on a likely-unintended collision. Throwing (c) is harsh for what may be a recoverable plugin-coordination issue the operator can fix; warn-first-wins is loud without being fatal."
  - id: D16
    selected: a
    confidence: high
    principles: [3]
    reasoning: "Principle #3 — the plugin:initialized subscription chosen in D14 requires ctx; use the API that's already being passed in rather than keeping an ignore-ctx signature."
  - id: D17
    selected: a
    confidence: high
    principles: [15]
    reasoning: "Principle #15 — mapping keys ARE writ type names; since D10 made writ type names unqualified, the mapping-key contract must match. Qualifying one side and not the other breaks the shared contract."
  - id: D18
    selected: a
    confidence: medium
    principles: [18, 23]
    reasoning: "Principle #18 — restricting cross-kit template references requires a named motivation that isn't supplied. Principle #23 — template NAMES don't imply runtime dependency (only engine designIds do, and those are already dep-scoped in D6–D8)."
  - id: D19
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — at-registration validation would fail valid configs where the target template is registered later in the scan; that's a false-positive failure. Deferred validation fails loudly on truly dangling references."
  - id: D20
    selected: b
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — silent first-wins hides a likely-unintended collision. Warn keeps the precedence rule while surfacing the conflict."
  - id: D21
    selected: b
    confidence: medium
    principles: [23, 15]
    reasoning: "Principle #23 — the shorter chain is the thinnest slice that works. Principle #15 — D27 chose to redefine rigTemplates keys as pure template names, which eliminates the 'direct template = writ type' backward-compat step (a's step 3); keeping it would reintroduce the braided semantics D27 removed."
  - id: D22
    selected: a
    confidence: high
    principles: [3]
    reasoning: "Principle #3 — lookupTemplate already lives in the createSpider closure with access to its state; adding parameters routes around the existing integration instead of extending it."
  - id: D23
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — config is operator's own input, fail loud so they fix it fast. Kit templates come from plugin code the operator may not control; warn-and-skip keeps the guild up while surfacing the plugin defect. The asymmetry tracks who controls the input."
  - id: D24
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — same control-asymmetry as D23: operator's own dangling mapping should throw; a plugin's dangling mapping should warn-and-skip rather than take down the guild."
  - id: D25
    selected: a
    confidence: medium
    principles: [32]
    reasoning: "Principle #32 — pressure-testing against a log line: the dotted 'rigTemplates.templateName' form is greppable and reads cleanly in a console stream; (b)'s mixed quoting reads as prose and is harder to filter on."
  - id: D26
    selected: a
    confidence: high
    principles: [3, 21]
    reasoning: "Principle #3 — the relation is key→value lookup; Record<string,string> is idiomatic for that and matches adjacent config shapes. Principle #21 — writType-as-key reads noun-like; an array-of-records is overbuilt for a relation that's truly 1:1."
  - id: D27
    selected: b
    confidence: high
    principles: [30, 15, 1]
    reasoning: "Principle #30 — (a)'s 'keys are writ-type-or-template names' is two concepts braided into one field; the dimensional split wants separate rigTemplates (definitions) and rigTemplateMappings (bindings). Principle #15 — hard contract lines over ambiguity. Principle #1 — remove the braided legacy shape rather than preserve it."
  - id: D28
    selected: c
    confidence: high
    principles: [13]
    reasoning: "Principle #13 — LoomKit's in-implementation-file definition is the live precedent for apparatus Kit interfaces; matching it keeps the contribution shape co-located with the registration logic that consumes it."
  - id: D29
    selected: b
    confidence: medium
    principles: [15, 3]
    reasoning: "Principle #15 — one SpiderKit interface covering all Spider contributions is a single hard contract boundary; splitting kit-contribution surfaces for the same apparatus creates two shapes where one belongs. Principle #3 — extend the unified interface."
  - id: D30
    selected: a
    confidence: medium
    principles: [5, 15, 21]
    reasoning: "Principle #5 — object-shaped at the contract boundary. Principle #15 — a named exported type is a clearer contract than an inline structural duplicate (which will drift). Principle #21 — WritTypeEntry reads noun-like."
  - id: D31
    selected: b
    confidence: medium
    principles: [13, 18]
    reasoning: "Principle #13 — Spider's existing blockType pattern is (b). Principle #18 — apparatus-supportKit pre-scan is a structure slot with no currently-named consumer for rig templates or writ types; let the second consumer earn the more complex scan."
  - id: D32
    selected: a
    confidence: high
    principles: [2, 19]
    reasoning: "Principle #2 — fail loud as early as the signal is reliable. Config is fully known at start so validate immediately; kit templates are known at registration time so validate then; mappings reference targets that may register later, so deferring is correct. (b) delays feedback unnecessarily; (c) false-positives on mappings."
  - id: D33
    selected: a
    confidence: medium
    principles: [3]
    reasoning: "Principle #3 — extending buildFixture() with kit support tests the primary startup-scan path that most production use exercises; fire('plugin:initialized') only tests the runtime-add path and leaves startup scan untested in the fixture."
  - id: D34
    selected: a
    confidence: medium
    principles: [2]
    reasoning: "Principle #2 — warn-and-skip keeps the apparatus loud about the defect while preserving consistency with the D8/D23 asymmetry: plugin-sourced problems warn, operator-sourced problems throw. A malformed plugin field shouldn't take down the guild."
  - id: D35
    selected: b
    confidence: medium
    principles: [18, 23]
    reasoning: "Principle #18 — no named consumer has asked for a 'default mapping' separate from the existing 'default template' concept; don't build the slot speculatively. Principle #23 — the thinner lookup chain (consistent with D21b) uses the default template as the sole fallback."

decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [11]
    reasoning: "Spider contributes a page only when Oculus is present — skip-when-unset (#11) is the right default; `recommends` expresses this without hard-coupling the apparatus."
  - id: D2
    selected: a
    confidence: medium
    principles: [15, 13]
    reasoning: "Importing Oculus's contribution types holds a hard line on the cross-component contract (#15) and sets precedent for future contributing plugins (#13); inlined shapes invite silent drift."
  - id: D3
    selected: a
    confidence: medium
    principles: [2, 15]
    reasoning: "Typed Context is fail-loud (#2); `unknown` with raw Response throws away the type contract (#15). The leak of hono into spider's deps is a real cost, but weaker than losing handler typing."
  - id: D4
    selected: b
    confidence: high
    principles: [13, 34, 32]
    reasoning: "Page id should match the plugin id (#13 — first live writer setting precedent for `pages.<pluginId>`); 'Rigging' is the guild-metaphor label for the functional area (#34) and reads cleaner in prose/log contexts (#32)."
  - id: D5
    selected: b
    confidence: medium
    principles: [19, 5]
    reasoning: "Option (c) persists derived state (#19 — assets copied into dist). Between (a) and (b), root-level `static/` is convention-over-config and needs no package.json files-array entry."
  - id: D6
    selected: a
    confidence: high
    principles: [27, 3]
    reasoning: "Fabricate uses of existing infrastructure (#27) — the auto-mapped tool endpoints already serve this. New custom routes would route around a working surface (#3)."
  - id: D7
    selected: a
    confidence: medium
    principles: [37, 41]
    reasoning: "Scaffolding the clerk page slot (#37) is correct when clerk-on-Oculus is known-coming; the link is a content-bearing target (#41), not a stale metadata fallback. A 404 until clerk ships is fail-loud, not silent."
  - id: D8
    selected: b
    confidence: high
    principles: [3, 27]
    reasoning: "Use the existing rig-list status filter (#3, #27) where it exists; client-side for the rest avoids new custom routes for speculative filter combinations (#18)."
  - id: D9
    selected: c
    confidence: high
    principles: [41, 23]
    reasoning: "'3/5 completed' is a content-bearing summary that orients the operator (#41); raw engine count is closer to metadata. Still a thin slice (#23) — one summary column, not five."
  - id: D10
    selected: b
    confidence: medium
    principles: [25, 23]
    reasoning: "Status + writId filter anchors the two concrete operator workflows (#25 — 'find rigs for writ X', 'find failed rigs'). Date range is speculative until a reader asks for it (#18)."
  - id: D11
    selected: a
    confidence: medium
    principles: [28, 23, 18]
    reasoning: "Drill-down table with an upstream column (#28) is the canonical shape; visual pipeline and graph libs are new structure unearned by a second consumer (#18). MVP stays thin (#23)."
  - id: D12
    selected: b
    confidence: medium
    principles: [28, 40]
    reasoning: "Master-detail panel is the canonical drill-down pattern (#28) and colocates the detail with the list selection that drives it (#40). Modal overlay hides context; inline expansion fights the table layout."
  - id: D13
    selected: c
    confidence: high
    principles: [24, 41]
    reasoning: "Operators debugging a failed engine need givensSpec and yields (#24 — adequate for the decision); collapsible JSON keeps the default view clean while preserving access (#41)."
  - id: D14
    selected: b
    confidence: medium
    principles: [27, 4]
    reasoning: "Reusing the already-fetched RigDoc is single-pass (#4) and fabricates use of existing data (#27). Freshness is moot for a click immediately following a list render; a manual refresh (D26) covers staleness."
  - id: D15
    selected: b
    confidence: medium
    principles: [41]
    reasoning: "A <textarea> affords editing — wrong signal for readonly content. <pre><code> is the idiomatic readonly JSON surface and carries content-bearing formatting (#41)."
  - id: D16
    selected: a
    confidence: high
    principles: [17, 21]
    reasoning: "The template key already encodes the distinction (writ type or 'default') — route through the existing field (#17). A combined JSON blob collapses a meaningful identifier (#21)."
  - id: D17
    selected: a
    confidence: high
    principles: [36, 3, 6]
    reasoning: "Extend FabricatorApi with the complete set of sibling operations (#36, #3) — engine designs are Fabricator's domain. Scanning guild() from a route handler bakes Fabricator specifics into the generic layer (#6)."
  - id: D18
    selected: a
    confidence: high
    principles: [36, 3, 6]
    reasoning: "Same shape as D17 — SpiderApi owns block-type concepts and should expose listBlockTypes() (#36, #3). Generic guild scanning for block-type internals violates the apparatus boundary (#6)."
  - id: D19
    selected: b
    confidence: medium
    principles: [18, 23]
    reasoning: "id + contributing plugin is the thinnest slice that answers 'what designs are available and who provides them' (#23). has-collect is architecturally interesting but lacks a named operator decision (#18)."
  - id: D20
    selected: b
    confidence: medium
    principles: [24, 41]
    reasoning: "Operators need to know what conditions a block accepts (#24); a schema description is human-readable and content-bearing (#41). Raw Zod JSON is verbose noise for the operator workflow."
  - id: D21
    selected: a
    confidence: high
    principles: [13, 21, 36]
    reasoning: "Clean /api/spider/<resource> sets convention-bearing precedent (#13) with noun-like resource names (#21). The underscore prefix signals nothing clear; the combined /config endpoint collapses distinct resources (#36)."
  - id: D22
    selected: b
    confidence: medium
    principles: [15]
    reasoning: "Trust the contract (#15) — if the kit declares an `engines` field, iterate its keys. Replicating duck-type checks from Fabricator/Spider couples the scanning route to those apparatuses' internal validation."
  - id: D23
    selected: a
    confidence: high
    principles: [13, 18, 23]
    reasoning: "First page contribution sets framework precedent (#13); vanilla keeps the door open for future contributors. A framework choice is unearned structure (#18) and bulkier than the MVP needs (#23)."
  - id: D24
    selected: a
    confidence: medium
    principles: [25, 40, 18]
    reasoning: "Runtime rigs and config introspection are distinct workflows (#25) — tabs colocate each with its own controls (#40). A separate second page is unearned until config grows (#18)."
  - id: D25
    selected: b
    confidence: medium
    principles: [28, 40]
    reasoning: "Master-detail split panel is the canonical drill-down pattern (#28) and keeps the list context visible while viewing detail (#40). Full-page replacement loses orientation; modal hides the list."
  - id: D26
    selected: c
    confidence: medium
    principles: [22, 24]
    reasoning: "Operator watching live rigs (#22) wants state to update without manual work; a visible refresh button preserves control (#24). Both is minimal incremental cost over either alone."
  - id: D27
    selected: a
    confidence: high
    principles: [27, 3, 13]
    reasoning: "Reuse existing oculus badge classes (#27, #3); first contributing plugin establishes the convention for status-color reuse across future plugin pages (#13)."
  - id: D28
    selected: a
    confidence: medium
    principles: [18, 37]
    reasoning: "A dedicated oculus-routes.ts makes the slot explicit (#37) without over-scaffolding a routes/ directory (#18). Inline in supportKit bloats spider.ts and hides the Oculus integration surface."

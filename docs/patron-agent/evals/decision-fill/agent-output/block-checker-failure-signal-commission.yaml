  - id: D15
    selected: b
    confidence: medium
    principles: [20]
    reasoning: "Principle #20 (structural state over log spew — here, informative error payloads over generic ones): including the writ id in the failure reason makes the structured error usable for debugging. 'Writ not found' alone is uselessly generic."
  - id: D16
    selected: a
    confidence: medium
    principles: [32]
    reasoning: "Principle #32 (log-line test): (a) is information-dense and past-tense concrete — 'Writ reached terminal status X instead of Y' reads as a report of what happened. (b) is speculatively forward-looking ('will never reach') which is less direct."
  - id: D17
    selected: a
    confidence: high
    principles: [2]
    reasoning: "If the writ is at the target status, the block is cleared, period — 'cleared' is the accurate signal regardless of whether the target happens to be terminal. Principle #2 (fail loud means accurate signals, not unnecessary failure paths)."
  - id: D18

decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [18, 11, 8]
    reasoning: "Principle #18 (earn structure from a second consumer) and #8 (don't teach the framework a concept it has no reason to know) both point to convention — no config field until a real second consumer needs a different path; #11 reinforces skip-when-unset over framework-supplied taste."
  - id: D2
    selected: b
    confidence: medium
    principles: [19, 18]
    reasoning: "Principle #19 (don't persist derived state) — cached charter is a recomputation target, not a storage target; fresh reads per weave() avoid the 'needs restart to pick up edits' footgun and sidestep the #18 speculation trap of a watcher/TTL."
  - id: D3
    selected: b
    confidence: high
    principles: [10, 13, 7]
    reasoning: "Principle #10 (no legacy in new stuff) rules out 'match the legacy convention'; #13 (first live writer sets precedent) — the ToolDefinition `instructionsFile`/`instructions` split already distinguishes file-path from inline-text, so this naming is load-bearing and should stay consistent."
  - id: D4
    selected: b
    confidence: medium
    principles: [12, 32]
    reasoning: "Principle #12 (framework guarantees over reminders) — markdown headers give the anima a readable, unambiguous section structure; bare concatenation hides the layer boundary, and the nested options in D12 are markdown-flavored, so markdown stays coherent end-to-end."
  - id: D5
    selected: c
    confidence: high
    principles: [2, 18]
    reasoning: "Principle #2 (fail loud over silent fallback) — a configured file path that doesn't exist is drift the patron needs to see; the default charter.md path not existing is 'nothing configured' and cleanly omits, but an explicit path must throw."
  - id: D6
    selected: a
    confidence: medium
    principles: [2, 17]
    reasoning: "Principle #2 — undefined honestly signals 'no system prompt at all,' whereas an empty string is a present-but-blank prompt that could mask missing content downstream; #17 supports routing the distinction through the existing optional shape rather than collapsing it."
  - id: D7
    selected: a
    confidence: medium
    principles: [11, 15]
    reasoning: "Principle #11 — charter is orthogonal to role (it applies to the guild regardless); #15 (hold hard lines on cross-component contracts) — role validity and charter inclusion are separate concerns and conflating them sets a precedent that the next caller will regret."
  - id: D8
    selected: c
    confidence: medium
    principles: [19, 18]
    reasoning: "Principle #19 — consistent with D2, don't persist derived state; fresh per-weave reads avoid cache-invalidation bugs and eliminate the 'when was this cached?' question entirely."
  - id: D9
    selected: a
    confidence: medium
    principles: [7, 3]
    reasoning: "Principle #7 (iterate to authoring ergonomics) and #3 (extend existing API) — matching the Instrumentarium's sync pattern preserves a uniform startup shape across apparatuses; the cost of async propagation isn't justified absent a concrete reason."
  - id: D10
    selected: a
    confidence: medium
    principles: [36, 23]
    reasoning: "Principle #36 (complete the set) — tool instructions are already resolved and available, so shipping charter + role + tools as a coherent composed-prompt is the complete thin slice per #23; deferring them leaves a named gap in the documented layer order."
  - id: D11
    selected: a
    confidence: high
    principles: [13, 15]
    reasoning: "Principle #13 — the documented order (charter → role → tools) is already precedent; #15 — swapping layer order mid-implementation breaks a contract consumers are building against."
  - id: D12
    selected: c
    confidence: medium
    principles: [12, 32]
    reasoning: "Principle #12 — a grouped `# Tools` outer section with `## tool-name` subheaders gives the anima unambiguous delimitation and lets the section be identified as a unit; bare concatenation loses the group boundary, per-tool top-level headers flatten the hierarchy."
  - id: D13
    selected: a
    confidence: high
    principles: [18, 10]
    reasoning: "Principle #18 — placeholder comments are scaffolding for imagined consumers; #10 — no 'bridge to the future shape' in new code. Insert layers when curriculum/temperament actually arrive."
  - id: D14
    selected: a
    confidence: medium
    principles: [18, 8]
    reasoning: "Principle #18 — injecting a file-reader seam (b) is abstraction earned by no second consumer; #8 — fs module-mocking teaches the test harness a concept the framework doesn't need. Real temp dirs test the real thing."

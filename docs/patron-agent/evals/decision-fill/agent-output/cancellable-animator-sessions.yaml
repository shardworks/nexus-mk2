decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [18, 4]
    reasoning: "Principle #18 — 'cancelling' is a transient state with no named second consumer; adding it is speculative structure. Principle #4 — single-pass cancel (send signal, patch to terminal) doesn't need an intermediate state."
  - id: D2
    selected: a
    confidence: high
    principles: [8, 16]
    reasoning: "Principle #8 — the provider doesn't need to know about cancellation; it only sees process death, so SessionProviderResult shouldn't learn a new concept. Principle #16 — cancellation is produced above the provider layer, not passed into it. SessionDoc and SessionResult both need it because downstream callers distinguish cancelled from failed."
  - id: D3
    selected: b
    confidence: high
    principles: [5, 6, 18]
    reasoning: "Principle #6 — 'pid' bakes a local-spawn specific into the generic animator layer. Principle #5 — object-shaped even with one field gives flexibility for non-local providers. 'cancelHandle' names it too narrowly for its only current use; 'processInfo' reads as a thing (principle #21)."
  - id: D4
    selected: a
    confidence: high
    principles: [14, 3]
    reasoning: "Principle #14 — the extension point is the act of the provider declaring processInfo when it becomes available; Promise<> captures that timing idiomatically. Callback is un-idiomatic; restructuring claude-code shapes the interface around one provider's internals."
  - id: D5
    selected: a
    confidence: medium
    principles: [4, 20]
    reasoning: "Principle #4 — single write over fire-then-patch. Principle #20 — 'running' status is truer if recorded when the process is actually spawned. The pre-spawn window is short and the session still has a recorded 'new' state."
  - id: D6
    selected: a
    confidence: high
    principles: [6, 9, 16]
    reasoning: "Principle #9 — the provider apparatus owns its own cancellation contract. Principle #6 — process.kill() with PID bakes local-spawn specifics into the Animator. Principle #18 — option (c) adds two paths without a second consumer."
  - id: D7
    selected: a
    confidence: high
    principles: [9, 18]
    reasoning: "Given D6 (provider owns cancel), a kill closure on the return is redundant structure. Principle #18 — no second consumer for a kill() closure separate from provider.cancel()."
  - id: D8
    selected: b
    confidence: high
    principles: [5, 3]
    reasoning: "Principle #5 — object-shaped options parameter even with one field (reason) for flexibility. Returning SessionDoc (not void) lets callers see the final recorded state without a second fetch."
  - id: D9
    selected: a
    confidence: high
    principles: [4, 14]
    reasoning: "Principle #4 — waiting for process death adds timeout/retry surface. Principle #14 — the cancellation is the act of recording the decision; process death is downstream. The SessionDoc at 'cancelled' is the semantic event."
  - id: D10
    selected: a
    confidence: medium
    principles: [2]
    reasoning: "Principle #2 — fail loud on state the caller didn't expect. Cancelling a terminal session is either a race the caller should know about or a mistake; silent no-op hides drift. Callers who want idempotency can catch."
  - id: D11
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — fail loud on a nonexistent ID; this is a caller bug or stale reference. Consistent with D8(b)'s non-nullable Promise<SessionDoc> return."
  - id: D12
    selected: a
    confidence: high
    principles: [20, 19]
    reasoning: "Principle #20 — the SessionDoc in Stacks is the structural source of truth; cross-process cancellation is visible there. Principle #19 — an in-memory Set duplicates state that already lives structurally and doesn't work across processes anyway."
  - id: D13
    selected: a
    confidence: high
    principles: [2, 20]
    reasoning: "Principle #20 — status: 'cancelled' is structural data; callers check the field. Cancellation is intentional, not an error condition; rejecting conflates the two. Resolving keeps the success/failure axis separate from the terminal-kind axis (principle #30)."
  - id: D14
    selected: a
    confidence: medium
    principles: [20]
    reasoning: "Principle #20 — the partial transcript is real data about what happened before the kill. Cancellation doesn't invalidate the session history; suppressing the transcript hides forensically useful state."
  - id: D15
    selected: a
    confidence: medium
    principles: [4, 18]
    reasoning: "Principle #4 — SIGTERM-then-SIGKILL-with-timeout adds a retry/timeout loop that the single-pass cancel path (D9: return immediately) doesn't want. Principle #18 — force-kill earns its place when a stuck-process consumer actually appears."
  - id: D16
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — ESRCH means 'already dead' which is the desired end state (success by another path); EPERM and other errors are real and should propagate. Option (b) is TOCTOU-racy; option (c) hides genuine failures."
  - id: D17
    selected: a
    confidence: medium
    principles: [17, 18]
    reasoning: "Principle #17 — the existing 'error' field already carries terminal-reason information; route the distinction (cancelled vs failed) through the existing 'status' field rather than adding a sibling. Principle #18 — cancelReason is new structure for one reader."
  - id: D18
    selected: a
    confidence: medium
    principles: [4, 2]
    reasoning: "Principle #4 — 'retry later' forces caller-side looping and violates single-pass. Principle #2 — the cancellation decision is recorded immediately; brief process overrun is a tolerable footprint. The result handler sees 'cancelled' (per D12) and won't overwrite."
  - id: D19
    selected: a
    confidence: medium
    principles: [18, 13]
    reasoning: "Principle #18 — cancel only needs pid; tmpDir and mcpPort are speculative without a named consumer. Principle #13 — this shape sets precedent for processInfo; keeping it minimal makes future additions explicit extensions rather than hidden surface."
  - id: D20
    selected: a
    confidence: high
    principles: [20, 2]
    reasoning: "Principle #20 — the OS exit code is the structural truth of what happened. Principle #2 — manufacturing a sentinel (b) or lying with 0 (c) hides the real signal behind a fiction."
  - id: D21
    selected: a
    confidence: high
    principles: [7]
    reasoning: "Principle #7 — the ergonomic test: if you can start a session (summon/animate), you can stop one. Same permission level is symmetric and what tool authors expect. 'admin' is punitive; 'write' is semantically unclear."
  - id: D22
    selected: a
    confidence: high
    principles: [9, 22]
    reasoning: "Cancel is symmetric with summon (patron-only). Letting animas cancel each other's work invites cross-anima interference with no named reader asking for it (principle #22). Patron-only matches the commissioning model."
  - id: D23
    selected: b
    confidence: high
    principles: [5, 18]
    reasoning: "Principle #5 — object-shaped with reason for audit. Principle #18 — force flag is speculative (D15 chose SIGTERM-only, no force path). Matches D8's shape."
  - id: D24
    selected: a
    confidence: high
    principles: [3, 9, 15]
    reasoning: "Principle #9 — AnimatorApi owns the cancel contract. Principle #3 — extend via the existing API. Principle #15 — bypassing the apparatus to touch Stacks + process.kill() directly is exactly the cross-boundary violation to refuse."
  - id: D25
    selected: a
    confidence: high
    principles: [2, 20]
    reasoning: "Principle #2 — z.enum catches typos and drift at the validation boundary; z.string() silently accepts garbage. Principle #20 — the named set of statuses is structural and worth maintaining."
  - id: D26
    selected: a
    confidence: medium
    principles: [19, 3]
    reasoning: "Principle #19 — provider resolution is derivable from config; don't persist a name that can drift from the source. Principle #3 — reuse the existing resolveProvider path from animate(). If multi-provider dispatch becomes dynamic, (b) earns its place then."
  - id: D27
    selected: a
    confidence: high
    principles: [4, 12]
    reasoning: "Principle #12 — framework guarantees the terminal fields are set at cancel time, not left to a result handler that (per D12) will skip writing when it sees 'cancelled'. Principle #4 — single write, no split responsibility."
  - id: D28
    selected: b
    confidence: medium
    principles: [4, 18]
    reasoning: "Principle #4 — broadcaster closes naturally when the process dies; no explicit synchronization needed. Principle #18 — 'streaming consumer needs immediate notification before process death' has no named reader; status becomes 'cancelled' on the SessionDoc already."
  - id: D29
    selected: a
    confidence: medium
    principles: [18, 5]
    reasoning: "Principle #18 — inline options object is sufficient until a second consumer needs the named type. Keeps the animator barrel surface small; can be extracted if call-sites accumulate."
  - id: D30
    selected: a
    confidence: high
    principles: [3, 7, 15]
    reasoning: "Principle #3 — session-show already returns SessionDoc; cancel should match. Principle #15 — splitting to a summary projection creates a sibling contract for one consumer. Full doc gives callers everything for free."

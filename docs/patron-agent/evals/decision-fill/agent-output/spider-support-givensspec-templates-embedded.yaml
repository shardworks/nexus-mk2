decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [18, 23]
    reasoning: "Principle #18 — no second consumer for a template engine; extend the existing regex system. Principle #23 — thinnest slice that answers the question (inline interpolation) without pulling in a dependency."
  - id: D2
    selected: a
    confidence: medium
    principles: [23, 18]
    reasoning: "Principle #23 — this commission's question is 'add inline support'; migrating whole-value syntax is a separate decision that should be earned by its own case. Principle #18 — don't fold a migration in without a named driver for it."
  - id: D3
    selected: a
    confidence: high
    principles: [2, 15]
    reasoning: "Principle #2 — bare inline $refs have fuzzy termination and create silent ambiguity; explicit ${...} delimiters fail loud on malformed input. Principle #15 — hard line on parser contract rather than 'greedy enough most of the time'."
  - id: D4
    selected: a
    confidence: high
    principles: [2, 31]
    reasoning: "Principle #2 — permissive capture plus namespace validation means unknown refs error out visibly; restrictive regex silently drops them as literals. Principle #31 — validate at the right layer (parse everything, validate semantics) rather than hiding unknowns at the regex layer."
  - id: D5
    selected: a
    confidence: high
    principles: [18, 23]
    reasoning: "Principle #18 — no second consumer has asked for deep traversal; start with single-level and earn nesting from a real case. Principle #23 — thinnest slice."
  - id: D6
    selected: c
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — empty-string and literal-passthrough are classic silent fallbacks that hide drift; throw at resolution time so the missing ref surfaces to the patron."
  - id: D7
    selected: a
    confidence: medium
    principles: [23, 2]
    reasoning: "Principle #23 — simplest behavior, one rule, no smart-branching on value shape. Principle #2 — '[object Object]' is visibly wrong output if an object slips in, not silent degradation; (c) is 'helpful' in a way that papers over bugs."
  - id: D8
    selected: a
    confidence: medium
    principles: [17, 15]
    reasoning: "Principle #17 — whole-value bare-$ already preserves type; a string that is entirely one expression should route through that same conceptual field rather than splitting semantics. Principle #15 — contract consistency across syntaxes."
  - id: D9
    selected: a
    confidence: medium
    principles: [15, 17]
    reasoning: "Principle #15 — the spawn/run contract boundary (writ+vars at spawn, yields at run) is an existing hard line worth holding. Principle #17 — route the new distinction through the existing resolution phase assignment."
  - id: D10
    selected: a
    confidence: medium
    principles: [18, 38]
    reasoning: "Principle #18 — a sentinel marker is speculative structure; no consumer has demonstrated the ambiguity problem. Principle #38 — don't introduce a second representation of the same thing when the literal already round-trips."
  - id: D11
    selected: a
    confidence: medium
    principles: [17, 3]
    reasoning: "Principle #17 — ${writ.body} already carries the 'give me this field as a string' concept; let it serve whole-value too rather than forcing $writ for a different case. Principle #3 — extend the new syntax to the whole-value case rather than routing around it."
  - id: D12
    selected: a
    confidence: medium
    principles: [2, 15]
    reasoning: "Principle #2 — a known-field allowlist fails loud on typos and on fields that weren't meant to be exposed. Principle #15 — the contract is 'these WritDoc fields are addressable', not 'whatever the object happens to carry', which is (c)'s shape."
  - id: D13
    selected: a
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "No principle speaks to this micro-perf/code-shape choice. Picked (a) as the single-code-path option; the prefilter is a premature optimization for a validation pass."
  - id: D14
    selected: a
    confidence: high
    principles: [15]
    reasoning: "Principle #15 — the upstream-reachability contract shouldn't bend based on whether a ref is inline or whole-value; same semantics demand same validation."
  - id: D15
    selected: a
    confidence: medium
    principles: [17, 23]
    reasoning: "Principle #17 — existing validation behavior is fail-on-first; route through that. Principle #23 — collecting is speculative DX without a named reader asking for the full list."
  - id: D16
    selected: a
    confidence: high
    principles: [2, 10]
    reasoning: "Principle #2 — unknown namespaces passing through as literals is the textbook silent fallback. Principle #10 — 'forward compatibility' is a legacy-shim rationale in disguise for new code."
  - id: D17
    selected: c
    confidence: medium
    principles: [23, 16]
    reasoning: "Principle #23 — string|null is the thinnest return shape both callers can handle. Principle #16 — the callback form of (a) makes the helper receive behavior it shouldn't need; separation is cleaner."
  - id: D18
    selected: a
    confidence: medium
    principles: [23, 8]
    reasoning: "Principle #23 — per-engine signature is the smaller refactor; existing callers already iterate. Principle #8 — validator doesn't need to own the engine-list concept."
  - id: D19
    selected: a
    confidence: high
    principles: [38]
    reasoning: "Principle #38 — delete over repair when the thing is redundant; the spread is dead defensive code duplicating what resolveYieldRefs already guarantees."
  - id: D20
    selected: a
    confidence: high
    principles: [38]
    reasoning: "Principle #38 — two parallel inline-replacement loops would be duplicated code fated to drift; shared helper is the single source of truth."
  - id: D21
    selected: b
    confidence: medium
    principles: [8, 23]
    reasoning: "Principle #8 — the helper doesn't need to know about whole-value semantics; that lives with the caller that already decides resolution policy. Principle #23 — smaller helper surface."

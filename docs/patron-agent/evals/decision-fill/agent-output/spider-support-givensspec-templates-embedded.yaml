    selected: a
    confidence: high
    principles: [8, 16]
    reasoning: "Principle #8 — the helper shouldn't carry dot-path traversal semantics; its job is interpolation. Principle #16 — resolution is what the caller produces; pass it in as a resolver rather than forcing the helper to reimplement lookup."
  - id: D23
    selected: a
    confidence: medium
    principles: [15, 23]
    reasoning: "Follows D2(a) — bare-$ whole-value stays, so normalizeVarRef still has a job. Principle #15 — the canonicalization contract for bare-$ is load-bearing. Principle #23 — don't rewrite a working code path as part of an additive feature."
  - id: D24
    selected: a
    confidence: medium
    principles: [3, 17]
    reasoning: "Follows D2(a) — bare-$ whole-value logic is preserved, so the existing path runs first and inline is the fall-through extension. Principle #3 — extend the existing control flow rather than inverting it."
  - id: D25
    selected: a
    confidence: medium
    principles: [2, 17]
    reasoning: "Principle #2 — a $-prefixed string that doesn't match any known whole-value pattern is almost certainly a typo; preserving the current error behavior fails loud. Principle #17 — route through existing validation rather than inventing a lenient new branch."
  - id: D26
    selected: a
    confidence: medium
    principles: [18, 23]
    reasoning: "Principle #18 — no named guild-config author has asked for literal ${...}; don't build escape machinery for an imagined case. Principle #23 — thinnest slice; add the escape when a second consumer earns it."

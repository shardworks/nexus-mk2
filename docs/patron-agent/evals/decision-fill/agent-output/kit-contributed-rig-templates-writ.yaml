decisions:
  - id: D1
    selected: a
    confidence: high
    principles: [13]
    reasoning: "Principle #13 — the Loom's pluginId.<name> pattern is the established precedent for plugin-contributed namespaced things; kit-contributed rig templates should follow it to avoid silent collisions across plugins."
  - id: D2
    selected: a
    confidence: medium
    principles: [13]
    reasoning: "Principle #13 — BlockTypeRegistry is the existing precedent for Spider-owned registries with registration/conflict/lookup operations; the rig template registry (with mappings + merge precedence) has enough operations to justify mirroring that shape."
  - id: D3
    selected: a
    confidence: high
    principles: [15, 30]
    reasoning: "Principle #30 (dimensional split) — templates (what exists) and mappings (which writ type routes where) are two dimensions; #15 says keep the contract boundary crisp with separate tokens rather than folding them."
  - id: D4
    selected: a
    confidence: medium
    principles: [13]
    reasoning: "Principle #13 — Loom's Phase 1a/1b/2 pattern is the precedent for plugin contributions that can originate from either g.kits() or apparatus supportKits; using it here ensures apparatus-contributed templates aren't missed."
  - id: D5
    selected: a
    confidence: medium
    principles: [2, 15]
    reasoning: "Registration-time precedence gives one source of truth in the merged registry (cleaner state per #15); the 'silently' qualifier is the part principle #2 pushes back on — ideally a console.info notes the override, but option a's state model is right."
  - id: D6
    selected: b
    confidence: medium
    principles: [3, 27]
    reasoning: "Principle #27 (fabricate uses of existing infrastructure) — the Fabricator already knows about engine designs; ask the source of truth. Principle #3 — extending FabricatorApi is the right shape rather than duplicating the designId→pluginId map inside Spider."
  - id: D7
    selected: a
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "No principle speaks directly; on engineering sense, a kit must be able to reference engines it contributes itself — requires + recommends + the kit itself + built-ins is the natural allowed set."
  - id: D8
    selected: a
    confidence: high
    principles: [13]
    reasoning: "Principle #13 — Loom's warn-and-drop is the established precedent for kit-contribution failures; dropping the whole template keeps validation atomic (per-engine dropping risks leaving a malformed template in the registry)."
  - id: D9
    selected: a
    confidence: high
    principles: [2, 15]
    reasoning: "Principle #15 — a template is a template regardless of source; the contract shape (non-empty engines, no cycles, valid upstream refs) applies uniformly. Principle #2 — skipping existing checks for kit templates would hide drift."
  - id: D10
    selected: a
    confidence: high
    principles: [22, 32]
    reasoning: "Principle #22 (name the reader) — writ type names are read/typed by operators in commissions, CLIs, logs. Principle #32 — 'quality-tools.quality-audit' fails the CLI and prose contexts; unqualified names pass."
  - id: D11
    selected: a
    confidence: high
    principles: [4]
    reasoning: "Principle #4 — a single populated Set updated on plugin:initialized is one pass; re-scanning on every post() is the multi-step pipeline to collapse. Predictable and cheap."
  - id: D12
    selected: a
    confidence: high
    principles: [18]
    reasoning: "Principle #18 — writ types are just a Set<string> with first-wins semantics; no second consumer yet justifies a WritTypeRegistry class. Inline state earns its keep."
  - id: D13
    selected: a
    confidence: medium
    principles: [2]
    reasoning: "For a Set<string>, 'both registered with semantic precedence' is incoherent — option a is the only consistent semantics. Principle #2 pushes against the 'silently' qualifier (a warn would be better), but the registration model is right."
  - id: D14
    selected: a
    confidence: medium
    principles: [13]
    reasoning: "Same as D4 — Loom pattern is the precedent; keep parity with the Spider's scanning pattern so apparatus-contributed writ types aren't missed."
  - id: D15
    selected: b
    confidence: high
    principles: [2]
    reasoning: "Principle #2 — two kits colliding on the same writ type name is real ambiguity the operator should see. Throwing is too harsh (one plugin crashes the guild); silent first-wins hides drift. Warn + first-wins is the right loudness."
  - id: D16
    selected: a
    confidence: high
    principles: [3]
    reasoning: "Principle #3 — extending the existing ctx parameter (using ctx.on()) is the existing API for plugin:initialized subscription; changing the signature to actually use what's being passed is obvious follow-through from D14."
  - id: D17
    selected: a
    confidence: high
    principles: [22, 32]
    reasoning: "Mapping keys ARE writ type names (which D10 settled as unqualified); qualifying them here would contradict that decision. Principle #22 and #32 — operator-facing names stay unqualified."
  - id: D18
    selected: custom
    custom_answer: "Mapping values may reference templates contributed by the same kit, by config, or by kits in the kit's requires + recommends (plus Spider's built-ins) — the same dependency-scoping rule as engine designIds in D7."
    confidence: medium
    principles: [15]
    reasoning: "Option a is too open (any kit's templates, no declared dependency) and option b is too restrictive (can't reference templates from declared dependencies). Principle #15 — cross-kit template references need the same dependency-scope discipline as engine designIds; both offered options violate that principle in opposite directions."
  - id: D19
    selected: a
    confidence: high
    principles: [2]
    reasoning: "Deferred is required for correctness — a kit may register a mapping that references a template from another kit scanned later; registration-time validation would fail on valid configurations. Principle #2 — fail loud, but only once all inputs are present."
  - id: D20
    selected: b
    confidence: high
    principles: [2]
    reasoning: "Same pattern as D15 — mapping collisions across kits are real ambiguity; warn + first-wins is the right loudness."
  - id: D21
    selected: a
    confidence: medium
    principles: [7, 30]
    reasoning: "Principle #7 (ergonomics) — the 'template name = writ type' convention is a real simplification for the common case where a writ has one canonical template. Principle #30 — mappings and templates are separate dimensions and each deserves its own 'default' fallback."
  - id: D22
    selected: a
    confidence: high
    principles: [18]
    reasoning: "Principle #18 — lookupTemplate already lives inside createSpider's closure and has access to registry state; no second consumer justifies threading registries through as parameters."
  - id: D23
    selected: a
    confidence: high
    principles: [2, 7]
    reasoning: "Operator owns their config and should get fast feedback on errors (throw); kit code is plugin-owned and may be outside operator control — a broken plugin shouldn't crash the guild (warn+skip). Principle #2 for the operator path, #7 for the kit path."
  - id: D24
    selected: a
    confidence: high
    principles: [2, 7]
    reasoning: "Same split as D23 — config mappings throw (operator's code, fail fast), kit mappings warn+skip (plugin's code, don't crash the guild)."
  - id: D25
    selected: a
    confidence: low
    principles: []
    no_principle_fired: true
    reasoning: "Log message format is stylistic; option a's dot-path is slightly more greppable but no principle clearly picks. Picked (a) for structural consistency across warning lines."
  - id: D26
    selected: a
    confidence: medium
    principles: [18]
    reasoning: "Principle #18 — a writType→templateName mapping is a string-to-string relation today; array-of-objects speculates on per-mapping metadata that has no consumer. Record<string, string> is also more ergonomic for config authors."
  - id: D27
    selected: a
    confidence: medium
    principles: [7]
    reasoning: "Principle #7 — the 'template named X serves writ type X' convention is a real ergonomic shortcut for the common case; requiring explicit mappings for every writ type is verbose. The convention isn't conflating dimensions (templates and writ types are still separate), it's a fallback behavior."
  - id: D28
    selected: c
    confidence: high
    principles: [13]
    reasoning: "Principle #13 — LoomKit is the established precedent for plugin-kit interfaces, defined alongside registration logic in the main implementation file. Follow the precedent."
  - id: D29
    selected: b
    confidence: high
    principles: [36]
    reasoning: "Principle #36 — if we're formalizing SpiderKit, include the complete set of fields kits can contribute to the Spider. Omitting blockTypes leaves a half-surface that invites ad-hoc extension."
  - id: D30
    selected: a
    confidence: medium
    principles: [3, 5]
    reasoning: "Principle #3 — use the existing named type (WritTypeEntry) rather than duplicating its shape inline. Principle #5 — named object type leaves a clean extension point if future fields are added."
  - id: D31
    selected: a
    confidence: medium
    principles: [13]
    reasoning: "Principle #13 — Loom's pattern (scan both g.kits() and g.apparatuses() at start, plus subscribe to plugin:initialized) is the precedent for correctness when contributions can originate from either startup-ordered source."
  - id: D32
    selected: a
    confidence: high
    principles: [2, 19]
    reasoning: "Config templates are operator-owned → throw immediately (principle #2). Kit templates can be validated at registration time since their inputs are self-contained. Mappings must be deferred — they reference templates that may not yet be scanned (per D19). This is the staggered pattern the information flow actually requires."
  - id: D33
    selected: a
    confidence: medium
    principles: [3]
    reasoning: "Principle #3 — buildFixture is the existing test entry point; extending it to accept LoadedKit objects is the principled shape. The plugin:initialized pattern can still be exercised separately for the Phase 2 path."
  - id: D34
    selected: a
    confidence: high
    principles: [7]
    reasoning: "Same split as D23/D24 — malformed kit field is a plugin-authoring error, not an operator error; warn+skip keeps the guild running. Throwing on a kit typo would punish the operator for a plugin bug."
  - id: D35
    selected: a
    confidence: medium
    principles: [30]
    reasoning: "Principle #30 — mappings and templates are separate dimensions; 'default' should have symmetric semantics in each. Pairs with D21a's precedence chain that uses the mapping default step."

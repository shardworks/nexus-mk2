decisions:
- id: D1
  question: Where does the KitEntry interface live?
  options:
    a: packages/framework/core/src/plugin.ts — alongside Kit, Apparatus, StartupContext
    b: New file packages/framework/core/src/kit-entry.ts
- id: D2
  question: Which kit fields are excluded from KitEntry collection during Wire?
  options:
    a: 'Skip only framework fields: requires, recommends'
    b: Skip framework fields plus books
    c: Skip framework fields plus consumes
- id: D3
  question: Where does the wireKitEntries function live?
  options:
    a: guild-lifecycle.ts as a pure function
    b: arbor.ts inline in createGuild
- id: D4
  question: What is the Wire phase iteration order?
  options:
    a: Standalone kits first, then ordered apparatuses (matches brief's pseudocode)
    b: All plugins in guild.json declaration order
    c: Ordered apparatuses first, then kits
- id: D5
  question: When in the createGuild flow does the Wire phase execute?
  options:
    a: After validation + startup warnings, before guild singleton is set
    b: After validation + startup warnings, after guild singleton is set, before any
      apparatus start()
    c: After topo sort, before validation
- id: D6
  question: Does the Wire phase fire plugin:initialized for kits (matching current
    behavior)?
  options:
    a: Yes — preserve the existing behavior of firing plugin:initialized for kits
      before any start
    b: No — stop firing for kits since no consumer uses it (kit events are dead code
      today)
- id: D7
  question: Does ctx.kits(type) return a copy or a reference to the internal array?
  options:
    a: Filtered copy (new array each call) — matches g.kits()/g.apparatuses() snapshot
      pattern
    b: Reference to internal filtered array — callers must not mutate
- id: D8
  question: How is ctx.kits(type) implemented — pre-indexed Map or on-demand filter?
  options:
    a: Pre-build a Map<string, KitEntry[]> during Wire, ctx.kits(type) reads from
      Map
    b: Store flat KitEntry[], ctx.kits(type) filters on each call
- id: D9
  question: What does ctx.kits(type) return for an unknown type?
  options:
    a: Empty array []
    b: Throw an error
- id: D10
  question: How is the started-apparatus tracking implemented?
  options:
    a: Mutable startedApparatuses array in createGuild, pushed to after each start().
      g.apparatuses() returns spread copy of it.
    b: Keep orderedApparatuses but add a startedSet and filter on each apparatuses()
      call.
- id: D11
  question: When is an apparatus added to the started list — before or after its plugin:initialized/apparatus:started
    event fires?
  options:
    a: After start() returns, before the event fires — event handlers see the apparatus
      in g.apparatuses()
    b: After start() returns and after the event fires
- id: D12
  question: How is the deprecation warning triggered?
  options:
    a: Warn once when ctx.on('plugin:initialized', ...) is called — at registration
      time
    b: Warn once when the old event is fired and handlers exist
    c: Warn every time the old event fires
- id: D13
  question: Does apparatus:started fire for the same apparatus that is currently starting,
    or only for other apparatuses?
  options:
    a: Fires for ALL apparatuses — including those that started before the subscribing
      apparatus registered its handler (same as current plugin:initialized behavior)
    b: Fires only for apparatuses that start AFTER the subscribing apparatus
- id: D14
  question: What argument is passed to apparatus:started handlers?
  options:
    a: The LoadedApparatus object (same as current plugin:initialized)
    b: Just the apparatus id string
    c: A new typed object { id, packageName, version }
- id: D15
  question: During the deprecation period, in what order are the two event names fired?
  options:
    a: apparatus:started first, then plugin:initialized
    b: plugin:initialized first, then apparatus:started
- id: D16
  question: When exactly does phase:started fire?
  options:
    a: After the last apparatus start() and its apparatus:started event complete
    b: After the last apparatus start() but before its apparatus:started event
- id: D17
  question: What argument is passed to phase:started handlers?
  options:
    a: No arguments
    b: The Guild instance
- id: D18
  question: Does the Oculus still subscribe to apparatus:started for tool route registration
    after the refactoring?
  options:
    a: No — tool routes are registered from ctx.kits('tools') like pages/routes, all
      at start() time
    b: Yes — keep apparatus:started subscription to pick up tools registered by apparatuses
      that start after Oculus
- id: D19
  question: Can the Oculus remove scanKit/scanApparatus helper functions entirely?
  options:
    a: Yes — replace both with inline ctx.kits('pages')/ctx.kits('routes') iteration
    b: No — keep a registerFromEntry helper for readability
- id: D20
  question: Does the Instrumentarium still need explicit self-registration of its
    own supportKit tools (tools-list, tools-show)?
  options:
    a: No — Wire phase collects Instrumentarium's own supportKit tools into KitEntry,
      so ctx.kits('tools') includes them
    b: Yes — keep self-registration to ensure tools-list and tools-show are always
      available
- id: D21
  question: How does the Instrumentarium adapt its ToolRegistry.register(plugin) method
    to work with KitEntry?
  options:
    a: Replace register(plugin) calls with a new registerFromEntry(entry) that takes
      a KitEntry directly
    b: Keep register(plugin) and adapt its callers to construct a synthetic LoadedPlugin
      from KitEntry
    c: Inline the registration logic — iterate ctx.kits('tools') entries and call
      registerToolsFromKit directly
- id: D22
  question: How does the Fabricator adapt its EngineRegistry.register(plugin) method?
  options:
    a: Replace with iteration over ctx.kits('engines') entries, calling registerFromKit(entry.value,
      entry.pluginId) directly
    b: Keep register(plugin) for backward compatibility
- id: D23
  question: How does the Loom get the kit's requires/recommends fields for dependency-scoped
    permission validation when using KitEntry?
  options:
    a: Look up the standalone kit from g.kits() by pluginId; for supportKit entries
      (not found in g.kits()), default to pluginId as the sole allowed plugin
    b: Extend KitEntry with optional requires/recommends fields populated from the
      parent kit
    c: Drop dependency-scoped permission validation
- id: D24
  question: How does Loom's registerKitRoles signature change?
  options:
    a: Keep (pluginId, packageName, kit, home) — reconstruct the kit bag from KitEntry.value
      plus g.kits() lookup
    b: 'Change to (entry: KitEntry, home: string) — pass the whole entry and have
      registerKitRoles extract what it needs'
- id: D25
  question: How does Spider's buildDesignSourceMap adapt to ctx.kits?
  options:
    a: Change buildDesignSourceMap to accept KitEntry[] (from ctx.kits('engines'))
      instead of LoadedKit[] + LoadedApparatus[]
    b: Remove buildDesignSourceMap and build the map inline from ctx.kits('engines')
- id: D26
  question: Does Spider's blockTypeRegistry.register still need the LoadedPlugin parameter
    type?
  options:
    a: Yes — keep register(plugin) and wrap KitEntry data into it
    b: No — change to accept KitEntry directly, extract blockTypes from entry.value
- id: D27
  question: Spider currently subscribes to plugin:initialized for late-arriving apparatuses
    to register blockTypes and rigTemplates incrementally. Should any apparatus:started
    subscription remain?
  options:
    a: No — ctx.kits() provides all contributions. Remove the subscription entirely.
    b: Yes — keep apparatus:started for the validateIncrementalMappings call
- id: D28
  question: How does Clerk's registerKitWritTypes adapt?
  options:
    a: Change to accept KitEntry — extract writTypes array from entry.value, pluginId
      from entry.pluginId
    b: Keep (pluginId, kit) signature and pass entry.value as the kit parameter
- id: D29
  question: How does Stacks discover book contributions after g.apparatuses() is fixed?
  options:
    a: Use ctx.kits('books') — include books in KitEntry collection, update Stacks
      start() to iterate entries
    b: Pass the full orderedApparatuses list to Stacks through a private/internal
      mechanism
    c: Stacks accesses the raw apparatus list before the guild singleton is set
- id: D30
  question: How does Stacks adapt reconcileSchemas to use ctx.kits('books')?
  options:
    a: Change reconcileSchemas to iterate KitEntry[] — each entry has pluginId (ownerId)
      and value (books record)
    b: Add a new method reconcileFromEntries alongside the existing reconcileSchemas
- id: D31
  question: Does Stacks need to accept the StartupContext parameter now?
  options:
    a: Yes — start(ctx) already receives StartupContext, but the internal StacksApparatus.start()
      ignores it. Update to pass and use ctx.
    b: No — pass KitEntry[] to reconcileSchemas from the outer start() closure
- id: D32
  question: How should test helpers build a StartupContext with kits()?
  options:
    a: Add kitEntries parameter to buildTestContext/buildCtx helpers; construct a
      Map for kits(type) lookup
    b: Use the real buildStartupContext from guild-lifecycle.ts with synthetic KitEntry
      data
- id: D33
  question: Where do the new Wire phase tests go?
  options:
    a: guild-lifecycle.test.ts for wireKitEntries (unit), arbor.test.ts for integration
    b: Only arbor.test.ts (integration tests cover both)
- id: D34
  question: Should the arbor.test.ts installFakeApparatus helper gain supportKit support?
  options:
    a: Yes — add a supportKit parameter to installFakeApparatus for testing Wire phase
    b: No — create a separate helper installFakeApparatusWithSupportKit
- id: D35
  question: Should collectStartupWarnings check supportKit contribution types against
    consumes?
  options:
    a: No — out of scope for this change; currently only checks standalone kits. Keep
      behavior unchanged.
    b: Yes — the Wire phase makes all contributions visible; extend the warning check
      to cover supportKit types too.
- id: D36
  question: Does ctx.kits(type) need to be available after start() completes, or only
    during start()?
  options:
    a: Only during start() — same lifecycle as ctx.on()
    b: Persists — ctx can be captured and kits() called later (e.g., in handlers)
- id: D37
  question: Do consumers remove their imports of isLoadedKit/isLoadedApparatus after
    refactoring?
  options:
    a: Yes — remove unused imports for isLoadedKit, isLoadedApparatus, LoadedPlugin,
      LoadedKit, LoadedApparatus where they are only used for the scan+subscribe pattern
    b: No — keep imports for potential future use

decisions:
- id: D1
  question: What page ID and title to register in supportKit.pages?
  options:
    a: 'id: ''feedback'', title: ''Feedback'''
    b: 'id: ''input-requests'', title: ''Input Requests'''
    c: 'id: ''patron-review'', title: ''Review'''
- id: D2
  question: What directory path for the feedback page's static assets?
  options:
    a: '''src/static/feedback'' — subdirectory of the existing spider static dir'
    b: '''pages/feedback'' — separate top-level pages directory like the Clerk''s
      writs page'
- id: D3
  question: What are the correct REST endpoint URLs for the input-request tools?
  options:
    a: 'Use URLs from the brief''s table: /api/input-request/list, /api/input-request/show,
      etc.'
    b: 'Use the actual URLs produced by toolNameToRoute: /api/input/request-list,
      /api/input/request-show, etc.'
- id: D4
  question: What default status filter to apply on page load?
  options:
    a: '''pending'' — match the tool''s default'
    b: No filter (show all statuses)
- id: D5
  question: How to implement the status filter UI?
  options:
    a: 'A <select> dropdown with options: pending / completed / rejected'
    b: Tab-style buttons for each status (like the spider page's tab bar)
    c: A <select> dropdown with an additional 'All' option showing all statuses
- id: D6
  question: What limit to pass when fetching the list?
  options:
    a: Use the tool's default (20)
    b: Pass a higher limit (e.g., 50 or 100) since the UI is a visual dashboard
- id: D7
  question: What polling interval for new pending requests on the list view?
  options:
    a: 10 seconds
    b: 15 seconds
    c: 12 seconds
- id: D8
  question: When polling refreshes the list, should it preserve the current status
    filter selection?
  options:
    a: Yes — re-fetch with the currently selected status filter
    b: No — always poll for pending only, regardless of filter selection
- id: D9
  question: Should polling be active only on the list view, or also when the detail
    view is shown?
  options:
    a: List view only — stop polling when viewing a detail, resume on back
    b: Always poll in background regardless of current view
- id: D10
  question: What information to show on each list card?
  options:
    a: Request ID, rig ID, engine ID, message, status badge, created timestamp
    b: Same as (a) plus an answered-question count (e.g., '3/5 answered')
- id: D11
  question: What badge class mapping to use for input request statuses?
  options:
    a: pending → badge--warning, completed → badge--success, rejected → badge--error
- id: D12
  question: What to show when the request list is empty?
  options:
    a: Use the shared .empty-state class with a message like 'No {status} requests.'
    b: Show nothing — just an empty container
- id: D13
  question: How to navigate from list to detail view?
  options:
    a: Click on a request card to fetch full request and show detail view (same as
      spider page list→detail)
    b: Use the list data directly without re-fetching (the list already returns full
      InputRequestDoc)
- id: D14
  question: How to order questions in the detail view?
  options:
    a: Iterate Object.keys(questions) in insertion order
    b: Sort alphabetically by question key
    c: Group by question type (choice first, then boolean, then text)
- id: D15
  question: Where to display the request's message field in the detail view?
  options:
    a: Prominently at the top, before the question list, as a heading or large text
      block
    b: As a subtitle under the request ID heading
- id: D16
  question: How to render choice question options — showing option key, description,
    or both?
  options:
    a: Show option key as primary text, description as secondary/dim text
    b: Show description only — the key is an internal identifier
    c: 'Show key and description side-by-side: ''key — description'''
- id: D17
  question: How to render the expandable details/context for questions?
  options:
    a: A clickable text toggle ('Show details' / 'Hide details') that toggles visibility
      of a details block
    b: A native <details>/<summary> HTML element
- id: D18
  question: Should boolean questions default to 'unanswered' (neither checked nor
    unchecked) when no pre-filled answer exists?
  options:
    a: Yes — show an indeterminate state (plain border, no check/X) until clicked
    b: No — default to false (unchecked state with red X)
- id: D19
  question: Should read-only rendering be used for completed/rejected requests in
    the detail view?
  options:
    a: Yes — disable form controls and hide action buttons for non-pending requests
    b: No — always show interactive controls (the API will reject mutations on non-pending
      requests anyway)
- id: D20
  question: How to construct the POST body for the input-request-answer endpoint for
    each question type?
  options:
    a: 'Choice: {id, question, select: optionKey} or {id, question, custom: text}.
      Boolean: {id, question, value: ''true''/''false''}. Text: {id, question, value:
      text}.'
    b: Same as (a) but send boolean as native true/false in JSON
- id: D21
  question: When should text answers auto-save?
  options:
    a: On blur (when the textarea loses focus)
    b: On change (when the value changes and the field loses focus)
    c: With a debounce timer (e.g., 500ms after last keystroke)
- id: D22
  question: How to handle auto-save errors (e.g., network failure, request already
    completed by another patron)?
  options:
    a: Show a brief inline error message near the question that failed to save, auto-dismiss
      after a few seconds
    b: Show a persistent error banner at the top of the detail view
    c: Silently retry once, then show error on second failure
- id: D23
  question: Should auto-save track local state to avoid redundant POSTs?
  options:
    a: Yes — track local answer state and only POST when the answer actually changes
    b: No — always POST on interaction, even if the answer hasn't changed
- id: D24
  question: When a custom text input is used for a choice question, what triggers
    the auto-save?
  options:
    a: On blur of the custom input field (same as text questions)
    b: On enter keypress and on blur
- id: D25
  question: When a custom answer is typed into the custom input for a choice question,
    should the radio selection be cleared?
  options:
    a: 'Yes — deselect any radio option and send {custom: text} as the answer'
    b: No — keep the radio selected and only use custom if no radio is selected
- id: D26
  question: When a radio option is clicked for a choice question that has a custom
    answer, should the custom input be cleared?
  options:
    a: 'Yes — clear the custom input text and send {select: optionKey}'
    b: No — keep the custom text visible but send the radio selection
- id: D27
  question: How to show the answered-question count indicator?
  options:
    a: Text near the Complete button, e.g., '3/5 answered'
    b: Text in the page header area
    c: As a badge on the Complete button itself
- id: D28
  question: How to implement the rejection reason prompt?
  options:
    a: Inline text input that appears when the Reject button is clicked, with a confirm
      button
    b: A browser prompt() dialog
    c: Always-visible text input near the Reject button
- id: D29
  question: After successful completion, what success state to show before navigating
    back to the list?
  options:
    a: Flash a brief success message/badge on the detail view, then navigate back
      after ~1.5s
    b: Navigate back immediately and show a success toast/badge on the list view
    c: Navigate back immediately with no success indicator
- id: D30
  question: Should the Complete button be fully disabled (grayed out) or visually
    enabled with validation on click?
  options:
    a: Disabled with opacity:0.4 and cursor:not-allowed until all questions answered
    b: Always clickable, show validation error on click if unanswered questions remain
- id: D31
  question: Should the Reject button be available at any time (even with partial answers)
    or only when no answers exist?
  options:
    a: Always available for pending requests — rejection can happen at any point
    b: Only available when zero answers have been provided
- id: D32
  question: Should the page-specific CSS use fallback values for custom properties
    (like spider.css does)?
  options:
    a: 'Yes — use var(--border, #3b4261) with fallback values for defensive coding'
    b: No — use bare var(--border) since the Oculus always injects style.css
- id: D33
  question: Should the CSS use the exact class names and rules from the brief, or
    adapt them?
  options:
    a: Use the brief's CSS verbatim as the starting point — class names, rules, and
      values exactly as specified
    b: Adapt class names and rules to match existing codebase conventions
- id: D34
  question: How to style boolean questions that are in the indeterminate/unanswered
    state?
  options:
    a: Default border color (--border), empty interior, no check or X
    b: Dashed border to indicate 'not yet answered'
- id: D35
  question: What page title to show in the <h1>?
  options:
    a: '''Feedback'''
    b: '''Input Requests'''
    c: '''Patron Review'''
- id: D36
  question: How to implement list↔detail navigation?
  options:
    a: 'Two div containers (#list-view, #detail-view) toggled with style.display —
      same as the spider page'
    b: Single container with content replaced dynamically
- id: D37
  question: How to render question card HTML — string concatenation (spider pattern)
    or DOM API?
  options:
    a: String concatenation with innerHTML, matching spider.js pattern
    b: DOM createElement/appendChild API calls
- id: D38
  question: Where to place event listeners for interactive question controls?
  options:
    a: Attach after rendering innerHTML, using querySelectorAll to find elements (spider
      page pattern)
    b: Use event delegation on a parent container with data-* attributes
- id: D39
  question: How to identify question elements in the DOM for event delegation?
  options:
    a: data-question-key attribute on question cards and interactive elements
    b: data-key attribute (shorter)
- id: D40
  question: How to identify option elements within a choice question for event delegation?
  options:
    a: data-option-key attribute on each option row
    b: data-value attribute
- id: D41
  question: What test file name and location for the feedback page UI tests?
  options:
    a: packages/plugins/spider/src/static/feedback/feedback-ui.test.ts
    b: packages/plugins/spider/src/static/feedback-ui.test.ts (outside the feedback
      dir, alongside spider-ui.test.ts)
- id: D42
  question: What structural patterns should the source-text regression tests verify?
  options:
    a: IIFE wrapper, question-type branching (choice/boolean/text), answer POST body
      shapes, badge class mapping, event delegation on data-* attributes
    b: Only the IIFE wrapper and question-type branching
- id: D43
  question: What file names for the three static assets?
  options:
    a: index.html, feedback.css, feedback.js
    b: index.html, style.css, app.js
- id: D44
  question: What HTML structure for the page's index.html?
  options:
    a: 'Standard HTML5 with <main style=''padding: 24px''>, <h1>, list-view div, detail-view
      div (hidden), linking feedback.css and feedback.js'
    b: Same as (a) but with inline styles instead of external CSS
- id: D45
  question: How to visually indicate read-only mode for completed/rejected requests?
  options:
    a: Hide the Complete/Reject buttons, add opacity:0.6 to question cards, disable
      click handlers
    b: Show buttons as disabled, show a status banner at top ('This request has been
      completed/rejected')
- id: D46
  question: Should clicking a request card on the list view re-fetch the request via
    input-request-show before rendering the detail?
  options:
    a: No — use the data from the list response (decided in D13 to use list data)
    b: Yes — always re-fetch for freshest data

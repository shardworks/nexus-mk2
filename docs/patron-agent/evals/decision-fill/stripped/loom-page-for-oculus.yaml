decisions:
- id: D1
  question: How should the Loom expose role listing — new method on LoomApi, or only
    via tool handlers accessing closure state directly?
  options:
    a: Add listRoles() to the LoomApi interface — tool handlers and other apparatus
      can call it
    b: Keep LoomApi unchanged — tool handlers access closure variables (config, kitRoles)
      directly
- id: D2
  question: What type shape should listRoles() return?
  options:
    a: 'Array of RoleInfo objects: { name, permissions, strict, source }'
    b: Record<string, RoleInfo> keyed by role name
    c: Array with additional fields like hasInstructions, instructionsLength
- id: D3
  question: What should the RoleInfo.source field contain for kit-contributed roles?
  options:
    a: The plugin ID (e.g. 'animator') — extracted from the qualified name prefix
      before the first dot
    b: 'The full qualified name prefix plus a type discriminator (e.g. { type: ''kit'',
      pluginId: ''animator'' })'
    c: A string literal 'guild' for guild roles, the plugin ID string for kit roles
- id: D4
  question: Should RoleInfo include whether the role has instructions (from roleInstructions
    map)?
  options:
    a: Yes — include a hasInstructions boolean field
    b: No — the page can infer instruction presence from the weave result's systemPrompt
- id: D5
  question: Where should the RoleInfo type be defined?
  options:
    a: In loom.ts alongside the other public types (LoomApi, RoleDefinition, etc.)
    b: In a separate types.ts file
- id: D6
  question: Should RoleInfo.name for a kit-contributed role be the full qualified
    name (e.g. 'animator.scribe') or the short name (e.g. 'scribe')?
  options:
    a: Full qualified name — matches the key used in kitRoles and the name you pass
      to weave()
    b: Short name with source providing the prefix
- id: D7
  question: 'Should the Loom add recommends: [''oculus''] at the apparatus level?'
  options:
    a: 'Yes — add recommends: [''oculus''] to the apparatus definition'
    b: No — the page/tools work without it since the Oculus scans supportKit contributions
      generically
- id: D8
  question: What page ID and title should the contributed page use?
  options:
    a: 'id: ''loom'', title: ''Roles'''
    b: 'id: ''roles'', title: ''Roles'''
    c: 'id: ''loom'', title: ''Loom'''
- id: D9
  question: Where should the static page files live in the Loom package?
  options:
    a: 'packages/plugins/loom/pages/loom/ — top-level pages directory, dir: ''pages/loom'''
    b: 'packages/plugins/loom/src/pages/loom/ — under src, dir: ''src/pages/loom'''
- id: D10
  question: Should the package.json 'files' array be updated to include 'pages'?
  options:
    a: Yes — add 'pages' to the files array so pages are included in the published
      npm package
    b: No — workspace usage doesn't require it and the files array only matters for
      npm publish
- id: D11
  question: How should the page's data endpoints be implemented — patron tools in
    supportKit or custom Hono routes?
  options:
    a: Patron tools via supportKit.tools — Oculus auto-maps them to REST endpoints
    b: Custom routes via supportKit.routes — requires Hono as a dependency
- id: D12
  question: What tool names should be used for the data API?
  options:
    a: loom-roles and loom-weave → /api/loom/roles and /api/loom/weave
    b: roles-list and roles-weave → /api/roles/list and /api/roles/weave
    c: loom-list and loom-preview → /api/loom/list and /api/loom/preview
- id: D13
  question: What should the callableBy setting be for the new tools?
  options:
    a: 'callableBy: [''patron''] — only humans via CLI/dashboard, not animas in sessions'
    b: No callableBy — accessible to all callers including animas
- id: D14
  question: What parameters should the loom-weave tool accept?
  options:
    a: 'role: z.string() — required role name'
    b: 'role: z.string().optional() — optional, returns charter-only weave when omitted'
- id: D15
  question: How should the loom-weave tool serialize ResolvedTool[] in the response
    (since it contains Zod schemas and function handlers)?
  options:
    a: Map each ResolvedTool to { name, description, permission, pluginId }
    b: Map each ResolvedTool to { name, description } only
    c: Return tool names as a flat string array
- id: D16
  question: Should the loom-weave tool call the internal api.weave() or reimplement
    the logic?
  options:
    a: Call api.weave() and transform the result for JSON serialization
    b: Reimplement tool resolution and prompt composition in the tool handler
- id: D17
  question: Should the loom-roles tool have a permission field?
  options:
    a: No permission — permissionless GET endpoint
    b: 'permission: ''read'' — requires loom:read grant'
- id: D18
  question: Should the loom-weave tool handler call api.weave() directly (closure
    reference) or go through guild().apparatus<LoomApi>('loom').weave()?
  options:
    a: Direct closure reference — the tool is defined inside createLoom() and has
      access to the api object
    b: Via guild().apparatus() — the tool goes through the public API
- id: D19
  question: Should the page be a single index.html file with inline JavaScript, or
    separate .html and .js files?
  options:
    a: Single index.html with inline <script> — simplest; no module loading concerns
    b: Separate index.html + app.js — cleaner separation
- id: D20
  question: What layout should the roles page use?
  options:
    a: Role list table at top, detail panel below when a role is selected
    b: 'Two-column layout: role list on left, detail panel on right'
    c: Single table with expandable rows
- id: D21
  question: What should the role list table columns be?
  options:
    a: Name, Permissions (count), Strict, Source
    b: Name, Source, Permissions (full list)
    c: Name, Source
- id: D22
  question: How should the detail panel display the system prompt?
  options:
    a: In a <pre> block, showing the full composed text
    b: In a collapsible <details> element, since prompts can be very long
    c: Truncated with a 'show full' toggle
- id: D23
  question: Should the page use the Oculus's shared CSS classes or define custom styles?
  options:
    a: Use shared classes (.card, .data-table, .badge, etc.) — no custom CSS needed
    b: Use shared classes plus a separate page-specific CSS file
- id: D24
  question: What badge style should be used for role source in the table?
  options:
    a: badge--info for guild roles, badge--success for kit roles (generic color per
      source type)
    b: badge (default dim) for guild roles, badge--info for kit roles
- id: D25
  question: How should the page handle the case where there are zero roles?
  options:
    a: Show an empty-state message using the .empty-state class
    b: Show the table header with no rows
- id: D26
  question: How should the detail panel display tools — as a table or a list?
  options:
    a: 'Table with columns: Name, Permission, Plugin'
    b: Bulleted list of tool names
- id: D27
  question: Should the page display environment variables as a table or key-value
    pairs?
  options:
    a: 'Table with columns: Variable, Value'
    b: Inline formatted as KEY=value
- id: D28
  question: Should the loom-roles tool and loom-weave tool provide descriptions aimed
    at patron CLI usage or dashboard usage?
  options:
    a: Generic descriptions that work for both CLI and dashboard contexts
    b: Dashboard-focused descriptions
- id: D29
  question: Should listRoles() be synchronous or asynchronous?
  options:
    a: Synchronous — returns RoleInfo[] directly, since all role data is cached in
      memory at startup
    b: Asynchronous — returns Promise<RoleInfo[]> for future flexibility
- id: D30
  question: Should the Loom import tool() as a runtime import or continue using only
    type imports from @shardworks/tools-apparatus?
  options:
    a: Add runtime import of tool from @shardworks/tools-apparatus alongside existing
      type imports
    b: Define tools inline without the tool() factory
- id: D31
  question: Should the RoleInfo type export from index.ts be a type-only export?
  options:
    a: Yes — export type { RoleInfo } since it's only used as a type by consumers
    b: No — export it alongside other types in the existing type export block
- id: D32
  question: Should the page fetch roles on load automatically or require a user action?
  options:
    a: Fetch roles automatically on page load
    b: Show a 'Load' button that triggers the fetch
- id: D33
  question: When the user selects a role, should the page highlight the selected row?
  options:
    a: Yes — apply a visual highlight (background color) to the selected row
    b: No — the detail panel below is sufficient indication

decisions:
- id: D1
  question: What should the orchestrator label in the flow diagram (line 494) say
    after removing stale options?
  options:
    a: Label as 'Caller (Spider engine, direct tool invocation)' — names the two realistic
      callers
    b: Label as 'Spider engine (or other caller)' — names the primary caller, acknowledges
      extensibility
    c: Label as 'Orchestrator (rig engine, direct invocation)' — keeps generic framing,
      drops only the stale options
- id: D2
  question: How should line 15's orchestrator list be updated?
  options:
    a: Replace with 'the caller's concern — the Spider's engines, direct tool invocation,
      or other automation'
    b: Simplify to 'the caller's concern' with no enumeration of specific callers
    c: Replace with 'the caller's concern — rig engines or direct invocation'
- id: D3
  question: 'Should the Dependencies section be updated to show the actual requires:
    [] or should it document a planned Stacks dependency?'
  options:
    a: 'Update to requires: [] with a note that Stacks integration is future work
      (matches code)'
    b: 'Keep requires: [''stacks''] as aspirational, add a note that it''s not yet
      implemented'
- id: D4
  question: How should the Dependencies section describe what the Scriptorium actually
    depends on?
  options:
    a: Remove the Dependencies section entirely — no apparatus dependencies means
      nothing to document
    b: 'Keep the section with requires: [] and a brief note that the Scriptorium uses
      guild.json (via framework APIs) for persistence, with Stacks integration planned'
- id: D5
  question: Should the MVP scope banner be removed, updated, or replaced?
  options:
    a: Remove the banner entirely — the doc is no longer MVP, it's an implemented
      API contract
    b: 'Update the banner to reflect current state: Clockworks event emission and
      Surveyor integration remain future work, but drop the MVP framing'
    c: Keep the banner but update its content to say the Scriptorium is implemented;
      future work is Stacks persistence, Clockworks events, and Surveyor integration
- id: D6
  question: 'Should the ''Future: Clockworks Events'' section be removed, preserved,
    or reframed?'
  options:
    a: Keep the section as-is — it's explicitly labeled 'Future' and the events are
      still plausible
    b: Keep the section but add a note that the Spider currently uses CDC for rig-level
      reactivity, and these events would serve broader guild integration
    c: Remove the section — CDC is the reactive pattern now, and these events may
      never be implemented via Clockworks
- id: D7
  question: 'Should the ''Future State: Draft Persistence via Stacks'' section acknowledge
    that CDC is already operational for rigs?'
  options:
    a: Add a parenthetical noting that CDC is already used by the Spider for rig-level
      state changes
    b: Leave as-is — the section is about draft-specific CDC, which is indeed future
- id: D8
  question: How should the README's stale Stacks dependency claim be fixed?
  options:
    a: Remove the Stacks dependency claim entirely
    b: Replace with a note about in-memory state tracking with guild.json persistence
      for the codex registry
- id: D9
  question: Should the 'standing order' reference in the Draft Cleanup section (line
    651) be updated?
  options:
    a: Leave as-is — standing orders are a plausible reaper mechanism even in the
      Spider world
    b: Replace 'standing order' with a more generic term like 'automated process'

decisions:
- id: D1
  question: What is the engine design id?
  options:
    a: '''anima-session'' (hyphenated, matches the brief verbatim)'
    b: '''animaSession'' (camelCase, no existing engine uses multi-word ids)'
- id: D2
  question: What is the source file name for the engine?
  options:
    a: anima-session.ts (kebab-case, matching the engine id)
    b: animaSession.ts (no existing engine file is multi-word, but TS convention is
      camelCase)
- id: D3
  question: What is the export name from engines/index.ts?
  options:
    a: animaSessionEngine (camelCase, matching pattern of implementEngine, reviewEngine,
      etc.)
    b: animaSession (shorter, drops the 'Engine' suffix)
- id: D4
  question: What key is used in the supportKit.engines dict?
  options:
    a: '''anima-session'' (matching the engine id)'
    b: '''animaSession'' (camelCase object key)'
- id: D5
  question: Should the engine validate that required givens (role, prompt) are present
    and throw on missing?
  options:
    a: Yes — throw a descriptive Error if role or prompt is missing/not-a-string
    b: No — cast blindly as the brief's code shows (role as string, prompt as string),
      let downstream errors surface naturally
- id: D6
  question: What is the cwd resolution chain when givens.cwd is missing?
  options:
    a: Fall back to context.upstream['draft']?.path if available; throw if neither
      exists (cwd is required by SummonRequest)
    b: Fall back to context.upstream['draft']?.path; pass undefined to summon and
      let the Animator handle it
    c: Fall back to context.upstream['draft']?.path; fall back to process.cwd() as
      final default
- id: D7
  question: How is the environment field assembled?
  options:
    a: 'When writ is present: { GIT_AUTHOR_EMAIL: `${writ.id}@nexus.local` }. When
      writ is absent: omit environment entirely (undefined).'
    b: 'When writ is present: { GIT_AUTHOR_EMAIL: `${writ.id}@nexus.local` }. When
      writ is absent: pass empty object {}.'
- id: D8
  question: How is the metadata field assembled?
  options:
    a: Always includes engineId from context.engineId; conditionally includes writId
      when writ is present
    b: Always includes both engineId and writId (writId as undefined when no writ)
- id: D9
  question: Should a typed yields interface be defined for anima-session?
  options:
    a: No — the engine uses the generic default collect, so yields are whatever the
      generic default produces. No engine-specific type needed.
    b: Yes — define AnimaSessionYields in types.ts for documentation and downstream
      consumers who type-assert upstream yields.
- id: D10
  question: Where in the builtinEngineIds registrations does anima-session go?
  options:
    a: Add to both the builtinEngineIds Set in validateTemplates AND the builtinIds
      array in buildDesignSourceMap
    b: Only add to builtinIds in buildDesignSourceMap (validateTemplates can look
      up the Fabricator)
- id: D11
  question: Does the engine import DraftYields for the cwd fallback?
  options:
    a: Yes — import DraftYields from ../types.ts and cast context.upstream['draft']
      as DraftYields | undefined
    b: 'No — use inline property access: (context.upstream[''draft''] as { path?:
      string } | undefined)?.path'
- id: D12
  question: How should conversationId be added to the generic default yields?
  options:
    a: 'Conditional spread: ...(session.conversationId !== undefined ? { conversationId:
      session.conversationId } : {})'
    b: 'Always include: conversationId: session.conversationId (may be undefined)'
- id: D13
  question: Should ReviseYields type be updated to reflect the new generic default
    shape?
  options:
    a: No — ReviseYields is already inaccurate (missing output) and the type is barely
      used. Leave it; note the discrepancy.
    b: 'Yes — add conversationId?: string and output?: string to ReviseYields to match
      reality.'
- id: D14
  question: Does the existing test mock need to be updated for conversationId in yields?
  options:
    a: Yes — add a test-specific mock variant that populates conversationId in SessionDoc,
      used by anima-session tests
    b: No — existing tests pass unchanged (conversationId absent from mock sessions
      means the field is simply omitted from yields)
- id: D15
  question: What is the variable syntax for yield references?
  options:
    a: '''$yields.<engineId>.<field>'' and ''${yields.<engineId>.<field>}'' (matching
      existing $writ / ${writ} normalization)'
    b: '''$upstream.<engineId>.<field>'' (matches the EngineRunContext property name
      ''upstream'')'
- id: D16
  question: When should $yields.* references be resolved — at spawn time or at run
    time?
  options:
    a: Run time (in tryRun, after upstream yields are available)
    b: Spawn time with deferred markers (store unresolved refs in givensSpec, resolve
      in tryRun)
- id: D17
  question: How should resolveGivens handle $yields.* references at spawn time?
  options:
    a: Pass them through as literal strings (keep the '$yields...' string in givensSpec
      for later resolution)
    b: Strip them and set to a sentinel value (e.g. null) that tryRun recognizes
- id: D18
  question: What depth of path traversal should $yields.* support?
  options:
    a: 'Single level only: $yields.<engineId>.<field> — one property access on the
      yields object'
    b: 'Arbitrary depth: $yields.<engineId>.<field>.<subfield>.* — dot-path traversal'
- id: D19
  question: What happens when a $yields.* reference cannot be resolved (engine not
    completed or field missing)?
  options:
    a: Omit the key from givens (same behavior as $vars.* when the variable is undefined)
    b: Throw an error — the upstream should be completed since the engine declared
      it as upstream
    c: Set to undefined and let the engine decide
- id: D20
  question: Where does the late-resolution step go in tryRun?
  options:
    a: After `const givens = { ...pending.givensSpec }` and before `design.run(givens,
      context)` — a new function resolveYieldRefs(givens, upstream)
    b: Inline in tryRun — iterate givens entries and resolve in-place
- id: D21
  question: How should validation accept $yields.* references in templates?
  options:
    a: Add $yields.* to the valid variable regex in both validateTemplates and validateKitTemplate
    b: Replace the exact-match validation with a more general allowlist approach
- id: D22
  question: Should $yields.* validation check that the referenced engineId exists
    in the same template?
  options:
    a: Yes — validate that the engineId in $yields.<engineId>.field matches an engine
      id declared in the template, and that it's in the referencing engine's upstream
      (transitive)
    b: Yes — validate that the engineId exists in the template, but don't check upstream
      transitivity
    c: No — just validate the syntax pattern; runtime resolution handles missing refs
      by omitting the key
- id: D23
  question: Should $yields.* references be supported in string interpolation within
    givens values (e.g. embedding in the middle of a prompt string)?
  options:
    a: No — whole-value replacement only. A given value that is '$yields.x.y' gets
      replaced entirely. Embedded references in longer strings are not supported.
    b: Yes — support ${yields.x.y} embedded in arbitrary strings, enabling prompt
      templates like 'Review the work from session ${yields.impl.sessionId}'
- id: D24
  question: Should the $yields.* late-resolution also apply to existing engines, or
    only new templates using anima-session?
  options:
    a: Apply universally — any engine's givensSpec can use $yields.* references
    b: Only enabled for anima-session

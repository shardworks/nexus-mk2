decisions:
- id: D1
  question: How should the CLI README organize the 'Standard Guild Commands' section
    — by functional domain (current) or by contributing apparatus?
  options:
    a: Keep functional-domain grouping (Commissions, Sessions, Codexes, Rigs, etc.)
      with accurate Source column
    b: Group by contributing apparatus (clerk, animator, codexes, spider, tools, parlour)
- id: D2
  question: Should aspirational/unimplemented commands be listed in the README at
    all?
  options:
    a: Remove all aspirational commands — only list tools that exist in code today
    b: Keep aspirational commands but clearly mark them (e.g., a 'Planned' badge or
      separate section)
    c: Remove aspirational commands from the main table, add a brief 'Planned' section
      at the bottom listing future intent without implying they exist
- id: D3
  question: Should the Source column in the command table use npm package names or
    apparatus display names?
  options:
    a: Use apparatus display names — 'Clerk', 'Animator', 'Spider', etc.
    b: Use plugin package short names — 'clerk', 'animator', 'spider', etc. (matching
      plugin id derivation)
    c: Use npm package names — '@shardworks/clerk-apparatus', etc.
- id: D4
  question: Should the 'Migration Status' section be rewritten, removed, or replaced?
  options:
    a: Rewrite to accurately reflect what's migrated and what remains
    b: Remove entirely — v2 is the CLI, the migration framing is no longer useful
    c: Replace with a brief note acknowledging v1 heritage without a detailed migration
      tracker
- id: D5
  question: What updates does review-loop.md actually need given the inventory finding
    that Option A is already absent?
  options:
    a: Update only the status line to reflect partial implementation (engines exist)
    b: Update status line and do a light pass verifying doc content against actual
      Spider engine implementations (review.ts, revise.ts, seal.ts)
    c: No changes needed — the doc already reflects Spider as sole design, and 'Design'
      status is acceptable for a not-fully-wired feature
- id: D6
  question: What status label should review-loop.md use?
  options:
    a: '''Partially implemented'' — engines exist but the full loop may not be wired'
    b: '''Design'' with a note listing what''s implemented (engines) and what''s not
      (rig pattern wiring, configuration)'
    c: Keep 'Design (not yet implemented)' until the full loop is confirmed working
- id: D7
  question: Should _agent-context.md's package table be rewritten to match CLAUDE.md's
    project structure, or maintain its own format?
  options:
    a: Rewrite the table to list all current packages with accurate npm names and
      descriptions, keeping the table format
    b: Replace the table with a pointer to CLAUDE.md's project structure and add only
      supplementary notes
- id: D8
  question: Should the 'Rig Terminology Collision' section be removed, rewritten,
    or kept as historical context?
  options:
    a: Remove entirely — the collision is resolved
    b: Rewrite as a brief historical note ('the rename happened') to help agents who
      encounter old code or docs
    c: Keep as-is for agents who might encounter legacy references
- id: D9
  question: Should 'What's Implemented vs. Aspirational' be rewritten as a current-state
    inventory or removed?
  options:
    a: Rewrite both lists to reflect current state — move implemented items, keep
      genuinely aspirational ones
    b: Remove the section — the distinction is less useful now that most apparatus
      exist; agent should read code
    c: Replace with a single list of 'not yet implemented' items — everything else
      is assumed implemented
- id: D10
  question: Should _agent-context.md's 'Key Files to Read' table be updated with correct
    paths or removed?
  options:
    a: Update all paths to current correct values and add entries for new apparatus
    b: Remove the table — agents can use grep/glob to find files
- id: D11
  question: Should the 'Design Decisions' sections (sessions 3 and 4) be kept, trimmed,
    or removed?
  options:
    a: Keep as-is — they're a useful historical record and don't actively mislead
    b: Trim to a summary table (decision | status | where it landed) and remove detailed
      rationale
    c: Remove — the decisions are implemented and documented elsewhere
- id: D12
  question: Should the 'Architecture Docs Status' table be updated or removed?
  options:
    a: Update ratings for docs that have changed — verify each doc's current accuracy
    b: Remove the table — agents should form their own assessment
    c: Add a 'last verified' date to each row and update the ones we can verify during
      this pass
- id: D13
  question: Should the session notes and 'Next Steps' sections be updated or left
    as historical?
  options:
    a: Update the 'Next Steps' checklist to reflect what's been completed since session
      4; leave session notes as-is
    b: Leave both as-is — they're historical records that don't actively mislead

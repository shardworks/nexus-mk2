decisions:
- id: D1
  question: What is the field name for the conditional activation property on RigTemplateEngine?
  options:
    a: '`when` ‚Äî reads naturally in template context'
    b: '`if` ‚Äî more programmer-familiar'
    c: '`condition` ‚Äî more formal'
- id: D2
  question: What shape is the `when` expression ‚Äî how are conditions expressed?
  options:
    a: 'Single yield reference string with optional `!` negation prefix: `"$yields.review.passed"`
      or `"!$yields.review.passed"`'
    b: 'Structured condition object: `{ ref: "$yields.review.passed", negate: true
      }`'
    c: 'Full expression string with operators: `"$yields.review.passed == false"`'
- id: D3
  question: Should a new `skipped` EngineStatus be added, or should `cancelled` be
    reused for condition-false engines?
  options:
    a: Add new `skipped` status to EngineStatus union
    b: Reuse existing `cancelled` status
- id: D4
  question: When is the `when` condition evaluated ‚Äî at spawn time or at runtime?
  options:
    a: At spawn time in `buildFromTemplate()` ‚Äî pre-determine which engines are skipped
    b: At runtime in the crawl loop ‚Äî evaluate when the engine's upstream is all done
- id: D5
  question: Where in the crawl loop does condition evaluation happen?
  options:
    a: Integrated in `tryRun()` ‚Äî when the next runnable engine has a false `when`,
      skip it there and return `engine-skipped`
    b: Separate crawl phase `tryEvaluateConditions()` between `checkBlocked` and `run`
- id: D6
  question: Does a `skipped` upstream engine satisfy downstream `upstream` dependencies?
  options:
    a: Yes ‚Äî `skipped` counts as 'done' for upstream satisfaction (alongside `completed`)
    b: No ‚Äî downstream engines that depend on a skipped engine are also skipped/cancelled
- id: D7
  question: How does rig completion change to account for `skipped` engines?
  options:
    a: Rig completes when every engine is `completed` or `skipped`, and at least one
      is `completed`
    b: Rig completes when every engine is in any terminal status (`completed`, `skipped`,
      `cancelled`, `failed`)
    c: No change ‚Äî `skipped` is not a terminal status; skipped engines are excluded
      from the completion check
- id: D8
  question: What CrawlResult variant is returned when an engine is skipped?
  options:
    a: 'New `engine-skipped` action: `{ action: ''engine-skipped''; rigId: string;
      engineId: string }`'
    b: Reuse `engine-completed` ‚Äî skipping is a form of completion
- id: D9
  question: Should `engine-skipped` also trigger rig completion/blocked checks (same
    as engine-completed does)?
  options:
    a: Yes ‚Äî after skipping, check if the rig is now fully complete or blocked
    b: No ‚Äî just skip and return; the next crawl will pick up any downstream effects
- id: D10
  question: How is the `when` field persisted on EngineInstance (the runtime rig document)?
  options:
    a: 'Add an optional `when?: string` field to `EngineInstance`, copied from the
      template at spawn time'
    b: Don't persist ‚Äî store it only in givensSpec as a special key
- id: D11
  question: How is the `when` expression evaluated at runtime?
  options:
    a: Resolve the yield reference to a value, then check JavaScript truthiness. `!`-prefixed
      means negate the truthiness.
    b: Resolve the yield reference, then strict-compare to `true`/`false`.
- id: D12
  question: Template validation ‚Äî what checks are applied to `when` at startup?
  options:
    a: Validate that the referenced engine ID exists in the template and is transitively
      upstream of the engine with the `when` clause (same rules as `$yields.*.*` in
      givens)
    b: Validate only that the engine ID exists (not upstream reachability)
    c: No validation ‚Äî runtime errors on bad references
- id: D13
  question: What happens when `when` references an upstream engine that was `skipped`
    (no yields)?
  options:
    a: The referenced yield value is `undefined`, which is falsy ‚Äî engine is skipped.
      With `!` prefix, the negated value is truthy ‚Äî engine runs.
    b: The engine fails with an error about missing upstream yields
- id: D14
  question: Does `buildFromTemplate()` need to copy the `when` field from `RigTemplateEngine`
    to `EngineInstance`?
  options:
    a: Yes ‚Äî add `when` to the mapped EngineInstance in `buildFromTemplate()`
    b: No ‚Äî resolve `when` at spawn time (impossible, per D4)
- id: D15
  question: Does `findRunnableEngine()` need to change?
  options:
    a: Yes ‚Äî upstream satisfaction check must accept `skipped` in addition to `completed`
    b: No ‚Äî keep it checking only `completed` and handle skipped upstream elsewhere
- id: D16
  question: Does `failEngine()` need to handle `skipped` engines?
  options:
    a: No ‚Äî `failEngine()` cancels `pending` and `blocked` engines. `skipped` engines
      are already terminal and should be left alone.
    b: Yes ‚Äî also cancel `skipped` engines on failure
- id: D17
  question: Does the CDC handler (rig terminal state -> writ transition) need changes?
  options:
    a: No ‚Äî the CDC handler fires on rig status change to `completed` or `failed`.
      The rig status is set correctly by the updated completion logic (D7). The resolution
      yield lookup already falls back to 'last completed engine in array order', which
      naturally skips `skipped` engines.
    b: Yes ‚Äî explicitly filter out `skipped` engines in the resolution yield lookup
- id: D18
  question: Does the `RigTemplateEngine` type need updating?
  options:
    a: 'Yes ‚Äî add `when?: string` field'
    b: No ‚Äî `when` only exists on EngineInstance at runtime
- id: D19
  question: How does an engine signal that it wants to add engines to the rig?
  options:
    a: 'Optional `graft` field on the existing `completed` EngineRunResult: `{ status:
      ''completed''; yields: unknown; graft?: RigTemplateEngine[] }`'
    b: 'New `EngineRunResult` variant: `{ status: ''graft''; yields: unknown; append:
      RigTemplateEngine[] }`'
    c: 'Context method: `context.graft(engines)` called during run()'
- id: D20
  question: Where is the `graft` field defined ‚Äî in the Fabricator's `EngineRunResult`
    type?
  options:
    a: 'Yes ‚Äî add `graft?: RigTemplateEngine[]` to the `completed` variant of `EngineRunResult`
      in `fabricator.ts`. Import `RigTemplateEngine` from spider-apparatus.'
    b: No ‚Äî define it only in the Spider's types. The Fabricator type stays unchanged;
      the Spider casts the result.
- id: D21
  question: What type does the Spider use for the graft field to avoid the Fabricator
    circular dependency?
  options:
    a: Define a `SpiderEngineRunResult` type in spider types that extends `EngineRunResult`
      with `graft`. Engines importing from fabricator-apparatus return the base type;
      the Spider internally checks for the `graft` property.
    b: Define the graft field inline in the Spider's result processing ‚Äî just check
      for `(engineResult as any).graft` at the handling site.
    c: Define a standalone `GraftRequest` interface in spider types. The completed
      EngineRunResult gets an additional optional field via a spider-specific type
      that wraps it.
- id: D22
  question: What is the graft field's element type ‚Äî full `RigTemplateEngine` or a
    simpler shape?
  options:
    a: '`RigTemplateEngine[]` ‚Äî same shape as template engines, including id, designId,
      upstream, givens, when'
    b: A simpler shape without `when` support for grafted engines
- id: D23
  question: Who is responsible for ensuring grafted engine IDs are unique within the
    rig?
  options:
    a: The engine that produces the graft ‚Äî it names the engines (e.g., `review-2`,
      `revise-2`)
    b: The Spider auto-prefixes grafted engine IDs with a generation counter (e.g.,
      `g1.review`, `g2.revise`)
- id: D24
  question: What runtime validation is applied to grafted engines?
  options:
    a: 'Full validation: designId exists in Fabricator, no duplicate IDs (against
      existing rig engines), no cycles, valid `when` references, valid yield references
      in givens. Same rules as startup template validation, applied at runtime.'
    b: 'Minimal validation: just check for duplicate IDs and designId existence'
    c: No validation ‚Äî trust the engine
- id: D25
  question: What CrawlResult is returned when an engine completes with a graft?
  options:
    a: 'New `engine-grafted` action: `{ action: ''engine-grafted''; rigId: string;
      engineId: string; graftedEngineIds: string[] }`'
    b: Return `engine-completed` ‚Äî the graft is a side effect, not a distinct action
- id: D26
  question: Should there be a safety limit on the total number of engines per rig?
  options:
    a: Yes ‚Äî configurable `maxEnginesPerRig` on SpiderConfig with a default (e.g.,
      50)
    b: No limit ‚Äî trust engines to be well-behaved
- id: D27
  question: What is the default value for `maxEnginesPerRig`?
  options:
    a: '50'
    b: '100'
    c: '25'
- id: D28
  question: Where in the crawl loop are grafts from quick engines (collected via tryCollect)
    processed?
  options:
    a: In `tryCollect` ‚Äî when collecting yields, also check for `graft` and append
      engines before returning
    b: In a separate post-collect phase
- id: D29
  question: Can grafted engines reference the grafting engine in their `upstream`
    array?
  options:
    a: Yes ‚Äî grafted engines can reference any existing engine in the rig (the grafting
      engine is already completed)
    b: No ‚Äî grafted engines can only reference each other or other grafted engines
      in the same batch
- id: D30
  question: How does the Spider resolve givens for grafted engines ‚Äî at graft time
    or at run time?
  options:
    a: At graft time ‚Äî resolve `$writ` and `$vars.*` when appending (same as `buildFromTemplate`
      does at spawn). `$yields.*.*` stays as strings for runtime resolution.
    b: At run time ‚Äî store raw givens strings, resolve everything at run time
- id: D31
  question: How does cascade skipping work ‚Äî does a single crawl step skip multiple
    engines?
  options:
    a: Yes ‚Äî after skipping an engine, immediately evaluate all pending engines whose
      upstream is now all done and whose `when` is false. Skip them in the same crawl
      step. Return `engine-skipped` with only the first engine ID (cascaded skips
      are a side effect).
    b: Yes ‚Äî same as (a) but return an array of all skipped engine IDs in the CrawlResult.
    c: No cascade ‚Äî each crawl skips one engine. Dead branches clear over multiple
      crawl cycles.
- id: D32
  question: What is the CrawlResult shape for cascaded skips?
  options:
    a: '`{ action: ''engine-skipped''; rigId: string; engineId: string }` ‚Äî return
      only the first skipped engine; cascaded skips are implicit'
    b: '`{ action: ''engine-skipped''; rigId: string; engineId: string; cascadeSkipped?:
      string[] }` ‚Äî primary engine plus optional list of cascade-skipped engines'
- id: D33
  question: Does cascade skipping apply to engines without a `when` clause whose upstream
    is entirely skipped?
  options:
    a: No ‚Äî engines without `when` are unconditional. If all their upstream is done
      (completed or skipped), they run.
    b: Yes ‚Äî engines without `when` whose ALL upstream engines are `skipped` (none
      completed) are themselves skipped, since they have no meaningful upstream data
      to work with.
- id: D34
  question: Does `EngineStatus` type need a new `skipped` value?
  options:
    a: Yes ‚Äî `'pending' | 'running' | 'completed' | 'failed' | 'cancelled' | 'blocked'
      | 'skipped'`
    b: No ‚Äî reuse `cancelled`
- id: D35
  question: Do the public type exports in `index.ts` need updating?
  options:
    a: Yes ‚Äî export any new types (e.g., `SpiderEngineRunResult` if created) from
      spider-apparatus index
    b: No ‚Äî all changes are to existing types
- id: D36
  question: Does `isRigBlocked()` need changes?
  options:
    a: No ‚Äî `isRigBlocked()` checks for running, blocked, and pending engines. `skipped`
      engines are none of these, so they're naturally excluded. The function works
      correctly without changes.
    b: Yes ‚Äî explicitly account for `skipped` in the logic

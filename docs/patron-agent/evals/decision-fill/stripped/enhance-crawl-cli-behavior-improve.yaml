decisions:
- id: D1
  question: Should the single-step tool be named 'crawl-one' as the brief says, or
    something else like 'crawl-step'?
  options:
    a: Use 'crawl-one' as the brief specifies
    b: Use 'crawl-step' which better describes the action (execute one step)
- id: D2
  question: How should 'never stop by default' be implemented for maxIdleCycles?
  options:
    a: Use `.default(Infinity)` — idleCount < Infinity is always true, no loop logic
      change needed
    b: Use `.default(0)` as sentinel meaning 'no limit', change loop to `while (maxIdle
      === 0 || idleCount < maxIdle)`
    c: Make param nullable (z.number().nullable()), where null/undefined means 'no
      limit', change loop to check for null
- id: D3
  question: Should the tool description and instructions text change to reflect 'runs
    indefinitely' semantics?
  options:
    a: Update description to 'Run the Spider's crawl loop continuously' and instructions
      to explain the opt-in idle limit
    b: Keep current text, only update the param description
- id: D4
  question: What should the maxIdleCycles param description say?
  options:
    a: '''Number of consecutive idle cycles before stopping. 0 means run indefinitely
      (default: 0)'''
    b: '''Max consecutive idle cycles before stopping. Pass a positive number to enable
      auto-stop (default: runs indefinitely)'''
- id: D5
  question: Should the source file crawl.ts be renamed to crawl-one.ts?
  options:
    a: Rename crawl.ts to crawl-one.ts for consistency
    b: Keep crawl.ts — it's internal, the tool name is what matters
- id: D6
  question: Should internal export identifiers (crawlTool, crawlContinualTool) be
    renamed?
  options:
    a: Rename to crawlOneTool and crawlContinualTool (crawlContinualTool is already
      fine)
    b: Keep current names — they're internal and the churn adds no value
- id: D7
  question: Should the console.error log tag '[crawlContinual]' be updated?
  options:
    a: Update to '[crawl-continual]' to match the new tool name
    b: Keep '[crawlContinual]' — log tags don't need to match CLI names
- id: D8
  question: Should the JSDoc comment headers in the tool files be updated?
  options:
    a: Update to match new tool names
    b: Leave as-is — comments are internal
- id: D9
  question: How much of spider.md should be updated?
  options:
    a: Update only the tool name references to match new names — minimal diff, stay
      within brief scope
    b: Rewrite the kit contribution and operational model sections to accurately reflect
      the implementation
- id: D10
  question: Does the loop sleep logic need adjustment for the indefinite-run case?
  options:
    a: Change sleep guards to `if (maxIdle === 0 || idleCount < maxIdle)` to match
      the loop condition
    b: 'Simplify: always sleep after idle/error, since the while condition handles
      termination'

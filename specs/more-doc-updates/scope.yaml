brief: |
  ## Scriptorium doc shows `requires: ['stacks']` but code shows `requires: []`

  The Scriptorium architecture doc (scriptorium.md, Dependencies section) says `requires: ['stacks']`. The actual implementation in `scriptorium.ts` line 39 has `requires: []`. The Scriptorium currently tracks drafts in-memory and uses `guild().config()` / `guild().writeConfig()` for the registry — it does not depend on the Stacks apparatus. The doc is aspirational (matching the "Future State: Draft Persistence via Stacks" section) rather than accurate. This predates this commission.

  ## Spider doc note about seal+push is a comment, not a spec requirement

  The spider.md note "Push is a separate Scriptorium operation — the seal engine seals but does not push" (line 284) reads as a documentation observation, not a design constraint. It was likely written to explain the current behavior, not to prescribe it. Updating it is straightforward.

slug: more-doc-updates

scope:
  - id: S1
    description: "Fix scriptorium.md Dependencies section: change `requires: ['stacks']` to `requires: []` and rewrite the dependency description to reflect the actual storage mechanism (in-memory drafts, guild.json config — no Stacks)."
    rationale: "The brief explicitly calls this out. The doc is aspirational; the code is ground truth."
    included: true

  - id: S2
    description: "Fix scriptorium.md Bare Clone Architecture lifecycle diagram: remove the three Stacks references (`Record clone status in Stacks`, `Record draft in Stacks`, `Clean up Stacks records`) and replace with what the code actually does (in-memory tracking, guild.json config updates)."
    rationale: "The lifecycle steps reference Stacks operations that don't exist in the implementation. Same root cause as S1 — the doc assumed the Stacks integration that the Future State section describes."
    included: true

  - id: S3
    description: "Fix scriptorium.md Startup reconciliation section: replace 'Reconciles Stacks records with filesystem state' with 'Reconciles in-memory draft tracking with filesystem state'."
    rationale: "Same aspirational Stacks reference leak. One line in the startup description (point 4, line 637)."
    included: true

  - id: S4
    description: "Update spider.md line 284 SealYields note to clarify the seal+push relationship."
    rationale: "The brief calls this out. The current text ('The Scriptorium's seal() method pushes the target branch to the remote after sealing') is already accurate per the code, but the brief asks for an update — likely to make the note clearer or remove ambiguity about whether push is a separate step."
    included: true

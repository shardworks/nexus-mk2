brief: "Beyond the \"Interim Dispatch Pattern\" section being removed in this commission, the Scriptorium doc's flow diagrams (around line 494) show \"Orchestrator (dispatch script, rig engine, standing order)\" \u2014 the \"dispatch script\" option is no longer relevant. A broader pass on the Scriptorium doc to remove pre-Spider patterns would improve accuracy."
slug: "scriptorium-doc-has-multiple-stale"

scope:
  - id: S1
    description: "Remove 'dispatch script' references from the Scriptorium doc's prose and flow diagrams, updating the orchestrator framing to reflect the Spider as the current pattern."
    rationale: "Explicitly called out in the brief. Line 15 and line 494 both list 'dispatch scripts' as an orchestrator option; the Spider's engine pipeline replaced this."
    included: true

  - id: S2
    description: "Update the 'standing order' references in the orchestrator framing to reflect that standing orders fire relays, not multi-step draft/session/seal flows."
    rationale: "The flow diagram (line 494) lists 'standing order' alongside 'dispatch script' as an orchestrator of the open-draft/summon/seal sequence. Standing orders don't orchestrate that flow; the Spider does."
    included: true

  - id: S3
    description: "Correct the Dependencies section to match the implementation: remove the stale 'requires: [stacks]' declaration and the Stacks runtime-state description."
    rationale: "The code has requires: []. No Stacks import or usage exists in the codexes package. The doc's claim that Stacks tracks drafts/clone-status is factually wrong against the current implementation."
    included: true

  - id: S4
    description: "Update the MVP scope warning banner to reflect current state (Spider exists, Clockworks framing is partially stale)."
    rationale: "The banner says 'Clockworks integration (events, standing orders) is future work' but the Spider now drives the Scriptorium's lifecycle via engines. The banner's framing predates Spider."
    included: true

  - id: S5
    description: "Revise the 'Future: Clockworks Events' section to acknowledge that CDC (Stacks watch) is the current reactive pattern, rather than framing Clockworks events as the only future direction."
    rationale: "The Spider already uses CDC on the rigs book for reactive writ transitions. The Clockworks events section frames all reactivity as future Clockworks work, which is now incomplete."
    included: true

  - id: S6
    description: "Update the 'Future State: Draft Persistence via Stacks' section to acknowledge that CDC is already the pattern for rigs, not purely aspirational."
    rationale: "The section frames CDC-driven downstream reactions as entirely future; the Spider's rig-completion CDC handler already exists. Minor framing fix."
    included: true

  - id: S7
    description: "Fix the stale Stacks dependency claim in the codexes README."
    rationale: "README line 3 says 'Depends on @shardworks/stacks-apparatus for state tracking' but the implementation has no Stacks dependency. Same doc/code discrepancy as S3 but in a different file."
    included: true

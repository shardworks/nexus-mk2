brief: |
  Accept curly brace syntax for rig template variables.
  The variable interpolation syntax for rig templates currently must match
  $foo or $spider.foo. We need to support curly braces, as is common in
  bash and other templating languages.
  - $foo and ${foo} would be equivalent
  - $spider.foo and ${spider.foo} would be equivalent
  The latter two throw an error currently.
slug: accept-curly-brace-syntax-for

scope:
  - id: S1
    description: "Accept ${foo} as equivalent to $foo in rig template variable resolution and validation"
    rationale: "The explicit ask in the brief — both resolveGivens and validateTemplates must treat curly-brace forms identically to bare forms"
    included: true

  - id: S2
    description: "Update JSDoc on RigTemplateEngine.givens to document curly-brace syntax"
    rationale: "The existing comment describes only the bare $foo form; it becomes misleading once ${foo} is also accepted"
    included: true

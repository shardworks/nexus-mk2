brief: |
  Kit-Contributed Rig Templates, Writ Types, and Mappings.

  Today, adding a new writ type with its own execution pipeline requires the guild owner to manually
  configure three things in guild.json: register the writ type with the Clerk, define a rig template
  for it, and map the writ type to the template. The goal is plug-and-play work types: a kit or
  apparatus can contribute a writ type, a rig template, and the mapping between them, so that
  installing the plugin is sufficient to make the new work type functional. Guild config retains
  override authority for any of these contributions.

slug: kit-contributed-rig-templates-writ

scope:
  - id: S1
    description: "Kit-contributed rig templates: kits contribute named RigTemplate objects via a rigTemplates field, the Spider consumes and merges them with namespace-qualified names and config-override semantics."
    rationale: "Explicitly stated as Key Feature 1 in the brief."
    included: true

  - id: S2
    description: "Kit-contributed writ types: kits contribute writTypes entries, the Clerk consumes and merges them with config-override semantics."
    rationale: "Explicitly stated as Key Feature 2 in the brief."
    included: true

  - id: S3
    description: "Kit-contributed rig template mappings: kits contribute rigTemplateMappings (writ type to template name), the Spider consumes and merges them with config-override semantics."
    rationale: "Explicitly stated as Key Feature 3 in the brief."
    included: true

  - id: S4
    description: "lookupTemplate() rewrite: the Spider's template lookup consults the merged registry (config templates + kit templates + config mappings + kit mappings) with config winning at every layer."
    rationale: "Explicitly stated as Key Feature 4 in the brief. Inseparable from S1/S3 — without this, contributed templates and mappings have no effect at runtime."
    included: true

  - id: S5
    description: "Startup validation of merged registries: duplicate detection, dangling mapping references, dependency-scoped designId validation for kit templates, cycle detection in engine DAGs, with error messages identifying the contributing kit."
    rationale: "Explicitly stated in the brief's Validation section. Necessary for operational safety of the merged registries."
    included: true

  - id: S6
    description: "Guild config rigTemplateMappings field: add spider.rigTemplateMappings to SpiderConfig so guild owners can override kit-contributed mappings via config."
    rationale: "Implied by the brief's statement that 'guild config mappings override kit contributions for the same writ type.' Without a config field for mappings, config has no override mechanism for the mapping layer."
    included: true

  - id: S7
    description: "Public kit interface types: export SpiderKit and ClerkKit TypeScript interfaces so kit authors can type-check their contributions."
    rationale: "Follows the LoomKit pattern from the Loom. Not explicitly stated in the brief but implied by the 'follow the roles pattern' directive and is standard practice in this codebase."
    included: true

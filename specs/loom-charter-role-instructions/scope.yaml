brief: Implement loom features to weave charter and role instructions into the system prompt
slug: loom-charter-role-instructions
scope:
  - id: S1
    description: Charter composition — the Loom reads a guild charter file and includes it as the first section of every anima's system prompt
    rationale: The architecture spec defines charter as composition layer 1, applying to all animas. The guild metaphor describes it as 'institutional policy all members follow.'
    included: true
  - id: S2
    description: Role instructions composition — the Loom reads a per-role instructions file (path configured in guild.json) and includes it in the system prompt for sessions weaving that role
    rationale: The architecture spec defines role instructions as composition layer 4. The known-gaps doc ('animas don't know to commit their work') identifies this as the primary motivating use case.
    included: true
  - id: S3
    description: System prompt assembly — charter and role instructions are composed into a single systemPrompt string in the documented layer order and returned on AnimaWeave
    rationale: The brief says 'weave into the system prompt.' The existing pipeline (Animator → provider) already passes systemPrompt through; the Loom just needs to produce a non-undefined value.
    included: true
  - id: S4
    description: Graceful degradation — missing charter or role instruction files do not crash sessions; the Loom warns and composes from whatever layers are present
    rationale: Implied by the brief (a guild may not have a charter yet) and by the Instrumentarium precedent, which warns on missing instruction files but continues.
    included: true
  - id: S5
    description: RoleDefinition config extension — add an instructions path field to the role definition type so guilds can configure per-role instruction file paths in guild.json
    rationale: Required by S2. The legacy system had this field; the current Loom plugin omitted it when tool resolution was the only concern.
    included: true
  - id: S6
    description: Tool instructions composition — the Loom reads the pre-loaded instructions text from each resolved tool and weaves them into the system prompt
    rationale: The architecture spec lists tool instructions as composition layer 5, between role instructions and writ context. Tool instructions are already pre-loaded by the Instrumentarium onto ResolvedTool.definition.instructions — the Loom just needs to include them.
    included: true
  - id: S7
    description: Documentation updates — update the loom spec, README, and architecture index to reflect that charter and role instruction composition is active rather than future work
    rationale: Implied by any implementation work. Stale 'future work' markers in multiple docs need updating.
    included: true

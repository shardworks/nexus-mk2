brief: |
  The seal engine doesn't call push() — even if seal worked, triggerQualityReview needs the commits in the bare clone, and push() is never called after seal.

  Let's update the Scriptorium's 'seal' method to also push the main branch to the remote.
slug: sealing-an-inscription-should-push
scope:
  - id: S1
    description: "Seal auto-pushes: ScriptoriumCore.seal() pushes the target branch to the remote after successful sealing"
    rationale: This is the core ask of the brief — seal and push should be a single operation so callers don't need to remember the push step
    included: true
  - id: S2
    description: "Test updates: existing seal tests verify push happened, push-after-seal tests are consolidated"
    rationale: The seal tests in scriptorium-core.test.ts currently don't verify remote state; tests that call seal() then push() separately need updating
    included: true
  - id: S3
    description: "Doc updates: Spider and Scriptorium architecture docs reflect that seal now pushes"
    rationale: Spider doc explicitly says 'seal does not push'; Scriptorium doc shows seal and push as separate steps in multiple sections
    included: true
  - id: S4
    description: "Dispatch cleanup: remove the now-redundant explicit push() call from the Dispatch apparatus"
    rationale: The Dispatch currently calls seal() then push() separately — the push call becomes a harmless no-op but is dead code. Brief implies simplifying callers.
    included: false

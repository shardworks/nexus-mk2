brief: |
  # Add relationships between writs

  We want to be able to link writs to each other. Example uses:

  - Indicate that one writ fixes the implementation of another
  - For failed writs, indicate that a new one is another attempt (due to system failure, etc)
  - For cancelled writs, indicate that they were superseded or duplicated by another, etc.
slug: add-relationships-between-writs
scope:
  - id: S1
    description: Create typed directional links between writs — data model, Clerk API methods, and writ-link tool
    rationale: "The core of the brief: writs need to reference each other with a labeled relationship type"
    included: true
  - id: S2
    description: Display relationships in writ-show output — both outbound links (what this writ links to) and inbound links (what links to this writ)
    rationale: Links are useless if you can't see them; the brief's examples all imply reading the relationship from either side
    included: true
  - id: S3
    description: Remove relationships — unlink API method and writ-unlink tool
    rationale: Not stated in the brief but implied by any linking system — mistakes happen and links may become incorrect
    included: true
  - id: S4
    description: Fire a writ.linked clockworks event when a relationship is created
    rationale: The X013 instrument spec calls for this; enables standing orders to react to new links (e.g. auto-close duplicates)
    included: false

brief: |
  # doc update pass

  ### 1. CLI README lists aspirational commands
  `/workspace/nexus/packages/framework/cli/README.md` line 187 lists `nsg dispatch list` as a nexus-stdlib command. This was never implemented (it's not from the Dispatch apparatus — it was an aspirational stdlib tool). The CLI README may have other aspirational entries that don't match reality. A full audit of the CLI README's command table against actual installed tools would be valuable.

  ### 2. review-loop.md needs a fresh design pass
  The review-loop doc's "Decision" section (line 69) says "Adopt both Option A (MVP) and Option B (full design)" — Option A was the Dispatch-level MVP, Option B was Spider engine designs. Option A was never implemented. The doc should be revised to reflect Spider as the sole design, but doing it well requires understanding the current Spider review engine implementation, which is beyond this commission's scope.

  ### 3. _agent-context.md may be stale
  `/workspace/nexus/docs/architecture/_agent-context.md` lists "Commission → mandate writ → dispatch flow" (line 108) and mentions the Dispatch is part of the commission pipeline. This file appears to be agent-facing context that should be kept current. A broader freshness audit of this file would catch other stale references.

slug: doc-update-pass

scope:
  - id: S1
    description: "Rewrite the CLI README's 'Standard Guild Commands' section (lines 119-208) to reflect actual installed tools, correct source attributions, and remove aspirational entries"
    rationale: "The brief explicitly requests an audit of the CLI README command table. The inventory shows 17 non-existent commands, 7 wrong attributions, and 15 missing tools — the section needs a full rewrite, not spot fixes."
    included: true

  - id: S2
    description: "Rewrite the CLI README's 'Migration Status' section (lines 193-208) to reflect current v1-vs-v2 state"
    rationale: "The migration status section contradicts itself (lists codex tools as both 'remaining in v1' and 'migrated'). It's part of the same README and closely related to S1, but could be cut if the patron prefers to leave migration tracking out."
    included: true

  - id: S3
    description: "Update the review-loop.md design spec status and decision section to reflect Spider as the sole design"
    rationale: "The brief explicitly requests this. However, the inventory found that the doc may have already been revised — Option A is absent and Option B is the chosen design. The remaining work may be limited to updating the status line and verifying alignment with the Spider engine implementation."
    included: true

  - id: S4
    description: "Freshen _agent-context.md: update the package table, implementation-vs-aspirational status, terminology table, key file paths, and implementation next-steps"
    rationale: "The brief requests a broader freshness audit. The inventory found the package table lists 4 non-existent packages and is missing 10; the status section lists 5 implemented apparatus as 'not yet implemented'; file paths use wrong directory prefixes."
    included: true

  - id: S5
    description: "Update _agent-context.md's 'Architecture Docs Status' table to reflect current doc accuracy"
    rationale: "Implied by the brief's 'broader freshness audit' request. The status table (lines 62-80) was written session 1 and rates docs that have changed since. A stale status table undermines the doc's purpose as agent orientation."
    included: true

  - id: S6
    description: "Add new tools contributed by Spider apparatus to the CLI README command table (rig-list, rig-show, rig-for-writ, crawl-one, crawl-continual)"
    rationale: "Implied by S1 — Spider tools exist but aren't documented anywhere user-facing. Could be deferred if the patron wants Spider tools to remain undocumented until the apparatus is more mature."
    included: true

  - id: S7
    description: "Add Instrumentarium self-documentation tools (tools-list, tools-show) to the CLI README command table"
    rationale: "Implied by S1 — these tools exist and are useful for operators discovering what's available. Could be cut if the patron considers them internal."
    included: true

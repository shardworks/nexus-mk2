brief: "Now that Spider is live, we can remove the Dispatch apparatus from the framework."
slug: remove-dispatch-apparatus

scope:
  - id: S1
    description: "Delete the Dispatch package — the entire packages/plugins/dispatch/ directory and its npm package"
    rationale: The brief asks to remove the Dispatch apparatus. This is the core deliverable — deleting the source, types, tests, tool, and package manifest.
    included: true

  - id: S2
    description: "Remove Dispatch from the live guild — drop it from vibers guild.json plugins list and package.json dependencies"
    rationale: The vibers guild currently lists dispatch in its plugins array and package.json despite Spider being the active dispatcher. Removing the package without updating the guild would break guild startup.
    included: true

  - id: S3
    description: "Delete the Dispatch architecture doc (docs/architecture/apparatus/dispatch.md)"
    rationale: The apparatus-specific API contract doc becomes orphaned once the package is removed. Keeping it creates confusion about what's implemented.
    included: true

  - id: S4
    description: "Update docs that reference Dispatch as current — clerk.md, spider.md, animator.md, scriptorium.md"
    rationale: Several architecture docs still reference 'The Dispatch' as the current or interim dispatch path. With Spider live, these references are stale and would become dangling after the package is removed.
    included: true

  - id: S5
    description: "Clean up the review-loop.md design doc — remove or archive the Dispatch-level MVP sections"
    rationale: The review-loop doc has ~30 Dispatch references and an extensive 'MVP Dispatch-Level Review Loop' section that was never implemented. The Spider engine design (Option B) is the current path; the Dispatch MVP sections are dead design.
    included: true

  - id: S6
    description: "Regenerate lockfiles — pnpm-lock.yaml in the framework, package-lock.json in vibers"
    rationale: Removing a workspace package and an npm dependency requires lockfile regeneration to avoid stale references and broken installs.
    included: true

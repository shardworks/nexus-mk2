brief: |
  Roles are guild-only: defined in guild.json, instructions hard-coded as flat files. Plugins that ship tools, engines, or other components have no way to bundle purpose-built roles alongside them.

  Requirements:
  1. Kits may contribute roles via a `roles` field on the kit manifest.
  2. Kit-contributed roles are namespaced: {pluginId}.{roleName}. The Loom resolves them by that qualified name. Plugin others only specify the roleName, and the loom applies the plugin namespace automatically.
  3. Each contributed role carries permissions, and optionally strict, instructions (string), or instructionsFile (path relative to the kit's npm package directory).
  4. Kit-contributed role permissions are dependency-scoped: a kit may only grant permissions referencing its own plugin ID, or plugin IDs declared in its requires or recommends. Permissions referencing undeclared plugins produce a startup warning and are dropped.
  5. A guild-defined role in loom.roles with the same qualified name fully overrides the kit-contributed role — no merging.
  6. The Loom scans guild().kits() at startup and subscribes to plugin:initialized for apparatus supportKit roles, following the established kit-consumption pattern.

slug: kit-contributed-roles

scope:
  - id: S1
    description: "Core kit role registration and resolution — Loom scans kits for `roles` contributions, qualifies names as `{pluginId}.{roleName}`, registers them, and weave() resolves by qualified name. Guild-defined roles with the same qualified name fully override. Follows the established kit-consumption pattern (kits at startup + plugin:initialized for apparatus supportKits)."
    rationale: "Requirements 1, 2, 5, 6 — the minimum viable feature that makes kit-contributed roles work end-to-end."
    included: true

  - id: S2
    description: "Dependency-scoped permission validation — kit role permissions are validated at registration time against the kit's own plugin ID plus its `requires` and `recommends`. Permissions referencing undeclared plugins produce a startup warning and are silently dropped from the role's effective permissions."
    rationale: "Requirement 4 — security boundary preventing kits from granting permissions to plugins they don't declare as dependencies."
    included: true

  - id: S3
    description: "Kit role instructions — kit-contributed roles can carry inline `instructions` (string) or `instructionsFile` (path relative to kit npm package dir), resolved at registration time and included in the system prompt's role-instructions layer during weave()."
    rationale: "Requirement 3 — the instructions/instructionsFile fields on contributed roles, enabling kits to bundle role guidance alongside their tools."
    included: true

  - id: S4
    description: "LoomKit type export — published `LoomKit` interface and `KitRoleDefinition` type exported from @shardworks/loom-apparatus for kit authors to get compile-time type safety on their role contributions via `satisfies LoomKit`."
    rationale: "Implied by the established pattern — every consuming apparatus publishes a kit interface (e.g. SpiderKit, FabricatorKit). Without it, kit authors rely on the open Kit record with no type checking for roles."
    included: true

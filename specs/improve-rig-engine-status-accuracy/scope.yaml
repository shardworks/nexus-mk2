brief: If an engine in a rig fails, the whole rig fails. However, all downstream engines remain the 'ready' state or 'pending' or whatever. We should transition them to an appropriate state to indicate they are cancelled or some other suitable term. Use the stacks CDC for this.
slug: improve-rig-engine-status-accuracy
scope:
  - id: S1
    description: Add a 'cancelled' engine status and transition downstream engines to it when an engine fails
    rationale: The core ask of the brief — downstream engines should reflect that they will never run because an upstream failure killed the rig.
    included: true
  - id: S2
    description: Update existing Spider tests to assert downstream engine cancellation and add targeted cancellation tests
    rationale: Every existing failure test currently ignores downstream engine status. Tests must cover the new behavior to prevent regression.
    included: true
  - id: S3
    description: Update the Spider API contract doc to describe engine cancellation on failure
    rationale: The spider.md spec documents engine failure behavior (lines 592-603) but says nothing about downstream engines. The spec should match the new behavior.
    included: true

decisions:
  - id: D1
    scope:
      - S1
    question: Should we introduce an external templating library or extend the hand-rolled regex system?
    answer: Extend hand-rolled regex — add inline ${...} scanning to existing resolveGivens/resolveYieldRefs with no new
      dependency. HOWEVER, extract templating code to an isolated module so it can be replaced with a library later if
      needed
    justification: patron specified
  - id: D2
    scope:
      - S1
    question: Should the existing whole-value bare-$ syntax ($writ, $vars.role, $yields.draft.path) remain supported
      alongside the new inline ${...} syntax?
    answer: Remove bare-$ now — breaking change, only ${...} supported going forward
    justification: No reason to break existing configs; both syntaxes coexist naturally — bare-$ is whole-value, ${...} is inline
  - id: D3
    scope:
      - S1
    question: For inline interpolation, should only ${...} (curly-brace) syntax be supported, or also bare $refs.in.strings?
    answer: Only ${...} for inline — bare $refs are ambiguous about where the reference ends within a larger string
    justification: Curly braces are necessary to delimit reference boundaries within a larger string; bare-$ inline would be ambiguous
  - id: D4
    scope:
      - S1
    question: What regex pattern should be used to find inline template expressions?
    answer: /\$\{([^}]+)\}/g — match ${...} where the body is any non-} characters
    justification: Keep the regex simple; let the expression evaluator/validator handle namespace recognition
  - id: D5
    scope:
      - S1
      - S3
    question: What expression syntax is supported inside ${...}?
    answer: "Arbitrary dot-path traversal: yields.<engineId>.<path.to.nested.prop>, writ.<nested.field> — deep property access"
    justification: All current yield shapes, WritDoc fields, and config variables are flat — deep traversal has no use case today
  - id: D6
    scope:
      - S1
    question: When an inline ${...} expression resolves to undefined (missing property), what should happen?
    answer: Replace with empty string — the interpolated result omits the missing value silently
    justification: Empty string is the inline analogue of whole-value key omission — graceful degradation for optional fields
  - id: D7
    scope:
      - S1
    question: When an inline ${...} expression resolves to a non-string value (number, boolean, object, array), how is it
      stringified?
    answer: Use String(value) for primitives, JSON.stringify(value) for objects/arrays
    justification: String() for primitives is natural; JSON.stringify for complex values avoids '[object Object]'
  - id: D8
    scope:
      - S1
    question: When a string contains ONLY a single ${...} expression with no surrounding text (e.g.,
      '${yields.draft.path}'), should the result be the raw value (preserving type) or always a string?
    answer: Preserve type — a string that is entirely one ${...} expression resolves to the raw value (same as bare-$
      whole-value behavior)
    justification: Backward-compatible with existing ${...} whole-value behavior; avoids surprising type coercion
  - id: D9
    scope:
      - S1
    question: "How should strings with mixed spawn-time and run-time references be handled? E.g., 'Writ: ${writ.title},
      Path: ${yields.draft.path}'"
    answer: Partial resolution at spawn time — resolve ${writ.*} and ${vars.*}, leave ${yields.*.*} literals in place;
      complete resolution at run time
    justification: Maintains existing two-phase architecture; avoids storing WritDoc/SpiderConfig in the rig document
  - id: D10
    scope:
      - S1
    question: "In a partially-resolved string, what form do unresolved yield refs take in givensSpec? E.g., original 'Title:
      ${writ.title}, Path: ${yields.draft.path}' after spawn-time resolution"
    answer: "Yield refs remain as ${yields.*.*} literals in the resolved string — 'Title: My Writ, Path: ${yields.draft.path}'"
    justification: Consistent with existing pass-through behavior; no realistic false-match risk in guild config
  - id: D11
    scope:
      - S3
    question: Should ${writ.<field>} work only as inline (embedded in a string), or also as a new whole-value syntax
      replacing the current $writ?
    answer: Inline only — ${writ.body} works embedded in strings; $writ or ${writ} still gives the whole WritDoc object
    justification: Preserves existing $writ → WritDoc behavior; engines depend on it
  - id: D12
    scope:
      - S3
    question: Which WritDoc fields should be accessible via ${writ.<field>}?
    answer: Any field — use generic property access on the WritDoc object without restricting to known fields
    justification: WritDoc has an index signature; restricting fields requires an allowlist that tracks type evolution —
      generic access is simpler
  - id: D13
    scope:
      - S2
    question: Should startup validation scan ALL string values for ${...} patterns, or only strings that contain at least
      one ${...}?
    answer: Only scan strings that contain at least one '${' substring — skip pure literals for performance
    justification: Trivial optimization; no point running regex on strings without ${}
  - id: D14
    scope:
      - S2
    question: For inline ${yields.*.*} refs, should validation check upstream reachability the same way whole-value refs do?
    answer: "Yes — same validation: engine id must exist in template AND be transitively upstream"
    justification: Same correctness requirement applies regardless of whether the ref is whole-value or inline
  - id: D15
    scope:
      - S2
    question: How should validation handle a string containing both valid and invalid inline refs?
    answer: Fail on the first invalid ref — same as current behavior for any unrecognized variable
    justification: Consistent with existing fail-fast pattern; no need for batch error reporting
  - id: D16
    scope:
      - S2
    question: Should a string containing ${...} patterns that are NOT known namespaces (e.g., '${unknown.foo}') trigger a
      validation error?
    answer: Yes — any ${...} expression that doesn't match writ.*, vars.*, or yields.*.* is an error
    justification: Consistent with existing unrecognized-variable rejection; catches typos at startup rather than silently at run time
  - id: D17
    scope:
      - S4
    question: How should the shared validation logic be structured?
    answer: Extract a validateGivensRefs function that always returns string | null (first error); config caller throws, kit
      caller returns
    justification: Matches the existing return-string-or-null pattern of validateKitTemplate; simplest integration
  - id: D18
    scope:
      - S4
    question: What should the extracted validation function's signature be?
    answer: "validateGivensRefs(givens: Record<string, unknown>, engineId: string, engineIds: Set<string>, allEngines:
      RigTemplateEngine[]): string | null"
    justification: Error messages need engine-specific context; per-engine granularity keeps the prefix formatting in the caller
  - id: D19
    scope:
      - S5
    question: Should the unnecessary { ...engine.givensSpec } spreads in tryRun and tryCollect be removed?
    answer: Yes — pass givensSpec directly since resolveYieldRefs already creates a new result object
    justification: resolveYieldRefs never mutates its input; the spread is dead code
  - id: D20
    scope:
      - S1
    question: Should the inline interpolation logic be implemented as a shared helper used by both resolveGivens and
      resolveYieldRefs, or independently in each?
    answer: Shared helper — a single interpolateString(template, context) function called by both resolution phases with
      different context objects
    justification: Same interpolation logic needed in both phases; a shared helper avoids introducing the duplication the
      brief asks to clean
  - id: D21
    scope:
      - S1
    question: Should the shared interpolation helper also handle the whole-value case (full string is a single reference),
      or only inline?
    answer: Handle both — the helper detects single-expression strings (no surrounding text) and returns the raw value,
      otherwise returns the interpolated string
    justification: Unifies resolution logic; callers become simpler
  - id: D22
    scope:
      - S1
    question: What should the shared interpolation helper's name and signature be?
    answer: "interpolateTemplate(value: string, resolve: (expr: string) => unknown | undefined): unknown — takes a resolver
      callback"
    justification: Callback pattern decouples the helper from namespace knowledge; each phase provides its own resolver
  - id: D23
    scope:
      - S1
    question: Should normalizeVarRef be preserved for backward compatibility with bare-$ whole-value refs?
    answer: Remove it — convert all references to ${...} syntax internally
    justification: Minimal disruption to existing code paths; bare-$ handling is well-tested
  - id: D24
    scope:
      - S1
    question: In resolveGivens, how should the control flow work for strings that contain inline ${...} but also start with $?
    answer: remove support for bare-$ patterns entirely
    justification: patron specified
  - id: D25
    scope:
      - S1
    question: In resolveGivens, should a bare-$ string that fails whole-value matching but contains ${...} patterns fall
      through to inline interpolation?
    answer: remove support for bare-$ patterns entirely
    justification: patron specified
  - id: D26
    scope:
      - S1
    question: Should there be an escape mechanism for literal ${...} text in givens strings?
    answer: Yes — support \${...} or $${...} to produce literal ${...} output
    justification: No realistic use case for literal ${...} in givens values; engine code can handle edge cases

brief: |
  The clerk should have a 'recommends' dependency on Oculus, and contribute a page for managing writs. This should include a display of writs and their key metadata. Sorting, filtering, and search (particularly by status) should be implemented. Ther should be a way to perform key writ operations:

  - legal state transitions, especially cancel
  - create/edit/delete links between writs
  - repost failed writs (creates a new writ with the same body/title--with possible annotation of it being a repost--, along with an appropriate link to the original writ)
  - Post new writs: this will require a large, possibly expandable text area, a dropdown to select the writ type (from the available options in the giuld), and a submit button
slug: clerk-page-for-oculus

scope:
  - id: S1
    description: "Writ list page with filtering and search — core page showing writs with key metadata, status/type filtering, text search on title, and sort controls. Includes all apparatus wiring: recommends dependency on oculus, pages contribution in supportKit, package.json files update, and page directory structure."
    rationale: "The foundational deliverable: without a page that displays writs, none of the interactive features have a home."
    included: true

  - id: S2
    description: "Status transition controls — UI to perform all legal state transitions on writs (accept, complete, fail, cancel) with resolution text entry where required."
    rationale: "Brief explicitly calls out 'legal state transitions, especially cancel'. This is the primary interactive capability."
    included: true

  - id: S3
    description: "Link management — view existing links on writs, create new links (specifying target writ and relationship type), and delete links."
    rationale: "Brief explicitly requests 'create/edit/delete links between writs'. Display of links is implied by 'key metadata'."
    included: true

  - id: S4
    description: "Repost failed writs — UI to create a new writ from a failed one, carrying over title and body with annotation, and automatically creating a link back to the original."
    rationale: "Brief explicitly describes this as a compound operation: new writ with same body/title + annotation + link to original."
    included: true

  - id: S5
    description: "Post new writs — form with title input, expandable body textarea, writ type dropdown (populated from guild config), and submit button. Includes a new writ-types tool to expose available types to the page."
    rationale: "Brief explicitly describes the form requirements: 'large, possibly expandable text area, a dropdown to select the writ type, and a submit button'."
    included: true

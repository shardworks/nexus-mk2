brief: |
  Goals: not mix 'rig template variables' in with standard spider configs, such as `rigTemplates` itself.
  Current State: In rig templates, `$spider.<name>` evaluates the value of the 'name' property on the `spider` apparatus config. I'd like to replace the `spider.` prefix with `vars.`, and also only resolve from a `variables` key nested under spider.
  Additional Changes: The `$role` special value should also be removed. If a `role` variable is desired, it should be placed under the `variables` key and referenced via `$vars.foo` directly.
slug: update-rig-template-variable-handling

scope:
  - id: S1
    description: "Replace $spider.<key> variable prefix with $vars.<key>, resolving from a new spider.variables config dict instead of the flat SpiderConfig object"
    rationale: "Core goal of the brief — isolate template variables from apparatus config fields like rigTemplates, pollIntervalMs"
    included: true

  - id: S2
    description: "Remove the $role special variable — role is no longer a first-class template variable and must be placed in variables if needed"
    rationale: "Explicitly stated in the brief's Additional Changes section"
    included: true

  - id: S3
    description: "Update tests to use new $vars.* syntax and verify $spider.* / $role are rejected at startup"
    rationale: "Implied — every variable resolution and validation test references the old syntax"
    included: true

  - id: S4
    description: "Update spider.md doc to reflect the new variables config key and $vars.* syntax"
    rationale: "Implied — doc currently shows old config shape and no variables key; will be incorrect after the code change"
    included: true

decisions:
  - id: D1
    scope:
      - S1
    question: What is the new variable prefix for user-defined template variables?
    options:
      a: $vars.<key> — short, distinct from any apparatus name
      b: $variables.<key> — matches the config key name exactly
    selected: a
    analysis:
      audience:
        - patron
        - author
      confidence: high
      context: The brief explicitly says 'replace the spider. prefix with vars.' — this is stated directly.
      observable: true
      recommendation: a
      rationale: "Brief is explicit: use $vars prefix."
      stakes: high
  - id: D2
    scope:
      - S1
    question: Where in SpiderConfig do user variables live?
    options:
      a: "A new variables?: Record<string, unknown> field on SpiderConfig"
      b: A separate top-level key outside spider config
    selected: a
    analysis:
      audience:
        - patron
        - author
      confidence: high
      context: Brief says variables should be 'nested under spider' in guild.json. SpiderConfig is the typed interface for the spider block.
      observable: true
      recommendation: a
      rationale: "Brief is explicit: variables is nested under spider."
      stakes: high
  - id: D3
    scope:
      - S1
    question: What regex pattern validates $vars references in templates?
    options:
      a: /^\$vars\.[a-zA-Z_][a-zA-Z0-9_]*$/ — same identifier rules as the existing $spider.* pattern
      b: "Allow dots for nested access: /^\\$vars\\.[a-zA-Z_][a-zA-Z0-9_.]*$/"
    selected: a
    analysis:
      audience:
        - author
      confidence: high
      context: The existing $spider.* pattern uses single-level identifiers only. The inventory notes that $spider.a.b was already rejected as invalid. No nested access precedent exists.
      observable: true
      recommendation: a
      rationale: Follow existing convention — single-level identifiers only. Nested access was never supported.
      stakes: low
  - id: D4
    scope:
      - S1
    question: How does $vars.<key> resolve when the key is absent from variables?
    options:
      a: Omit the givens key entirely (same as current $spider.* undefined behavior)
      b: Resolve to null or empty string
      c: Throw a runtime error
    selected: a
    analysis:
      audience:
        - author
      confidence: high
      context: Current code has an explicit comment '// undefined → omit key entirely' for $spider.* resolution. This lets templates conditionally include givens based on config presence.
      observable: true
      recommendation: a
      rationale: Existing convention — omit key on undefined. Same behavior, new namespace.
      stakes: low
  - id: D5
    scope:
      - S1
    question: How does $vars.<key> resolve when the variables dict itself is absent from SpiderConfig?
    options:
      a: Treat as empty dict — all $vars.* keys resolve to undefined (and are omitted)
      b: Throw at startup if any template references $vars.* but variables is not configured
    selected: a
    analysis:
      audience:
        - author
        - operator
      confidence: high
      context: variables is optional on SpiderConfig. Treating it as empty dict when absent is consistent with how other optional config fields work (e.g., rigTemplates defaults to undefined and lookupTemplate throws only at spawn time). Templates with $vars.* references that resolve to undefined simply omit those givens keys.
      observable: true
      recommendation: a
      rationale: Consistent with existing optional-field convention. No special startup error needed.
      stakes: low
  - id: D6
    scope:
      - S1
    question: What happens to $spider.* references in templates after this change?
    options:
      a: Rejected at startup by validateTemplates as an unrecognized variable (same error path as any other bad $ reference)
      b: Silently ignored (resolve to undefined, omit key)
      c: Specific deprecation error message mentioning migration to $vars.*
    selected: a
    analysis:
      audience:
        - operator
        - author
      confidence: high
      context: The brief says '$spider.foo would be an error'. The existing validateTemplates R7 block already throws for unrecognized $ references. $spider.* simply falls out of the valid set.
      observable: true
      recommendation: a
      rationale: Brief is explicit that $spider.foo is an error. The existing validation already handles this — just remove $spider.* from the allowlist.
      stakes: low
  - id: D7
    scope:
      - S2
    question: What happens to $role references in templates after this change?
    options:
      a: Rejected at startup by validateTemplates as an unrecognized variable
      b: Silently resolve to undefined
    selected: a
    analysis:
      audience:
        - operator
        - author
      confidence: high
      context: Brief says '$role should be removed'. Like D6, it falls out of the valid set in validateTemplates and gets the standard unrecognized variable error.
      observable: true
      recommendation: a
      rationale: Consistent with D6 — removed variables become unrecognized references, caught at startup.
      stakes: low
  - id: D8
    scope:
      - S2
    question: Should SpiderConfig.role remain as a typed field on the interface?
    options:
      a: Keep it — it's still a valid config field for other purposes (e.g., buildStaticEngines dead code, potential direct use by engines)
      b: Remove it from SpiderConfig entirely
    selected: b
    analysis:
      audience:
        - author
        - implementer
      confidence: medium
      context: SpiderConfig.role is referenced by buildStaticEngines (dead code). No live code path reads it after $role removal and the trySpawn context change. However, removing it is a separate cleanup concern — the brief only asks to remove $role as a template variable, not to remove the config field.
      observable: false
      recommendation: a
      rationale: Brief scope is template variable handling, not SpiderConfig cleanup. Keep the field to avoid unnecessary churn.
      stakes: low
  - id: D9
    scope:
      - S1
      - S2
    question: Should the role field be removed from the resolveGivens/buildFromTemplate context parameter type?
    options:
      a: Yes — remove role from context type since $role no longer exists
      b: No — keep it for forward compatibility even though nothing reads it
    selected: a
    analysis:
      audience:
        - implementer
      confidence: high
      context: The role field on context existed solely to support $role resolution. With $role removed, it's dead weight. The trySpawn call site computed it as spiderConfig.role ?? 'artificer' — that computation can be removed too.
      observable: false
      recommendation: a
      rationale: Dead code removal. The field has no remaining consumer.
      stakes: low
  - id: D10
    scope:
      - S1
    question: How should resolveGivens access the variables dict from context?
    options:
      a: Read from context.spiderConfig.variables directly — (context.spiderConfig.variables ?? {})[key]
      b: "Destructure variables into its own context field: context: { writ, variables }"
    selected: a
    analysis:
      audience:
        - implementer
      confidence: high
      context: spiderConfig is already on the context. Adding a separate variables field is redundant. Reading .variables directly keeps the context shape simple and avoids duplicating data.
      observable: false
      recommendation: a
      rationale: Simpler — no new context field, just dereference one level deeper on existing field.
      stakes: low
  - id: D11
    scope:
      - S1
    question: What is the exact regex for matching $vars.* in resolveGivens?
    options:
      a: /^\$vars\.[a-zA-Z_][a-zA-Z0-9_]*$/ — mirror the existing $spider.* regex with 'vars' substituted
    selected: a
    analysis:
      audience:
        - implementer
      confidence: high
      context: Only one option — the existing pattern is well-tested and the inventory confirms the regex is identical between resolveGivens and validateTemplates. Just swap 'spider' for 'vars'.
      observable: false
      recommendation: a
      rationale: Direct substitution of the existing pattern.
      stakes: low
  - id: D12
    scope:
      - S1
    question: How should the resolved key be extracted from the $vars.* match?
    options:
      a: value.slice('$vars.'.length) — same pattern as current value.slice('$spider.'.length)
    selected: a
    analysis:
      audience:
        - implementer
      confidence: high
      context: Direct substitution of existing approach. '$vars.' is 6 chars vs '$spider.' at 8.
      observable: false
      recommendation: a
      rationale: Follow existing pattern exactly.
      stakes: low
  - id: D13
    scope:
      - S1
    question: Should the variables lookup use a type assertion like the current $spider.* code does?
    options:
      a: No assertion needed — variables is already typed as Record<string, unknown>
      b: Use (context.spiderConfig.variables as Record<string, unknown>) for consistency
    selected: a
    analysis:
      audience:
        - implementer
      confidence: high
      context: The current code casts spiderConfig to Record<string, unknown> because SpiderConfig has typed fields and index access would fail without assertion. variables is already Record<string, unknown>, so index access works natively.
      observable: false
      recommendation: a
      rationale: No cast needed — the type already supports arbitrary key access.
      stakes: low
  - id: D14
    scope:
      - S3
    question: How should STANDARD_TEMPLATE be updated in tests?
    options:
      a: Replace $role with $vars.role and $spider.buildCommand/$spider.testCommand with $vars.buildCommand/$vars.testCommand
      b: Remove role from template givens entirely (use literal 'artificer')
    selected: a
    analysis:
      audience:
        - implementer
      confidence: high
      context: "STANDARD_TEMPLATE mirrors the old static pipeline. The template should continue to exercise variable resolution — using literals would reduce test coverage of the new $vars.* path. The default buildFixture config needs variables: { role: 'artificer' } to match."
      observable: false
      recommendation: a
      rationale: Keeps variable resolution exercised in the standard test path.
      stakes: low
  - id: D15
    scope:
      - S3
    question: What default variables should buildFixture's spider config include?
    options:
      a: "variables: { role: 'artificer' } — minimal set needed for STANDARD_TEMPLATE to resolve $vars.role"
      b: "variables: { role: 'artificer', buildCommand: undefined, testCommand: undefined } — explicit about optional fields"
      c: "variables: { role: 'artificer' } with no buildCommand/testCommand — those resolve to undefined and are omitted, which is the existing behavior"
    selected: c
    analysis:
      audience:
        - implementer
      confidence: high
      context: Currently buildFixture has no buildCommand or testCommand in the default spider config. The STANDARD_TEMPLATE references $spider.buildCommand which resolves to undefined and the key is omitted. The new $vars.buildCommand does the same when variables has no buildCommand key. Behavior is identical.
      observable: false
      recommendation: c
      rationale: Matches current behavior — buildCommand/testCommand are omitted by default. Only tests that explicitly set them need to add them to variables.
      stakes: low
  - id: D16
    scope:
      - S3
    question: Should tests be added that specifically verify $spider.* and $role are now rejected?
    options:
      a: Yes — add explicit tests that $spider.buildCommand and $role now throw at startup validation
      b: No — the existing unrecognized-variable tests cover the error path
    selected: a
    analysis:
      audience:
        - implementer
      confidence: high
      context: The existing test 'accepts $spider.buildCommand as a valid variable' must become a rejection test. Explicitly testing the previously-valid references ensures no regression. The existing '$buildCommand throws' test remains useful as-is.
      observable: false
      recommendation: a
      rationale: Explicit regression tests for removed syntax are cheap and valuable.
      stakes: low
  - id: D17
    scope:
      - S4
    question: How extensively should spider.md be updated?
    options:
      a: Update only the Configuration section (config example at the end) to show variables and $vars.* syntax
      b: Update Configuration section and also the Static Graph section which shows spawnStaticRig reading config.role directly
    selected: b
    analysis:
      audience:
        - patron
        - author
      confidence: medium
      context: The Static Graph section is already stale (describes pre-template code). A full rewrite of the Static Graph section is a separate doc improvement — the brief is about template variable handling, not doc overhaul. Updating the config section to show the new variables key and $vars.* syntax is sufficient for this change.
      observable: true
      recommendation: a
      rationale: Scope-appropriate update. The Static Graph staleness predates this brief and is a separate concern.
      stakes: low
  - id: D18
    scope:
      - S1
    question: Should buildStaticEngines (dead code) be updated or removed?
    options:
      a: Leave it untouched — it's dead code and not in the variable resolution path
      b: Remove it entirely since it's dead code
      c: Update it to use the new variables approach for consistency
    selected: a
    analysis:
      audience:
        - implementer
      confidence: high
      context: buildStaticEngines is never called in production. It reads config.role and config.buildCommand directly (not through template variable resolution). The 'buildStaticEngines preserved' test just verifies Spider works with STANDARD_TEMPLATE. Modifying or removing dead code is out of scope for this brief.
      observable: false
      recommendation: a
      rationale: Out of scope — dead code cleanup is a separate concern. It doesn't use the template variable system.
      stakes: low
  - id: D19
    scope:
      - S1
    question: What is the complete set of valid $ variable references after this change?
    options:
      a: $writ (exact match) and $vars.<identifier> (regex pattern)
      b: $writ, $vars.<identifier>, and keep $role as deprecated-but-valid
    selected: a
    analysis:
      audience:
        - patron
        - author
      confidence: high
      context: "Brief is explicit: $role is removed, $spider.* is removed. Only $writ (special case) and $vars.* (new namespace) remain."
      observable: true
      recommendation: a
      rationale: Brief is explicit — clean break, no deprecation path.
      stakes: high

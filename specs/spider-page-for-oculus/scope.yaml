brief: |
  The spider should have a 'recommends' dependency on Oculus, and contribute a page for managing its configuration and runtime state.

  ## Runtime Ui

  There should be a display of rigs and their key metadata, including links back to the writ on the clerk's page. Sorting and filtering should be possible, particularly by status or by writ.

  It should be possible to click a single rig to see a detail status of its execution progress. This should include all engines in the rigs, and their status (such as completed, pending, blocked, etc.) It should be possible to see the relationships between engines, and click on a particular engine to see its configuration details, status, etc.

  ## Config UI

  The new page should allow users to see:

  - Configured rig templates, and their structure (via readonly JSON text areas)
  - Registered engine designs, their contributing plugin, and useful details for each
  - Registered block types, their contributing plugin, and useful details for each

slug: spider-page-for-oculus

scope:
  - id: S1
    description: "Spider recommends Oculus — add recommends dependency and package.json wiring so Spider contributes page/route assets when Oculus is present"
    rationale: "Explicitly stated in the brief: 'should have a recommends dependency on Oculus'"
    included: true

  - id: S2
    description: "Runtime UI — rig list view with status/writ filtering, sorting, key metadata, and links to writ"
    rationale: "Brief describes 'a display of rigs and their key metadata, including links back to the writ on the clerk's page. Sorting and filtering should be possible'"
    included: true

  - id: S3
    description: "Runtime UI — rig detail view showing all engines, their statuses, upstream relationships, and clickable engine detail (config, status, yields, block info)"
    rationale: "Brief describes clicking a rig for 'detail status of its execution progress' including engine relationships and clickable engine details"
    included: true

  - id: S4
    description: "Config UI — display configured rig templates (readonly JSON), registered engine designs with plugin provenance, and registered block types with plugin provenance"
    rationale: "Brief explicitly lists these three config display requirements"
    included: true

  - id: S5
    description: "Custom API routes for config data — endpoints to enumerate engine designs and block types with contributing-plugin provenance, since no existing tool/API exposes this data"
    rationale: "Implied by S4 — FabricatorApi has no list method and neither registrar tracks provenance; custom routes are the enabling infrastructure"
    included: true

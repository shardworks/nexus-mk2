brief: "Add a SessionProvider for github copilot which can be used instead of only supporting `Claude Code`. This new provider would be added as a new apparatus package, the same way the Claude Code implementation is today."
slug: create-copilot-session-provider

scope:
  - id: S1
    description: "Core copilot apparatus package that implements AnimatorSessionProvider using the GitHub Models REST API (OpenAI-compatible chat completions endpoint), with package scaffolding, plugin export, and basic single-turn request/response"
    rationale: "The brief explicitly asks for a new apparatus package parallel to claude-code. The GitHub Models API is the only viable programmatic interface for autonomous Copilot sessions."
    included: true

  - id: S2
    description: "Agentic tool-call loop that bridges API-level tool_calls responses to guild tool handlers, enabling multi-turn tool use within a single session"
    rationale: "The existing SessionProviderConfig passes tools (ResolvedTool[]) to the provider. Without tool bridging, the copilot provider would ignore tools entirely, making it unable to perform tool-equipped work that the claude-code provider handles via MCP."
    included: true

  - id: S3
    description: "Streaming support — yield SessionChunk objects in real time as the API streams SSE responses"
    rationale: "The AnimatorSessionProvider contract includes streaming via config.streaming and the chunks async iterable. The claude-code provider supports both streaming and non-streaming paths. The brief says 'the same way the Claude Code implementation is today.'"
    included: true

  - id: S4
    description: "Plugin configuration section in guild.json for operator-configurable settings (API endpoint, authentication token env var, model name mapping)"
    rationale: "Unlike claude-code which uses a well-known CLI binary, the copilot provider needs at minimum an API token. Operators may also need to configure the API endpoint (GitHub Enterprise) or override model names."
    included: true

  - id: S5
    description: "Architecture documentation for the copilot apparatus (docs/architecture/apparatus/copilot.md following the existing template)"
    rationale: "The claude-code apparatus has a corresponding doc at docs/architecture/apparatus/claude-code.md. The brief says 'the same way the Claude Code implementation is today' which implies parity in documentation."
    included: true

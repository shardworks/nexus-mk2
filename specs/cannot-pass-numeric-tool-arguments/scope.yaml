brief: |
  Cannot pass numeric tool arguments via CLI. All CLI arguments are passed
  as strings. We need to detect other zod types and do whatever casting/etc.
  is required. (Numbers, probably booleans, maybe others.)
slug: cannot-pass-numeric-tool-arguments

scope:
  - id: S1
    description: "Coerce CLI string values to numbers for z.number() tool params before Zod validation"
    rationale: "This is the core bug — 8 numeric params across 6 tools are broken via CLI. The fix lives entirely in the CLI layer (helpers.ts + program.ts)."
    included: true

  - id: S2
    description: "Unit tests for the new coercion helper(s)"
    rationale: "The existing helpers (toFlag, isBooleanSchema, findGroupPrefixes) all have isolated unit tests in program.test.ts. The new helper needs the same coverage."
    included: true

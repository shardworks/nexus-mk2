brief: |
  Currently, the oculus main page only has a 'pages' widget which is not very useful. Let's remove that, and replace it with an overview of the guild's configuration and status. Key elements would be things like:
  - installed plugins, and their status
  - startup warnings, if any
  - general information similar to what the status tool returns
  - general configuration summary, and possibly even a (read-only? read-write?) display of the guild.json
slug: oculus-enhance-landing-page

scope:
  - id: S1
    description: "Guild identity card — display guild name, home path, nexus version, default model, and port on the landing page"
    rationale: "Brief says 'general information similar to what the status tool returns'; the status tool shows guild name, nexus version, home, model, and plugin count"
    included: true

  - id: S2
    description: "Installed plugins table — list all plugins with their type (apparatus/kit), version, package name, and status (loaded/failed with reason)"
    rationale: "Brief explicitly says 'installed plugins, and their status'; the oculus has live runtime data (g.kits(), g.apparatuses(), g.failedPlugins()) that is richer than what the status CLI tool shows"
    included: true

  - id: S3
    description: "Startup warnings display — show advisory warnings (missing recommends, unconsumed kit contributions) on the landing page"
    rationale: "Brief explicitly says 'startup warnings, if any'; currently these are emitted to console.warn and discarded — requires either a Guild interface change or re-computation in the oculus"
    included: true

  - id: S4
    description: "Guild configuration summary — read-only display of the full guild.json contents on the landing page"
    rationale: "Brief says 'general configuration summary, and possibly even a display of the guild.json'; the question of read-only vs read-write is a design decision"
    included: true

  - id: S5
    description: "JSON API endpoint — expose guild status data as a JSON API so the landing page (and other consumers) can fetch it programmatically"
    rationale: "Implied by the scope of data being surfaced; an API endpoint enables both server-rendered and future client-side consumption patterns, consistent with the existing /api/_tools pattern"
    included: true

  - id: S6
    description: "Remove the pages widget from the landing page"
    rationale: "Brief explicitly says 'remove that' referring to the pages widget; page links remain accessible via the nav bar"
    included: true

brief: |
  We need a way to cancel Animator sessions which are currently running. This includes killing the claude process, closing API connects, etc. Ideally, this is something that could be done from another process than the one that spawned it -- so the session itself must persist some sort of metadata that can be used to cancel the session, rather than requiring an in-memory handle or such. Consider support for currently in-memory process based sessions, but also a future state where sessions run in docker containers or remote vms.

  This change should include:

  - any new statuses for SessionDoc that make sense
  - new tool(s) for cancelling sessions
slug: cancellable-animator-sessions

scope:
  - id: S1
    description: "End-to-end session cancellation: 'cancelled' terminal status, process metadata persistence on SessionDoc, AnimatorApi.cancel() method, provider cancel interface, claude-code SIGTERM implementation, and result-handler coordination so the cancelled status is recorded correctly"
    rationale: "The brief's core ask — all these pieces are inseparable for a working cancel feature"
    included: true

  - id: S2
    description: "session-cancel tool for invoking cancellation from the CLI or MCP"
    rationale: "Brief explicitly requires 'new tool(s) for cancelling sessions'"
    included: true

  - id: S3
    description: "Update session-list tool to include 'cancelled' in its status filter enum"
    rationale: "Implied by adding a new status — users need to filter by it"
    included: true

  - id: S4
    description: "'cancelling' intermediate status — a transient state between cancel-requested and process-confirmed-dead, for UIs that want to show the transition"
    rationale: "Not mentioned in the brief but could be useful for observability. Adds complexity (timeouts, cleanup of stuck states). Can be added later if needed."
    included: true

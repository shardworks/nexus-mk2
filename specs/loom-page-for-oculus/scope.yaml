brief: "The loom should add a 'recommends' dependency on the oculus and contribute a page via its kit. This page should allow viewing information about roles which exist in the guild, including their name, configuration, and source (plugin or guild config). In addition to the key data, it should be possible to select a role and see the tools which are available to animas with that role, it's environment variable, and what its final System Prompt would be after weaving."
slug: loom-page-for-oculus

scope:
  - id: S1
    description: "Extend LoomApi with a listRoles() method that returns role metadata (name, permissions, strict, source) for all guild-configured and kit-contributed roles"
    rationale: "The page needs to enumerate all roles — the current LoomApi only has weave() which requires already knowing the role name"
    included: true

  - id: S2
    description: "Add recommends: ['oculus'] to the Loom apparatus and contribute a static page via supportKit.pages for the Oculus to serve"
    rationale: "Explicitly stated in the brief — the Loom contributes a page via its kit with a recommends dependency"
    included: true

  - id: S3
    description: "Add patron-callable tools (loom-roles, loom-weave) to the Loom's supportKit so the Oculus auto-exposes them as REST endpoints for the page to fetch data from"
    rationale: "The static page needs API endpoints to fetch role data and weave results; patron tools are the established pattern for Oculus REST endpoints"
    included: true

  - id: S4
    description: "Build the roles page HTML/JS that displays a role list with name/config/source, and on selection shows the role's tools, environment variables, and composed system prompt"
    rationale: "The interactive page UI is the core deliverable described in the brief"
    included: true

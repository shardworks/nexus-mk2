brief: "The rigTemplate specification allows templating against config variables in the spider (`$vars.<id>` or `${vars.id}` syntax). We should extend this to allow values yielded by upstream engines to be supplied as givens. One possible syntax is to use a template expression such as `${yields.<engine_id>.<yield_name>}`."
slug: "wire-upstream-yields-as-rigtemplate"

scope:
  - id: S1
    description: "Yield reference syntax in rig template givens: `$yields.<engine_id>.<yield_name>` and `${yields.<engine_id>.<yield_name>}` expressions that resolve upstream engine yields into downstream engine givens"
    rationale: "This is the core capability described by the brief"
    included: true

  - id: S2
    description: "Startup validation of yield references: verify that the referenced engine_id exists in the template and is reachable upstream of the engine using the reference"
    rationale: "Existing variable references ($writ, $vars.*) are validated at startup — yield references must be too for consistency and fail-fast behavior"
    included: true

  - id: S3
    description: "Run-time resolution of yield references in tryRun() and tryCollect() — resolving stored $yields.* strings against the upstream yields map before passing givens to engine run()/collect()"
    rationale: "Yield values only exist after upstream engines complete, so resolution must happen at run time, not spawn time"
    included: true

  - id: S4
    description: "JSDoc and comment updates on RigTemplateEngine.givens, EngineInstance.givensSpec, and resolveGivens to document the new variable namespace and the spawn-vs-run-time resolution distinction"
    rationale: "Implied by the change — existing comments explicitly enumerate supported variable namespaces and claim spawn-time resolution only"
    included: true

brief: Add rig-list + rig-show tools to the spider — mirrors the Clerk's writ-list/writ-show pattern.
slug: add-rig-list-rig-show-tools-to-the
scope:
  - id: S1
    description: rig-show tool — look up a single rig by id and return the full RigDoc
    rationale: Explicitly named in the brief. Direct mirror of writ-show.
    included: true
  - id: S2
    description: rig-list tool — list rigs with optional status/writId filters, pagination
    rationale: Explicitly named in the brief. Direct mirror of writ-list.
    included: true
  - id: S3
    description: SpiderApi.show() and .list() methods backing the tools
    rationale: The Clerk pattern has tools delegate to apparatus API methods rather than querying the book directly. The tools need API methods to call.
    included: true
  - id: S4
    description: RigFilters type for the list method's filter parameter
    rationale: The Clerk defines WritFilters as a named type. Mirroring the pattern means defining RigFilters rather than using inline params.
    included: true
  - id: S5
    description: Unit tests for the new list/show API methods
    rationale: The existing spider.test.ts has comprehensive crawl tests. New API surface needs test coverage following the same fixture pattern.
    included: true
  - id: S6
    description: Re-export new types (RigFilters) from the package barrel
    rationale: The Clerk re-exports WritFilters for downstream consumers. Same applies if other packages need to call SpiderApi.list() programmatically.
    included: true

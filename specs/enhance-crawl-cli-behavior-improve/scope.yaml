brief: |
  Improve usability of spider 'crawl' tools:
  - Rename 'crawl' to 'crawl-one'
  - Rename 'crawlContinual' to 'crawl-continual'
  - Change 'crawl-continual' 'max-idle-cycles' so that, by default, the spider never stops crawling
slug: enhance-crawl-cli-behavior-improve

scope:
  - id: S1
    description: "Rename the single-step crawl tool from 'crawl' to 'crawl-one'"
    rationale: "Explicitly requested in the brief. Disambiguates the single-step tool from the continuous loop."
    included: true

  - id: S2
    description: "Rename the continuous crawl tool from 'crawlContinual' to 'crawl-continual'"
    rationale: "Explicitly requested in the brief. Brings naming in line with codebase convention (all other tools use hyphenated names)."
    included: true

  - id: S3
    description: "Change crawl-continual default behavior so the spider never stops crawling unless explicitly told to"
    rationale: "Explicitly requested in the brief. Current default of 3 idle cycles causes premature exit."
    included: true

  - id: S4
    description: "Update tool descriptions, instructions text, and param descriptions to reflect new names and defaults"
    rationale: "Implied by the renames — user-facing text references the old names and old default value of 3."
    included: true

  - id: S5
    description: "Rename source files to match new tool names (crawl.ts -> crawl-one.ts) and update internal identifiers (export names, console.error tags)"
    rationale: "Implied by the renames for codebase consistency. Existing file crawl-continual.ts already matches. Internal identifiers like crawlTool, crawlContinualTool, and the [crawlContinual] log tag would be updated."
    included: true

  - id: S6
    description: "Update spider architecture doc (docs/architecture/apparatus/spider.md) to reflect new tool names"
    rationale: "Implied — the doc references tool names (stale ones at that). Without this the doc drifts further from reality."
    included: true

slug: x022-rig-moji64hs-baseline
title: X022 — rig-moji64hs (control, vision-keeper deletion) baseline (stock artificer.md)
codex: nexus

description: |
  X022 baseline trial on the control rig (rig-moji64hs, vision-keeper
  deletion + Surveyor redefinition / w-moji63xm). Mechanical /
  deletion-heavy commission, six sealed inscriptions in production
  (721c9ec → cd5be49). Ships the verbatim production artificer.md
  as the implementer's system prompt.

  Codex pinned to d6e34097f698df66d595f81f928320eafde8276f — the
  parent of the first sealed commit (721c9ec) for this rig. This is
  the implementer-eye-view of the codebase at the moment the original
  rig started.

  Pair with manifests/rig-moji64hs-combined.yaml.

  Migrated from xguild trial doctype to claude-direct on 2026-05-08
  (matches X021's migration). Per-trial cost expectation under
  claude-direct: $11-$15 on this control rig (per X021 measurements
  on the equivalent rig).

  Verify command is workspace-wide typecheck only — running the
  full test suite would take 8-10+ minutes which is too slow for a
  Tier-1 mechanical check. Workspace-wide typecheck catches "did the
  deletion leave dangling references" — the load-bearing question
  for this rig. Test gating is deferred to manual Tier-2 review of
  the trial's diff.


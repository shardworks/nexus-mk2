slug: x022-rig-moji64hs-combined
title: X022 — rig-moji64hs (control, vision-keeper deletion) combined-nudges variant
codex: nexus

description: |
  X022 combined-nudges variant on the control rig (rig-moji64hs,
  vision-keeper deletion + Surveyor redefinition / w-moji63xm).
  Identical to rig-moji64hs-baseline.yaml in every way EXCEPT the
  artificer role file fed as the implementer's system prompt.

  Variant role file prepends a "Tooling Discipline" section between
  "Role" and "Testing", carrying all five Category 3 nudges
  (c-mok4oct1):
    #8 Prefer Bash bulk edits for systematic changes
    #9 Targeted Reads after Grep (--offset / --limit)
    #10 Avoid repeat greps
    #11 Narrow test filters during iteration
    #12 Don't re-test packages you didn't change

  Same codex pin, same fixtures, same brief, same framework version.
  The only deliberate variable is the artificer role file content
  passed through `rolePath`.

  Pair with manifests/rig-moji64hs-baseline.yaml.

  Migrated from xguild trial doctype to claude-direct on 2026-05-08.


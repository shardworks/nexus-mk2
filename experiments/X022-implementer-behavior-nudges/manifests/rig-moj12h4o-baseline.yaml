slug: x022-rig-moj12h4o-baseline
title: X022 — rig-moj12h4o (substantive, Reckoner periodic tick) baseline (stock artificer.md)
codex: nexus

description: |
  X022 baseline trial on the substantive rig (rig-moj12h4o, Reckoner
  periodic tick / w-moiy8hkv). Ships the verbatim production
  artificer.md (snapshot 2026-05-03 from /workspace/vibers/roles/) as
  the implementer's system prompt. Brief is the verbatim planner spec
  extracted from the production astrolabe.plans book.

  Codex pinned to 0e1e81f4a219179fd264625b869e12bd00778365 — the
  parent of the implementer's draft commit 7bed456 for w-moiy8hkv.
  This is the implementer-eye-view of the codebase at the moment
  the original rig started.

  Pair with manifests/rig-moj12h4o-combined.yaml (combined-nudges
  variant). Outcome metric: implementer session cost (USD), tokens,
  wallclock duration. Mechanism metrics extracted post-hoc from the
  transcript jsonl.

  Migrated from xguild trial doctype to claude-direct on 2026-05-08
  (matches X021's migration). The xguild original used a full
  test-guild rig with review/revise/seal stages; claude-direct runs
  a single implementer session against a fresh codex checkout, with
  no astrolabe / review / revise / seal. Faithful to the production
  implementer's session shape (executionWrap: production carries the
  same EXECUTION_EPILOGUE as spider's implement engine), with
  ~3x lower per-trial cost than xguild on the same workload.

  Per-trial cost expectation under claude-direct: $18-$28 on this
  substantive rig. See ../../X021-inventory-format/artifacts/results.md
  for measured run-to-run variance on the equivalent X021 baseline.


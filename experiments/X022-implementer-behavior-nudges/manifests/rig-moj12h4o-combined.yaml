slug: x022-rig-moj12h4o-combined
title: X022 — rig-moj12h4o (substantive, Reckoner periodic tick) combined-nudges variant
codex: nexus

description: |
  X022 combined-nudges variant on the substantive rig (rig-moj12h4o,
  Reckoner periodic tick / w-moiy8hkv). Identical to
  rig-moj12h4o-baseline.yaml in every way EXCEPT the artificer role
  file copied into roles/artificer.md.

  Variant role file prepends a "Tooling Discipline" section between
  "Role" and "Testing", carrying all five Category 3 nudges
  (c-mok4oct1):
    #8 Prefer Bash bulk edits for systematic changes
    #9 Targeted Reads after Grep (--offset / --limit)
    #10 Avoid repeat greps
    #11 Narrow test filters during iteration
    #12 Don't re-test packages you didn't change

  Same codex pin, same plugin set, same test guild config, same
  framework version, same waitForTerminal cap. The only deliberate
  variable is the artificer role file content.

  Pair with manifests/rig-moj12h4o-baseline.yaml.

frameworkVersion: '0.1.301'

fixtures:
  - id: codex
    engineId: lab.codex-setup
    givens:
      upstreamRepo: /workspace/nexus
      baseSha: 0e1e81f4a219179fd264625b869e12bd00778365

  - id: test-guild
    engineId: lab.guild-setup
    dependsOn: [codex]
    givens:
      plugins:
        - { name: '@shardworks/stacks-apparatus', version: '0.1.301' }
        - { name: '@shardworks/tools-apparatus', version: '0.1.301' }
        - { name: '@shardworks/codexes-apparatus', version: '0.1.301' }
        - { name: '@shardworks/clerk-apparatus', version: '0.1.301' }
        - { name: '@shardworks/fabricator-apparatus', version: '0.1.301' }
        - { name: '@shardworks/animator-apparatus', version: '0.1.301' }
        - { name: '@shardworks/loom-apparatus', version: '0.1.301' }
        - { name: '@shardworks/claude-code-apparatus', version: '0.1.301' }
        - { name: '@shardworks/spider-apparatus', version: '0.1.301' }
        - { name: '@shardworks/clockworks-apparatus', version: '0.1.301' }
      config:
        loom:
          roles:
            artificer:
              model: opus
              permissions:
                - 'clerk:*'
                - 'tools:*'
            reviewer:
              model: opus
              permissions: []
        animator:
          sessionProvider: 'claude-code'
        spider:
          variables:
            role: 'artificer'
            buildCommand: 'pnpm --filter @shardworks/reckoner-apparatus build && pnpm --filter @shardworks/clockworks-apparatus build'
            testCommand: 'pnpm --filter @shardworks/reckoner-apparatus test && pnpm --filter @shardworks/clockworks-apparatus test'

      files:
        - sourcePath: /workspace/nexus-mk2/experiments/X022-implementer-behavior-nudges/fixtures/test-guild/roles/artificer-combined-nudges.md
          guildPath: roles/artificer.md

  - id: daemon
    engineId: lab.daemon-setup
    dependsOn: [test-guild]
    givens: {}

scenario:
  engineId: lab.commission-post-xguild
  givens:
    briefPath: /workspace/nexus-mk2/experiments/X022-implementer-behavior-nudges/briefs/rig-moj12h4o-baseline.md
    waitForTerminal: true
    timeoutMs: 5400000   # 90 min cap

probes:
  - id: context
    engineId: lab.probe-trial-context
    givens: {}
  - id: stacks
    engineId: lab.probe-stacks-dump
    givens: {}
  - id: commits
    engineId: lab.probe-git-range
    givens: {}

archive:
  engineId: lab.archive
  givens: {}

slug: x023-rig-moj12h4o-v1-single-commit
title: X023 — rig-moj12h4o (substantive) v1 single-commit nudge alone
codex: nexus

description: |
  X023 v1 variant on the substantive rig (rig-moj12h4o). Identical
  to rig-moj12h4o-baseline.yaml in every way EXCEPT the artificer
  role file: this variant uses fixtures/roles/artificer-v1-single-commit.md,
  which prepends a "Single Commit" Work Discipline section that
  strengthens the existing baseline's incidental "single commit"
  instruction in Finishing Your Work.

  Tests H2 (per-idea separation) for the commit-decomposition nudge
  in isolation. Run after the baseline + v3 combined cells land at
  n=3 and only if those show signal worth attributing.

  Pair with rig-moj12h4o-baseline.yaml and the v2/v3 manifests for
  per-idea separation.

  Note on existing instruction: production artificer.md (and X021's
  baseline) already says "commit all changes in a single commit"
  in the Finishing Your Work section. X021 control runs (n=3) showed
  this instruction was followed 1/3 of the time on multi-piece work.
  v1 strengthens the framing (upfront discipline, not closing
  reminder) and tests whether stronger placement improves adherence.


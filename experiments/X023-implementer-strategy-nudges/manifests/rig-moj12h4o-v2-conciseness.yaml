slug: x023-rig-moj12h4o-v2-conciseness
title: X023 — rig-moj12h4o (substantive) v2 conciseness nudge alone
codex: nexus

description: |
  X023 v2 variant on the substantive rig (rig-moj12h4o). Identical
  to rig-moj12h4o-baseline.yaml in every way EXCEPT the artificer
  role file: this variant uses fixtures/roles/artificer-v2-conciseness.md,
  which prepends a "Direct Trajectory" Work Discipline section
  directing fewer iterations / less speculative refactoring / one
  test run at the end.

  Tests H2 (per-idea separation) for the conciseness/iteration-discipline
  nudge in isolation. Run after baseline + v3 combined cells land
  at n=3 and only if those show signal worth attributing.

  Mechanism evidence: X021 substantive runs (n=6 across all variants)
  showed output token spread of 92K-118K (28%) on the same brief.
  Cheap-trajectory runs were lower-iteration, lower-rewrite. v2
  tests whether prompt nudges can induce that trajectory reliably.

  Pair with rig-moj12h4o-baseline.yaml and the v1/v3 manifests for
  per-idea separation.


title: X023 — rig-moj12h4o (substantive) v3 combined (single-commit + conciseness)
codex: nexus

description: |
  X023 v3 combined-strategy variant on the substantive rig
  (rig-moj12h4o). Identical to rig-moj12h4o-baseline.yaml in every
  way EXCEPT the artificer role file: this variant uses
  fixtures/roles/artificer-v3-combined.md, which prepends BOTH
  Work Discipline sections (Single Commit + Direct Trajectory).

  Tests H1 — does the combined two-nudge variant reduce implementer
  session cost ≥20% vs baseline at n=3?

  Pair with rig-moj12h4o-baseline.yaml. The minimum-viable run plan
  is baseline n=3 + this manifest n=3 (6 trials total). Per-idea
  separation (v1, v2) is optional and runs only after H1 lands.

  Per-trial cost expectation: $18-$28; minimum-viable plan total
  $108-$170.


slug: x023-rig-moji64hs-v3-combined
title: X023 — rig-moji64hs (control) v3 combined (single-commit + conciseness)
codex: nexus

description: |
  X023 v3 combined-strategy variant on the control rig (rig-moji64hs).
  Identical to rig-moji64hs-baseline.yaml in every way EXCEPT the
  artificer role file: this variant uses
  fixtures/roles/artificer-v3-combined.md.

  Tests H3 — control insensitivity. The control rig is where
  commit-decomposition variance was observed in X021; the v3 nudge
  should significantly reduce the 6-commit-sweep tendency. Cost
  effect on this rig is the cleanest test of "did the nudge actually
  work on the work-shape it was designed for."

  Per-trial cost expectation: $11-$15.


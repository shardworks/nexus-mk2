- session: 9898e9f5-c56a-4ecb-9d56-6af369628c99
  date: 2026-04-27
  item: "Reckoner contract rewrite — replaced docs/architecture/petitioner-registration.md (nexus 88fc173 → pushed as d25e3d5) with a substantially reframed design after multi-session iterative pressure-testing with Sean. Net change: petitions are not a separate entity — they're writs in `new` phase carrying ext['reckoner']. Composes existing framework primitives (Clerk's holding `new` phase, plugin-keyed extension slots, CDC + standing orders) rather than introducing parallel record types. Major design moves arrived at through iteration: drop patron special-casing → drop allow-lists → kit-static + Lattice-style emitter trust → multi-dim priority (visionRelation/severity/scope/time/domain + complexity + payload + labels) → reject framework-mediated identity (plugin authors routinely use raw timer/signal/HTTP callbacks that drop ALS context, found in 4+ current plugins) → reject handle-based authority (over-engineering once allow-lists dissolved) → reject `held` phase (existing `new` phase suffices) → reject Reckoner-authoring writs (layering wrong; Clerk shouldn't know about petitions) → keep registry but lightweight/descriptive (kit-static, not authority gating) → guild.json reckoner.{enforceRegistration:false default, disabledSources:skip-don't-decline}. Required Clerk-side schema addition: WritDoc.ext + setWritExt API (parallel to existing status, K8s metadata-vs-status split). Two workflows supported: direct clerk.post (always available) and reckoner.petition() helper (canonical). Workflow 3 (post-then-petition) explicitly skipped. Doc went from 853 lines → 864 lines (similar length but completely restructured; +1 framework concept removed: 'petition' as distinct entity dissolved). Earlier in same session: opened 6 sub-clicks under c-mofxdlwb (identity-proxy track) on call chaining, async boundaries, self-calls, direct imports, provides mutability, proxy mechanics, guild singleton viability, identity-aware timer alternative; concluded c-mog27rq8 (violation likelihood) with the analysis that drove rejection of framework-mediated identity. Sean's pressure-tests through the session sharpened the design substantially — flagged this is the kind of work that benefits from interactive iteration even though the end-product (doc rewrite) is bounded enough to be commission-shaped, hence Sean's explicit 'have you hand-edit it' direction."
  commissionable: true

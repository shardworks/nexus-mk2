- session: 5a7ee279-6433-4b84-ade8-6fd109d1c4a2
  date: 2026-04-28
  item: "Reviewed docs/architecture/reckonings-book.md (the Apr-26 commission output, w-moera26f / commit 58083c7) and revised it interactively with Sean. Initial review surfaced seven probes — four of which Sean approved as straight tightenings (urgency indexing now that priority is the Reckoner's organizing axis; writer-enforced-invariant note for the iff-outcome discriminated union since Stacks won't validate it; deferCount semantics under no-ops — counter advances only on outcome:'deferred' rows, not on re-evaluations of held petitions; forward-link the wake-up dispatch path to Reckoner-core for `deferSignal` → standing order and `deferUntil` → schedule). Fifth probe was a substantive design conversation: Sean pushed back on the doc's 'every petition produces a row every tick' assumption — 'are they useful? is it literally every petition gets one every tick? I think I was initially assuming the reckoner wouldn't look at everything every tick.' Pressure-tested the no-op design and surfaced two conflated concerns: (a) the journal schema (this doc) and (b) the Reckoner's per-tick scoping policy (which petitions get weighed per tick — Reckoner-core, separate). Reframed the journal from tick-shaped to event-shaped logging: the Reckoner writes a row only when consideration produced a state transition or substantive re-evaluation (e.g. wake-up signal fired and re-weighed). Ticks where the Reckoner doesn't reach a petition, or re-encounters unchanged conditions, produce no row — absence-of-row becomes the load-bearing signal. Decoupled scoping policy from journal schema; schema accommodates either sweep-everything or priority-bounded walk. Redid storage-growth math: ~525K-1.5M rows/year (~250-800 MB/year) at steady state, roughly 10× below the earlier projection. Opened c-moi1tf8t under c-mod99ris (Reckoner design root) for the Reckoner-core scoping-policy commission. Committed as nexus 5a99398 (docs commit only — staged just docs/architecture/reckonings-book.md from a working tree with unrelated mods to lattice/sentinel/tools)."
  commissionable: false
  justification: sanctum

- session: 5a7ee279-6433-4b84-ade8-6fd109d1c4a2
  date: 2026-04-28
  item: "Second-pass realignment of docs/architecture/reckonings-book.md after reviewing it against .scratch/reckoner/reckoner-contract.md (the latest plan for the Reckoner). Found substantial contradictions: the Apr-26 reckonings-book.md was written under the OLD framing (separate petitions entity, reckoner/petitions book, urgency enum, patron fast-path, withdrawn as a Reckoner-recorded outcome), but the Apr-27 reckoner-contract.md / committed petitioner-registration.md (nexus d25e3d5) operate under the NEW framing — petition IS a writ in `new` phase carrying `ext['reckoner']`, approval is a phase transition (`new` → `open`), held writs live in clerk/writs (no separate petitions book), priority is multi-dimensional (no urgency scalar), no patron special case, withdrawn is direct clerk.transition that bypasses the Reckoner. Some of my just-shipped revisions deepened the drift — I had added urgency indexing for a field that doesn't exist in the new design. Surfaced 10 contradictions to Sean prioritized severe-first. Sean directed: (1) update materialized-view section to reference clerk/writs; (2) replace petitionId with writId; (3) lift+index visionRelation, severity, and domain (verified Stacks scalar-only and omitted domain — flagged as Open Question for if Stacks grows array-index support); (4) drop patron fast-path framing, recast tickEventId optionality as CDC-vs-tick trigger paths; (5) outcome enum past-tense, drop withdrawn from decision list; (6) confirm withdrawn produces no row (reckonings-book is right, contract is wrong); (7) add 'source_unregistered' to decline reasons for the enforceRegistration check path; (8) drop writId and acceptedAt from accepted-row metadata (redundant — writId is now the top-level record key, acceptance is a phase transition). Did the realignment autonomously: ~447 insertions / 290 deletions, ~half the lines touched. Major rewrites: Held-writ shape (settled upstream), Held-writ lifecycle, Tick identity, Lean snapshot rationale (added 'Why these three and not the rest of the priority block' subsection walking through scope/time/domain/complexity non-projection), Journal vs. Materialized View → Journal vs. Writs Book, Open Questions (added domain array-indexing trip-wire, fixed stale 5.26M projection reference). Sibling docs header and See Also updated to add petitioner-registration.md. Spine of the doc preserves: event-shaped journal, lean projection discipline, filter-shape-driven indexes, no updatedAt, append-only retention. Committed as nexus d6fc9e0. Follow-up: updated .scratch/reckoner/reckoner-contract.md §8 to drop `withdrawn` from the decision enum and add explicit prose explaining that petitioner-initiated withdrawals bypass the Reckoner (observable via `book.clerk.writs.updated` CDC; no Reckonings row produced because the Reckoner never made the decision). Brought the reckoner-contract.md draft under git in the sanctum (was previously untracked in .scratch/) per Sean's directive to ensure both docs are committed."

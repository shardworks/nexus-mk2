    item: "Reckoner design session, round 2 — worked through four open design surfaces with Sean, concluded all four, created one follow-up click, updated vocab. Petition shape (c-mod9a2gh): intent + rationale + priority_signals + context_anchors; no pre-built brief; specification work happens post-acceptance through existing Distiller → Sage pipeline; dropped cost_hint from v0 (petitioners don't need to estimate; Reckoner can infer from intent + context + history). Patron fast-path (c-mod9a48y): two first-class patron petition modes — imperative (priority=immediate, auto-accept, writ immediately) and discretionary (normal weighing); direct writ creation (CLI, Oculus) stays as always-available escape hatch for edge cases; priority as four-level enum (immediate | urgent | normal | low) with immediate authority-gated to source=patron via intake validation; rejected auto_accept-boolean + separate priority (redundant signal — immediate IS the top priority value). Deferral metadata (c-modaqnpt): narrowed defer_reason to product-level concerns (priority | queue_depth | time_hold | patron_policy | other) after Sean observed Spider/Coinmaster/Animator already handle resource/budget/dependency/rate-limit at the writ level downstream; added withdrawn terminal state; escalation policies kept as Reckoner config not shape; queue_depth reserved for the strategic hold case where Reckoner preserves prioritization authority against a weakly-priority-aware Spider (rare in practice if c-mocdmjk1 lands priority-aware). Decline feedback (c-mod9a6x3): two CDC-attached channels — petition state transitions on the petition record + Reckonings (append-only evaluation log, one record per Reckoner consideration event whether or not a state transition occurred); decline_reason narrowed to petition-validity-only (malformed | duplicate | policy_violation | source_banned | other); 'not worth doing on merit' explicitly NOT a Reckoner call (patron territory; starving-by-repeated-defer is the natura
  item: "Laboratory apparatus implementation kickoff — framework recon + plugin reshape. Re-framed by Sean: laboratory plugin lives in the sanctum at packages/laboratory (not in nexus framework), so Coco implements directly rather than commissioning to autonomous agents. Recon (concluded c-moma9psb): read live framework source to verify prerequisites — non-anima engines confirmed first-class via { status: 'completed' } EngineRunResult (precedent: spider.seal); 'nsg plugin install' accepts SHAs natively via npm git+URL#sha syntax; ClerkApi.registerWritType from apparatus.start is the writ-type contribution path; SpiderKit contributes rigTemplates+rigTemplateMappings; FabricatorRegistry scans kit.engines. One spec correction: 'nsg codex add' takes only (name, remoteUrl) — pinning happens earlier by pushing fresh GH repo at the desired SHA. One yellow flag: gh token has 'repo' scope but admin=false on shardworks/nexus-mk2; org policy for member create/delete unverified. Patron decisions captured: codex repos in shardworks org, --private, naming 'trial-<slug>-<trialId-prefix>'. Findings doc parked at .scratch/laboratory-framework-recon.md. Plugin reshape (concluded c-moma9qyz): replaced no-op stub with apparatus skeleton — requires=[stacks,clerk], recommends=[spider,fabricator,codexes], start() registers TRIAL_WRIT_TYPE_CONFIG (mirrors mandate's state machine; childrenBehavior populated for v2 experiment-parent compatibility). types.ts declares LaboratoryTrialConfig (fixtures, scenario, probes, archive — provisional shapes refined as engine work lands). Removed orphan verification tests (dispatch-removal, loom-composition) that had been parked here for completed framework commissions. README rewritten end to end. Builds clean, typechecks pass."

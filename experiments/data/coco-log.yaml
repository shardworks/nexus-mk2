- session: 88f89549-681a-4adf-9989-d1d76a2fdd85
  date: 2026-05-01
  item: "Laboratory rig template + skeleton engines (c-moma9sg5 + c-moma9vrm). Sanctum pnpm.overrides expanded from 2 packages to 22 (every framework + plugin under /workspace/nexus) so sanctum-side typechecking goes against the live source rather than published 0.1.292. New apparatus structure: src/engines/orchestrate.ts (the load-bearing dynamic-graft engine — same pattern as spider.implement-loop; reads ext.laboratory.config, topo-sorts fixtures, emits the full per-trial chain via SpiderEngineRunResult.graft + graftTail), src/engines/stubs.ts (no-op placeholder engines for codex/guild setup+teardown, commission-post-xguild, wait-for-writ-terminal-xguild, probe-stacks-dump, probe-git-range, archive — each logs and yields {stub:true,...}), src/engines/index.ts (engine bag), src/template.ts (post-and-collect-default declaration: one head engine, lab.orchestrate; rigTemplateMappings.trial → post-and-collect-default). Apparatus index.ts wires engines + rigTemplates + rigTemplateMappings into supportKit and bumps requires to [stacks, clerk, spider, fabricator]. types.ts gains explicit teardownEngineId override on TrialFixtureDecl (default convention is engineId with -setup → -teardown swap; explicit override available when convention doesn't fit). 21 unit tests on buildGraft cover topo-sort (chains, diamonds, cycles, unknown deps, duplicates), upstream wiring across the chain (head → setups → scenario → probes → archive → reverse teardowns), tail identification (graftTail aligns with last engine for spider's rig-completion gate), teardown-id derivation (convention + override + fallback), empty-fixtures + empty-probes variants, given pass-through to setup AND teardown. Skeleton complete — a posted trial would crawl cleanly through the rig before any engine does real work; the wiring is validated before time gets sunk into real implementations."

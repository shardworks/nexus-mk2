  item: "Cost investigation continuation, part 3 — extended the file-characteristics analysis. Total imports across touched files (Pearson +0.875) edges out file count (+0.802) as best raw cost predictor; total cross-package imports (+0.855) is the strongest coupling-specific signal. After residualizing cost on file count, avg_funcs (functions per file, Spearman +0.405 residual) is the top within-cohort predictor — file size weakly matters too (+0.359 residual) but is masked by file-count dominance in raw correlations. File-size sweet spot likely 200-1200 LOC; 'make files smaller' is NOT a cost lever (would be neutral-to-bad — one touch becomes two). Counter to clean-code heuristics in this regime. Found cliff-gate candidates beyond n_files: total_cross_pkg ≥ 50 catches 36% of cost in 10% of sessions (sharpest cliff), total_imports ≥ 80 catches 50% of cost in 13% of sessions (biggest fraction), total_exports ≥ 65 and total_types ≥ 80 each catch ~25%. Per-file p95 distribution (n=171 unique touched files): loc 1519, imports 15, cross_pkg 8, cross_pkg_symbols 13, funcs 12, exports 12, types 12, branches 60. Surfaced concrete file-level pathologies — spider/src/spider.test.ts at 10,691 LOC (size of entire framework on Apr 3), spider-ui.test.ts with 71 funcs, spider.ts at 3,258 LOC. 7/10 most cross-pkg-coupled files are tests. Created clicks: c-moe1b73b (non-LLM blast-radius pre-check / early-pipeline gate), c-moe1bd71 (self-decomposing planner), c-moe1bk6h (beyond file count complexity metrics), c-moe1bsup (file-size-doesn't-matter finding), c-moe1fr4a (file-size sweet spot question), c-moe1il6j (cross-package imports as coupling cost driver), c-moe1ip7u (function-density per file finding), c-moe1tb5k (three-tier gate metric evolution v0/v1/v2), c-moe1tgmo (multi-metric cliff catalog), c-moe1ym8p (file-level simplification targets — split spider.test.ts), c-moe1zydb (commit-time complexity ratchet at review/seal stage), c-moe284uo (blog post derivation). Updated experiments/X011-context-debt/artifacts/2026-04-25-cost-density-and-cliffs.md with three new sections: cliffs across other metrics, per-file distribution and ratchet thresholds, and an expanded interventions section now including the metric tier evolution, commit ratchet design, file-level simplification targets, and cross-package coupling audit. Total intervention picture now has 6 dispatchable/analyzable candidates (predicted-files gate, commit ratchet, animator simplification, spider decomposition, cross-pkg audit, file-level splits) plus 3 design-stage candidates (self-decomposing planner, non-LLM gate, file-size sweet spot)."

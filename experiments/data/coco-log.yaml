    item: "Reckoner-scope reframing. Picked up the vision-keeper subtree, probed earlier subsumption call (Reckoner absorbs vision-keeper/overseer/monitoring). Sean's sharpening: Reckoner is specifically a petition scheduler — accepts petitions from registered petitioners (vision-keepers, tech-debt watchers, laboratory/introspection, Sentinel-shaped monitors), weighs against guild priorities and resource constraints (concurrency, token budget, purse), determines which petitions get dispatched as writs. Three functions pull apart cleanly: custody-of-vision-artifacts (vision-keeper, one per product, petitioner class), authoring-the-decomposition-ladder (patron +/- sage assistance, separate design question), scheduling-against-ladder (Reckoner, narrow). Patron-facing monitoring signals go through Lattice as pulses; guild-facing work proposals go through Reckoner as petitions — two signal destinations, cleanly separated. Click tree reorg: created c-mod99ris (Reckoner umbrella under Stage 3 c-moa42fn6); reparented vision-keeper umbrella c-moa42rxh and priority-storage click c-mod53qxl underneath; concluded earlier narrower 'internal commission flow (Petition)' click c-mo1mqgqv as superseded with supersedes link; opened 7 new child clicks for open design surfaces — petition shape (c-mod9a2gh), patron fast-path (c-mod9a48y), scheduling trigger (c-mod9a54n), decline feedback loop (c-mod9a6x3), petitioner registration extension point (c-mod9a8fx), multi-product priority allocation (c-mod9a9un), petition dedup/conflict (c-mod9ab0i). Updated guild-vocabulary.md: rewrote Reckoner entry narrowing to petition scheduler, added new Vision-keeper apparatus entry as custody + petitioner process, added Petitioner role-contract entry, revised Vigil/Sentinel entries (Vigil distributed across guild rather than Reckoner-owned; Sentinels can emit either Lattice pulses or Reckoner petitions), updated bookmark list at top. Updated vocabulary-aliases.yaml: removed premature 'Reckoner subsumes
  item: "Triaged ~36hrs of red GitHub Actions on the nexus repo and fixed two layered latent build breaks. (1) Every CI + Publish run since 2026-04-24 22:36 UTC failed at the same TS2345 in `clockworks/src/writ-lifecycle-observer.ts:161` — `lifecycleSuffix(writ.phase)` passed `string` to a function declared `(phase: WritPhase)`. Root cause: commit b98151f (Artificer, 'clerk: add registerWritType + classification surface; widen WritDoc.phase') widened `WritDoc.phase` from `WritPhase` to `string` and updated lattice/clerk/writ-tree/writ-show consumers but missed clockworks. Sean directed direct fix of the gated variant; discovered via the `non-mandate writ types fire {type}.ready` test that gating at the writ-type level would break a documented contract, chose phase-level gating instead — widen `lifecycleSuffix(phase: string)`, return null for any non-canonical phase via a default branch. All 13 observer unit tests pass; nexus 8131bbf rebased onto a concurrent reckoner→sentinel rename push, pushed as 42b6369. (2) That fix unmasked a *second* latent break: animator/src/startup.ts imported `better-sqlite3` (added by Coco commit 91d7eda 'animator: drop orphan books_animator_status table on startup', Apr-25 ~01:11 UTC) but the dep was never declared in animator/package.json — bypassing pnpm's dependency graph and silently no-op'ing on every install since landing. Sean pushed back on adding the dep ('keep that to just stacks'). Did the analytical work: shim is one-shot migration (orphan table from pre-6cb832a installs), has never actually run on any install (verified — orphan still present on dev container with Apr-24 incident audit row untouched after ~24hrs of animator startups), and stacks deliberately doesn't expose drop-table. Recommended deletion over `node:sqlite` substitution or a new stacks primitive: the shim is past its useful life, install footprint is small enough for manual cleanup, and the new `dispatch-status` doc already carries newer state on every active
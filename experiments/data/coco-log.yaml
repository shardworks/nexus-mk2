    item: "Added briefs skill (.claude/skills/briefs/SKILL.md) and coco.md pointer. Triggered by the drift-into-spec failure from earlier in the session — Sean asked for an instruction update so the lesson survives. First draft of the instruction took a binary 'exclude tests and exit criteria entirely' stance; Sean pushed back on whether that was right, and the revised framing lands on intent-vs-how-to as the actual line (scenarios-to-verify and behavioral exit criteria are intent; test file paths and artifact-existence checks are how-to). Factored into a dedicated skill rather than inlining in coco.md so the content has room to breathe — covers role chain (brief → spec → code), content discipline (must-include, must-not-include, nuanced may-cases with the gut-check question), drafting workflow (.scratch/ + iteration + transcript capture), posting via bin/commission.sh (emphasizing the wrapper over bare nsg commission-post because the wrapper patches complexity into the commission log), and post-dispatch bookkeeping (conclude parent click, delete scratch, coco-log). coco.md gets a one-line pointer under Collaborating on Documents mirroring the clicks-skill reference. No clicks opened — Sean's directive was unambiguous, the skill captures the substance, and opening a click just to record 'did the thing' would be bookkeeping theater."

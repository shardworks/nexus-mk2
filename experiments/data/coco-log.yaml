    item: "Reckoner-visioning design session that pivoted twice. Started as 'what does the Reckoner's visioning capability look like?', turned into 'products are the 1:1 vision-bearing unit with M:N codex relationships, portfolio is the scheduling layer, the patron owns all visions with any client-proxy detail hidden from the guild', then turned again into 'we keep creating new record types because writs feel wrong — let's generalize writs instead of building yet another primitive'. Landed on Option 3: per-type configurable lifecycles with a standardized classification layer (initial/active/terminal) and attr tags (success/failure/blocking/neutral) underneath type-specific state names, strict transition enforcement mandatory, childrenBehavior config supporting allSuccess + anyFailure triggers with transition + copyResolution actions (no notify for v0), anyFailure short-circuits allSuccess, idempotent no-op on already-terminal parents. Deliberately deferred: parentTypes entirely (not optional-when-declared for MVP), dispatchability as a config field (stays emergent per consumer), folding clicks/Ratchet into writs (follow-on work). Mandate writs preserved bit-for-bit on disk; no migration needed. Tabled all vision-work decisions as 7 parked clicks under c-moa42rxh (c-mod53o6h through c-mod53rpa) plus parking the umbrella click itself — picks back up after the writ-generalization refactor lands. Decomposed the refactor into 7 tasks (T1 config schema → T2 Clerk refactor → T3 children-behavior → T4 Reckoner migration → T5 CLI/Oculus multitype → T6 integration test → T7 docs), drafted full brief bodies in-chat (no .scratch dance this time — a process change Sean called out mid-session), posted all 7 as draft-phase writs in one shell pass (w-mod644tf, w-mod6458g, w-mod645ns, w-mod6462y, w-mod646hu, w-mod646x7, w-mod647bz), wired 6 spider.follows links establishing dependency graph (T2 follows T1; T3, T4, T5, T6 follow T2; T6 also follows T3). All drafts left unpublished for Sean's Oculus review; complexity ratings proposed (3, 8, 5, 3, 3, 3, 3) but not patched into log pending his sign-off. Process updates shipped alongside: extended bin/commission.sh with --draft flag (additive, default behavior unchanged), rewrote the briefs skill to make direct-to-system drafting the default (kills the 'write scratch file, get Sean to review, then post' dance — now posts as draft-phase writ directly, review in Oculus, publish when ready), added multi-commission-batch guidance covering spider.follows wiring, noted the --label+--kind link requirement after hitting the missing-label error mid-session. Parent design click c-mo1mqp0q stays live until the drafts are published (will be concluded with writ ids at that point per the post-dispatch bookkeeping). Parked umbrella click c-moa42rxh."

    item: "Coco behavioral correction on click handling. Sean observed clicks felt like micromanagement — running commentary on click ops, permission-requests for every create/conclude, click IDs sprinkled through prose, meta-discussions about click mechanics in the middle of substantive work, and sprawling multi-paragraph conclusions. Diagnosis: treating clicks as legible moves worth announcing, rather than silent bookkeeping. Confirmed by reviewing session 036f6916 transcript — five distinct patterns compounding. Reframed with Sean: tree volume is cheap (capture liberally); the real context cost is verbose conclusions (which I was writing like publishable essays with headers and Recommendation: sections). Folded five rules into durable instructions: four chat-behavior rules went into .claude/agents/coco.md (new 'Keep click operations low-profile' subsection — don't ask permission, don't narrate, keep IDs out of prose, don't meta-discuss mechanics in working conversations); conclusion-discipline rule went into .claude/skills/clicks/SKILL.md (new 'Conclusions are tight' subsection under the conclude command — decision + one-line reasoning + optional one-clause on rejected alternatives, no markdown structure, exploration stays in chat). Also removed the SKILL.md line that told Coco to record returned IDs in the chat transcript — directly contradicts the new IDs-out-of-prose rule."

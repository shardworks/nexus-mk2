    item: "Design conversation on c-mo1mqcam (concurrency-control substrate). Pushed back on the framing as 'next big piece in autonomy' — investigated the substrate and discovered Spider already supports maxConcurrentEngines (default 3) and maxConcurrentEnginesPerRig (default 1), with deferral logic enforced in both engine-selection and rig-spawn. Setting maxConcurrentEngines: 1 in guild.json gives full autonomous-but-serial operation as a config flip, deferring the whole concurrency-substrate design. Reframed c-mo1mqcam from 'unlock click' to 'scale-up click' — needed only when moving beyond the serial MVP. Sean endorsed the no-concurrency MVP direction. Built click structure under c-mo1mq8ry: created umbrella c-mo28k3ar (deliver autonomous-but-serial hopper operation as MVP milestone); reparented c-mo1mqdk0 (load-bearing blocked_by links) and c-mo1mqd8n (intake tier model) under it; created three new children c-mo28k7ri (stuck-rig detection/reaper), c-mo28k8ir (failure/retry policy + starvation fairness), c-mo28k942 (queue observability). Added depends-on links: umbrella → c-mo1z3teo (human-intervention notifications as prerequisite); c-mo1mqcam → umbrella (substrate depends on MVP landing first). No code changes; design structure only."

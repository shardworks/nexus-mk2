# Commission Log — Standing Research Instrument
#
# One entry per patron-sourced commission. Entries are stubbed automatically
# (or by Coco at session start) and filled in progressively:
#
#   At dispatch (patron fills):    complexity, spec_quality_pre, spec_note
#   At outcome review:             outcome (via assess-writ), revision_required
#                                  (via writ link), spec_quality_post, failure_mode, notes
#   Quality scorer (post-seal):    code_quality_agent, code_quality_variance, code_quality_n
#   Anima-populated (if active):   spec_quality_anima, complexity_anima
#   Ethnographer:                  reviewed_by_ethnographer
#
# Complexity scale (Fibonacci): 1 2 3 5 8 13 21
# Spec quality: strong | adequate | weak
# Code quality (agent): 1.0–3.0 composite (4 dimensions × 3-point scale, multi-run average)
# Outcome: success | partial | wrong | abandoned
# Failure mode: spec_ambiguous | requirement_wrong | execution_error | complexity_overrun
#
# IDs are session IDs from the Animator (ses-*), linking commissions to
# session records for cost tracking and analysis. Commissions that were
# never dispatched have no session ID.
#
# Artifacts (prompts, spec snapshots) are stashed at:
#   experiments/X013-commission-outcomes/artifacts/commissions/<id>/


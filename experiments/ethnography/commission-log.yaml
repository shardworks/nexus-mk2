# Commission Log — Standing Research Instrument
#
# One entry per patron-sourced commission. Lean summary data only.
# Narrative, scores, and session records live in per-commission artifacts:
#   experiments/data/commissions/<id>/
#     review.md            — spec assessment, patron review, scorer notes
#     session.json         — session record from the Animator (cost, tokens, timing)
#     quality-blind.yaml   — quality scorer output (blind mode)
#     quality-aware.yaml   — quality scorer output (aware mode)
#     prompt.md            — dispatch prompt
#     spec.md              — spec snapshot at dispatch time
#
# This log records only the fields that don't exist naturally in another
# artifact — the patron's subjective assessments and outcome judgments.
#
# Scales:
#   Complexity (Fibonacci): 1 2 3 5 8 13 21
#   Spec quality: strong | adequate | weak
#   Outcome: success | partial | wrong | abandoned
#   Failure mode: spec_ambiguous | requirement_wrong | execution_error | complexity_overrun


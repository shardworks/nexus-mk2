slug: x025-a6p-v3-combined
title: X025 — A6' Oculus click tree view v3 combined (both example blocks prepended to Sonnet-era artificer.md)
codex: nexus

description: |
  X025 baseline trial on workload A6' (rig-mo1wajm9, Oculus click tree
  view). Ships the Sonnet-era artificer.md baseline as the implementer's
  role file. Brief is the verbatim writ body extracted from the
  production books.

  Codex pinned to 842744085a5a5202ee9f0b087ec451a6fe2360a9 — the
  implementer-eye-view at the start of the original rig.

  Clean sealed-state baseline (no allow-list needed). Per-trial cost
  expectation: $1.50-2 Sonnet.

frameworkVersion: '0.1.304'

fixtures:
  - id: codex
    engineId: lab.codex-setup
    givens:
      upstreamRepo: /workspace/nexus
      baseSha: 842744085a5a5202ee9f0b087ec451a6fe2360a9

  - id: codex-checkout
    engineId: lab.codex-checkout
    dependsOn: [codex]
    givens:
      bareLocalPath: '${yields.fixture-codex-setup.bareLocalPath}'
      baseSha: 842744085a5a5202ee9f0b087ec451a6fe2360a9
      codexName: '${yields.fixture-codex-setup.codexName}'

scenario:
  engineId: spider.graft-rig-template
  givens:
    template: laboratory.claude-direct-monolithic
    givens:
      rolePath: /workspace/nexus-mk2/experiments/X025-implementer-few-shot/fixtures/roles/artificer-v3-combined.md
      briefPath: /workspace/nexus-mk2/experiments/X025-implementer-few-shot/briefs/A6p-oculus-click-tree-view.md
      model: sonnet
      executionWrap: production
      cwd: '${yields.fixture-codex-checkout-setup.workdir}'
      verifyCommand: |
        set -e
        pnpm -w typecheck
        pnpm -w build
        pnpm -w test

        # Discrimination: confirm meaningful work in ratchet plugin
        INSERTIONS=$(git diff --shortstat 842744085a5a5202ee9f0b087ec451a6fe2360a9..HEAD -- packages/plugins/ratchet | grep -oP '\d+(?= insertion)' || echo 0)
        FILES=$(git diff --name-only 842744085a5a5202ee9f0b087ec451a6fe2360a9..HEAD -- packages/plugins/ratchet | wc -l)
        test "$INSERTIONS" -ge 800 || { echo "Discrimination FAIL: $INSERTIONS insertions (need ≥800)"; exit 1; }
        test "$FILES" -ge 4 || { echo "Discrimination FAIL: $FILES files (need ≥4)"; exit 1; }

        git push origin HEAD:main
      verifyTimeoutMs: 900000

probes:
  - id: context
    engineId: lab.probe-trial-context
    givens: {}
  - id: commits
    engineId: lab.probe-git-range
    givens: {}
  - id: sessions
    engineId: lab.probe-trial-sessions
    givens: {}

archive:
  engineId: lab.archive
  givens: {}

slug: x025-a7p-v3-combined
title: X025 — A7' d4-tools v2 manual character entry v3 combined (both example blocks prepended to Sonnet-era artificer.md)
codex: d4-tools

description: |
  X025 baseline trial on workload A7' (rig-movzo2vk, d4-tools v2 Manual
  character and build entry). Non-nexus codex — tests whether the
  few-shot effect generalizes beyond the apparatus framework codebase.

  Codex pinned to 3456aa8cdace7828121aa57f828175c3d0c6d1a4 — the
  implementer-eye-view at the start of the original rig.

  Clean sealed-state baseline (no allow-list needed). Per-trial cost
  expectation: $1.50-2 Sonnet. Verify is fast (~16s at sealed) because
  d4-tools is a single-package Next.js repo.

frameworkVersion: '0.1.304'

fixtures:
  - id: codex
    engineId: lab.codex-setup
    givens:
      upstreamRepo: /workspace/d4-tools
      baseSha: 3456aa8cdace7828121aa57f828175c3d0c6d1a4

  - id: codex-checkout
    engineId: lab.codex-checkout
    dependsOn: [codex]
    givens:
      bareLocalPath: '${yields.fixture-codex-setup.bareLocalPath}'
      baseSha: 3456aa8cdace7828121aa57f828175c3d0c6d1a4
      codexName: '${yields.fixture-codex-setup.codexName}'

scenario:
  engineId: spider.graft-rig-template
  givens:
    template: laboratory.claude-direct-monolithic
    givens:
      rolePath: /workspace/nexus-mk2/experiments/X025-implementer-few-shot/fixtures/roles/artificer-v3-combined.md
      briefPath: /workspace/nexus-mk2/experiments/X025-implementer-few-shot/briefs/A7p-d4-tools-v2-manual-character.md
      model: sonnet
      executionWrap: production
      cwd: '${yields.fixture-codex-checkout-setup.workdir}'
      verifyCommand: |
        set -e
        # Note: at baseSha, only `dev/build/start/lint` scripts exist and
        # eslint isn't installed (variant adds it). `typecheck` and `test`
        # scripts are added BY the v2 work itself. We use only `pnpm build`
        # (next build, which includes typecheck) as the build gate.
        # Lint is omitted: it produces noisy variant-quality signals
        # unrelated to the few-shot mechanism we're measuring.
        pnpm build

        # Discrimination: confirm meaningful work in expected paths
        INSERTIONS=$(git diff --shortstat 3456aa8cdace7828121aa57f828175c3d0c6d1a4..HEAD -- lib/ components/ app/ | grep -oP '\d+(?= insertion)' || echo 0)
        FILES=$(git diff --name-only 3456aa8cdace7828121aa57f828175c3d0c6d1a4..HEAD -- lib/ components/ app/ | wc -l)
        test "$INSERTIONS" -ge 4000 || { echo "Discrimination FAIL: $INSERTIONS insertions (need ≥4000)"; exit 1; }
        test "$FILES" -ge 25 || { echo "Discrimination FAIL: $FILES files (need ≥25)"; exit 1; }

        git push origin HEAD:main
      verifyTimeoutMs: 300000

probes:
  - id: context
    engineId: lab.probe-trial-context
    givens: {}
  - id: commits
    engineId: lab.probe-git-range
    givens: {}
  - id: sessions
    engineId: lab.probe-trial-sessions
    givens: {}

archive:
  engineId: lab.archive
  givens: {}

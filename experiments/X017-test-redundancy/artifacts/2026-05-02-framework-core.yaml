notes: |
  First real trim on a small package — proof of workflow.

  Survival rate observation (Q2 data point): of 29 flagged candidates,
  6 deleted (21%) and 23 kept (79%). Notably *below* H2's predicted
  ≥50% deletion rate. The kept set clusters into three patterns:
    - Parameter sweep over a regex alternation or scope branch (e.g.
      derivePluginId's three suffix-strip tests). Each alternation is
      a distinct branch even though line coverage doesn't distinguish.
    - Edge case (empty input, NaN input, zero input). Coverage flags
      these as redundant w/ happy paths because the same lines execute,
      but they assert distinct invalid-input contracts.
    - Representative identity case (e.g. shortId on a single-token
      input). One per behavioral category.

  H2 calibration note: at least on this small package, the analyzer's
  pure-redundant count substantially overestimates deletable tests.
  The 74% → 21% gap is the "false-positive redundancy" rate Q3 asks
  about. If this pattern holds across packages, it shifts the H2
  framing — agents do over-test, but most of the over-testing is
  parameter sweeps that humans value.

  The 6 deletions were genuine duplicates: assertions identical to
  another test's assertion modulo input string (`includes prefix
  verbatim` vs the regex test) or one-step-removed test of an
  already-tested helper (`resolves ... with -X suffix` vs derivePluginId
  suffix tests).


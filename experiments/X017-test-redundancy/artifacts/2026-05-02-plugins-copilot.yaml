notes: |
  Fifth X017 data point. First trim of a non-trivial single-file
  package (897 test lines, 35 tests, all in src/index.test.ts).

  Rolling calibration:
    - framework/core:                  29 flagged,  6 deleted (21.0%)
    - plugins/fabricator:              13 flagged,  1 deleted ( 7.7%)
    - plugins/lattice-discord:          8 flagged,  1 deleted (12.5%)
    - plugins/clockworks-stacks-signals: 12 flagged, 0 deleted (0.0%)
    - plugins/copilot:                 27 flagged,  5 deleted (18.5%)

  Calibration trend stabilizes around the framework/core 21%
  baseline. Flag rate 77.1% → deletion rate 18.5%. The "≥50% deletable"
  H2 prediction continues to be sharply refuted; the analyzer's
  pure-redundant set is a coverage-safety filter, not a deletion
  recommendation.

  ## Why 5 cuts on copilot

  Heavy parameter-sweep structure: tests organized as N variants of
  each scenario (single-turn, tool-call loop, streaming, config
  defaults). Most variants verify behaviorally distinct contracts
  (different request body shapes, different chunk types, different
  error code paths, different config-plumbing fields), but a few
  pairs sit on the same code path with strict-subset assertions:

    1. token-missing default vs. token-missing custom — both verify
       "no token rejects with env var name in error"; the custom
       variant's "config plumbing" property is verified elsewhere
       (`uses custom config values`).
    2. providerSessionId-from-last-call (subsumed) vs. happy-path
       tool-call (subsumed but heavily used) — both verify
       last-id-wins on the 2-call path.
    3. apiEndpoint-config (subsumed) vs. custom-config-values
       (subsumed) — both verify URL plumbing; the custom-config
       version pins URL+auth.
    4. start()-doesn't-throw-with-config (subsumed) vs.
       custom-config-values — both exercise start() with config; the
       custom-config-values version pins URL+auth from launch().
    5. token-accumulator-4-rounds (subsumed) vs. happy-path
       tool-call (subsumed) — both verify the accumulator works in
       the loop; happy path uses VARYING per-call values, which is
       the stronger accumulator discriminator.

  ## Patterns kept

  21 keepers fall into the runbook's expected categories:
    - Distinct-branch parameter sweeps (4× parseSseLines, 4×
      extractOutput, 3× tool-handler dispatch branches).
    - Edge cases (empty-input convertTools, empty messages on
      absent prompts, incomplete-line buffering in SSE, conversationId/
      cwd/environment ignored).
    - Negative-space contracts (no chunks on non-streaming, error
      messages back to model on tool errors).
    - Distinct error paths (HTTP error vs. network failure vs.
      streaming error).
    - Canonical happy-path representatives (single-turn, 2-round
      tool-call, streaming text, streaming tool-use).

  ## Aggregate gate behavior

  Pre-cut:  113865/167540 lines, 9293/11608 branches, 2830/5332 functions
  Post-cut: 113865/167540 lines, 9285/11601 branches, 2830/5332 functions

  Lines: identical (cuts had no unique line coverage by definition).
  Branches: numerator and denominator both dropped 8 and 7 — small
  net shift inside the 80.06 → 80.04 range, well above the 80 floor.
  Functions: identical numerator and denominator (the cuts removed
  it() callbacks but they were not counted as "covered functions"
  because... actually the function counter is identical, so the test
  callbacks must already be off the production-source surface; their
  removal doesn't move the counter).

  The function-coverage no-op stands in contrast to the
  clockworks-stacks-signals data point where cutting one strict-subset
  test dropped 5 transitively-covered functions in Stacks's patch()
  chain. The difference: copilot's cuts are all subsets of OTHER
  copilot tests in the same file, so the transitive function coverage
  is preserved by the kept tests. clockworks-stacks-signals's cut was
  a subset on the bridge but the lone attestation for transitive
  functions in a different package's call chain.

  Calibration data point for X017:
    - flag rate: 77.1%, deletion rate: 18.5%, false-positive rate: 81.5%.
    - Per-package coverage unchanged on all three dimensions.
    - Aggregate function coverage held at 53.08% (no transitive
      function-coverage drops, unlike clockworks-stacks-signals).


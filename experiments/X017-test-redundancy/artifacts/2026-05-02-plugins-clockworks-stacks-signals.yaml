  ## Why so few cuts on clockworks-stacks-signals

  Single test file, 13 tests, all running through the same heavyweight
  buildFixture() (full Stacks + Clockworks + bridge apparatus startup
  with synthetic plugin kits). The fixture path covers ~268 source
  lines; almost any test that finishes startup hits the same lines.
  All 9 members of the equivalence-class group share that signature.

  But the tests themselves verify behaviorally distinct outputs:

    - 5 distinct CDC event-name branches: created / updated /
      deleted / book-dropped / event_dispatches.
    - 2 negative-space contracts: empty-delete produces nothing,
      direct emit doesn't echo.
    - 3 edge cases on inputs: drop-without-writes, null kit value,
      non-object kit value.
    - 1 carve-out invariant: events is excluded, event_dispatches is
      not.
    - 1 baseline: empty-contribs startup path.

  Per the runbook's "patterns usually kept" table, all of these are
  keepers — distinct branches, edge cases, negative-space contracts.
  Only the patch() update test was a strict subset of another (the
  put-over-existing update test asserts strictly more on the same
  code path, in the bridge's view).

  ## New X017 finding: line-redundant ≠ function-redundant

  Cutting the patch() update test dropped aggregate function coverage
  from 53.08% → 52.99% (floor: 53%). The greedy reducer is line-only
  — it doesn't know the patch test was the load-bearing attestation
  for 5 transitively-covered functions in the Stacks patch() chain.

  Mechanism: per-test coverage is run in isolation, so each test's
  per-test lcov shows the call chain it traversed. The greedy reducer
  builds equivalence classes on line-set signatures only; a test
  whose lines are all covered by other tests is flagged redundant
  even if its functions are uniquely covered (because the function
  signature isn't part of the redundancy hash).

  This isn't a per-package issue (the per-package coverage delta was
  modest: 57.95 → 57.34 line, 35.91 → 34.11 func). It's an aggregate
  gate issue: the merged lcov across all 24 packages had 5 functions
  whose ONLY coverage came from this bridge test's transitive call
  through Stacks's patch() implementation, even though Stacks has its
  own tests. (Stacks's own tests presumably exercise patch() through
  a different lcov merge pattern that doesn't credit the same 5
  helper functions, or those helpers are dead code that only the
  patch path lights up.)

  Operational rule for future trim sessions: before cutting, eyeball
  the per-package function-coverage delta. If a candidate cut drops
  package-level function coverage by a non-trivial amount AND the
  aggregate floor margin is thin (<1pp), expect the gate to fail.
  Restore the test and mark `skipped` with the reason — don't sacrifice
  other branches/edge-cases looking for "something else to cut" to
  recoup the margin; that path destroys behaviorally-distinct tests
  to compensate for an analyzer blind spot.

  ## Aggregate gate behavior on the failed cut

  Pre-cut:  113865/167540 lines, 9293/11608 branches, 2830/5332 functions
  Post-cut: 113814/167540 lines, 9301/11611 branches, 2825/5331 functions
  Restored: 113857/167540 lines, 9286/11604 branches, 2830/5332 functions

  The branch denominator and function denominator both moved when the
  test was cut and restored — measurement noise from the test file
  itself contributing to the coverage surface (the it() callback
  function, branches inside its body). The signal is the function
  numerator drop: 5 functions lost their last attestation, dropping
  to 52.99% < 53% floor.

  ## Calibration summary

  - flag rate: 92.3%, deletion rate: 0.0%, false-positive rate: 100%.
  - The high-flag/low-deletion pattern continues; this package is the
    extreme case so far. The pattern is driven by heavyweight fixtures
    that flatten line coverage across most tests in a suite.
  - The new finding (function-coverage blast from a line-redundant
    cut) suggests the analyzer should also report function-redundancy
    as a separate dimension. Out of scope for this trim session;
    captured as an X017 spec H2 sub-finding.


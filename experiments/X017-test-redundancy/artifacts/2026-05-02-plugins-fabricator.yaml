trim_duration_min: 20
notes: |
  Second X017 data point. Calibration extends framework/core's pattern
  with an even more conservative outcome:

    - framework/core: 29 flagged, 6 deleted (21% deletion rate)
    - plugins/fabricator: 13 flagged, 1 deleted (7.7% deletion rate)

  The fabricator's analyzer flag rate (81%) is in line with framework/core
  (74%) — both well above H2's predicted "≥50% of agent-written tests
  are deletable" — but the post-review deletion rate is far below. This
  is the H2 false-positive story: pure-redundant ≠ deletable.

  Why so few deletions on fabricator:
    - The package's surface is small (16 tests around two API methods).
    - Most "redundant" tests pin distinct external contracts that the
      analyzer can't see: three optionality points (kit no engines /
      apparatus no supportKit / supportKit no engines), two isEngineDesign
      guard branches (missing id / missing run), the mixed-input edge case,
      the multi-plugin pluginId attribution, the empty-state listings.
    - The single genuine deletion (kit + apparatus together) was a pure
      integration test where both halves were already individually covered
      and the merging logic lives upstream of fabricator anyway.

  The aggregate gate held (67.98%/80.02%/53.05%, all above floor). Per-
  package branch coverage actually nudged up (91.43% → 91.67%) — the
  deleted test contributed to a branch denominator that no longer exists.

  Calibration data point for X017:
    - flag rate: 81.3%, deletion rate: 7.7%, false-positive rate: 92.3%
    - extends framework/core (74.4% flag, 21% delete, 79% false-positive)
    - direction is consistent across two packages: agents over-test, but
      the analyzer overstates it by an order of magnitude.


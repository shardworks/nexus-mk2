deletions:
  - file: src/channel.test.ts
    test: "Discord channel send() > returns ok:false on a 5xx response"
    reason: parameter_sweep_over_helper
    note: |
      The 5xx test is strictly a worse version of the 4xx test on the
      same code path. The implementation has a single branch
      (`if (!response.ok)`) that handles all non-2xx responses
      identically. Both tests exercise that branch:

        - 4xx test (kept): asserts ok=false, status code (/404/) AND
          body text (/not found/) appear in error.
        - 5xx test (cut):  asserts ok=false, status code (/503/) only.

      The 5xx test adds nothing the 4xx doesn't — same code path,
      weaker assertions. The body-in-error contract is unique to the
      4xx test and worth preserving.

      Note on analyzer flagging: the analyzer initially flagged the
      *4xx* test as pure-redundant (and put 5xx in the low-uniqueness
      required list with 9 unique lines). This is greedy-reducer
      ordering — it doesn't compare assertion strength, only line
      coverage. Within an equivalence class (same code path), the
      correct cut is the weaker test, regardless of which one the
      analyzer named. After cutting 5xx, the 4xx test moved into the
      required set as expected.


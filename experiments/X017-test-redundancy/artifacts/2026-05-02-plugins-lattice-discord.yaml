notes: |
  Third X017 data point. Calibration extends the conservative pattern:

    - framework/core:         29 flagged,  6 deleted (21.0% deletion rate)
    - plugins/fabricator:     13 flagged,  1 deleted ( 7.7% deletion rate)
    - plugins/lattice-discord: 8 flagged,  1 deleted (12.5% deletion rate)

  The flag rates remain high (74/81/40%) and deletion rates remain low
  (21/7.7/12.5%) — H2's "≥50% deletable" prediction continues to be
  refuted at the assertion-strength level. Pure-redundant is a
  coverage-safety filter, not a deletion recommendation.

  ## New calibration finding: greedy-reducer ordering can mislead

  This package surfaced a refinement to the trim heuristic. The
  analyzer flagged the 4xx error-response test as pure-redundant and
  marked the 5xx test as "required" (with 9 unique lines). On
  inspection, both tests exercise the same `if (!response.ok)` branch
  — they are a parameter sweep over the same code path. The 4xx test
  was the *stronger* assertion (status + body in error); the 5xx test
  was *weaker* (status only).

  The greedy reducer's required-vs-redundant labeling is arbitrary
  within an equivalence class — it minimizes line coverage, not
  assertion value. The correct cut was the weaker test, regardless of
  which label the analyzer applied.

  Operational rule for future trim sessions: when a pure-redundant
  candidate looks like a parameter sweep over a single branch, also
  inspect the corresponding *required* test in the low-uniqueness
  list. If the required test is strictly weaker than the redundant
  one, cut the required test instead.

  ## Why so few cuts on lattice-discord

  20 tests around 4 exported functions. Each test pins a distinct
  observable contract:

    - Three negative-space tests (no engine fields when engineFailure
      absent, omits url when linkUrl null, returns ok=false when env
      var unset and doesn't call fetch).
    - Three trigger-specific branches in contextFields (stuck, failed,
      drained, plus the unknown fallback) — each branch has different
      output fields.
    - Two tests of the !response.ok branch — one is a parameter sweep
      (cut), one pins additional contracts (kept).
    - The remaining tests pin distinct contracts (request shape, color
      uniqueness, env var default, etc.).

  ## Aggregate gate behavior

  Branch coverage actually nudged UP (80.03 → 80.06) — the deleted test
  contributed to a branch denominator that no longer exists, the same
  pattern observed on fabricator. Line and function coverage unchanged
  to two decimal places. Per-package coverage unchanged (per-package
  test only counts lines, and the cut test was 100% redundant on the
  channel.ts code paths).

  Calibration data point for X017:
    - flag rate: 40.0%, deletion rate: 12.5%, false-positive rate: 87.5%
    - flag rate is significantly lower than core/fabricator (74%/81%) —
      smaller, better-curated suite shows less analyzer noise.
    - deletion rate is small but non-zero, validating that even
      well-curated suites can carry redundant parameter sweeps.


slug: x024-rig-moj12h4o-turn-discipline
title: X024 — rig-moj12h4o (substantive, Reckoner periodic tick) turn-discipline variant
codex: nexus

description: |
  X024 turn-discipline variant on the substantive rig (rig-moj12h4o,
  Reckoner periodic tick / w-moiy8hkv).

  The variant role file prepends a "Tooling discipline" section between
  "Role" and "Testing", framed around minimizing turn count rather than
  enumerating five specific imperatives. Three illustrative examples
  show what turn-waste looks like (Bash bulk edits, repeat greps,
  re-testing unchanged packages); the framing is goal-stated, not
  rule-following.

  Motivation: X022's combined-nudges variant produced a marginal -13%
  cost reduction at n=3, but the per-mechanism story did not hold —
  three of five imperatives were going wrong direction or flat. The
  most likely explanation is that the "Tooling Discipline" framing
  itself produced a general "be deliberate" effect, not the specific
  rules. X024 tests whether stating the goal directly (minimize turns)
  with examples in support produces the same or better effect with a
  cleaner mechanism signature.

  Same codex pin, same fixtures, same brief, same framework version
  as X022's substantive baseline. The only deliberate variable is the
  artificer role file content passed through `rolePath`.

  Compare against X022's substantive baseline cell (n=3, mean $37.85)
  rather than running a fresh baseline.


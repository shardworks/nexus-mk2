slug: x026-a2-combined
title: X026 — A2 Reckoner apparatus skeleton — combined XML-tagged + goal-first variant
codex: nexus

description: |
  X026 combined variant trial on workload A2. Variant role file:
  fixtures/roles/artificer-combined.md.

  The variant rewrites the artificer role file with two coupled changes:

  1. **XML structural tags (B3).** Each section wrapped in semantic tags
     (`<task>`, `<testing>`, `<documentation>`, `<persona>`, `<finishing>`)
     replacing Markdown `##` headers. The doc-drift subsection is nested
     as `<adjacent-doc-drift-cleanup>` inside `<documentation>`.

  2. **Goal-first reordering (B4).** A new `<task>` section at the top
     summarizes the goal (land work as a clean commit). The original
     persona/role statement moves to a `<persona>` block near the end.
     The `<finishing>` directive ("commit before ending") stays at the
     very end for recency.

  Section content is otherwise verbatim from baseline — the only deliberate
  variables are XML wrapping and section order. The added `<task>` block is
  ~50 tokens of new content.

  Same codex pin, same brief, same framework version as the baseline manifest.
  The only difference is `rolePath`.

frameworkVersion: '0.1.304'

fixtures:
  - id: codex
    engineId: lab.codex-setup
    givens:
      upstreamRepo: /workspace/nexus
      baseSha: 89fb1ab35ecc6084283173611b9ccbce857b1da9

  - id: codex-checkout
    engineId: lab.codex-checkout
    dependsOn: [codex]
    givens:
      bareLocalPath: '${yields.fixture-codex-setup.bareLocalPath}'
      baseSha: 89fb1ab35ecc6084283173611b9ccbce857b1da9
      codexName: '${yields.fixture-codex-setup.codexName}'

scenario:
  engineId: spider.graft-rig-template
  givens:
    template: laboratory.claude-direct-monolithic
    givens:
      rolePath: /workspace/nexus-mk2/experiments/X026-implementer-xml-role-ordering/fixtures/roles/artificer-combined.md
      briefPath: /workspace/nexus-mk2/experiments/X026-implementer-xml-role-ordering/briefs/A2-reckoner-apparatus-skeleton.md
      model: sonnet
      executionWrap: production
      cwd: '${yields.fixture-codex-checkout-setup.workdir}'
      verifyCommand: |
        set +e
        pnpm -w typecheck > /tmp/x026-tc.log 2>&1
        pnpm -w build > /tmp/x026-build.log 2>&1
        pnpm -w test > /tmp/x026-test.log 2>&1
        set -e

        if grep -qE "error TS[0-9]+" /tmp/x026-tc.log /tmp/x026-build.log; then
          echo "Variant introduced typecheck/build errors:"
          grep -E "error TS[0-9]+" /tmp/x026-tc.log /tmp/x026-build.log | head -20
          exit 1
        fi

        UNEXPECTED=$(grep -E "test: ✖ " /tmp/x026-test.log \
          | grep -v "failing tests:" \
          | grep -v "orphan child blocks drain past parent cancellation" \
          | grep -v "Reckoner — multi-type guild" \
          | grep -v "src/engine-context.integration.test.ts")
        if [ -n "$UNEXPECTED" ]; then
          echo "Variant introduced new test failures beyond baseline:"
          echo "$UNEXPECTED"
          exit 1
        fi

        INSERTIONS=$(git diff --shortstat 89fb1ab35ecc6084283173611b9ccbce857b1da9..HEAD -- packages/plugins/reckoner | grep -oP '\d+(?= insertion)' || echo 0)
        FILES=$(git diff --name-only 89fb1ab35ecc6084283173611b9ccbce857b1da9..HEAD -- packages/plugins/reckoner | wc -l)
        test "$INSERTIONS" -ge 1000 || { echo "Discrimination FAIL: $INSERTIONS insertions (need ≥1000)"; exit 1; }
        test "$FILES" -ge 10 || { echo "Discrimination FAIL: $FILES files (need ≥10)"; exit 1; }

        git push origin HEAD:main
      verifyTimeoutMs: 900000


slug: x018-with-surface-map-yaml-cartograph
title: X018 variant 3 — cartograph commission, YAML surface map (full schema, restored prefixes)
codex: nexus

description: |
  X018 variant trial 3: same cartograph commission as variants 1+2,
  but with the surface map rendered as YAML (full original schema,
  no shrinkage) and `src/`/`.ts` path boilerplate restored. Lever A
  still — test-guild prompt override; just a different syntax.

  Variant 2 (tight format, levers 1+2+3) backfired -- the planner
  reverted to baseline-style ls/grep orientation and cost MORE than
  variant 1 ($8.24 vs $7.88). Hypothesis from the analysis: the tight
  format's stripped paths and kind codes broke the planner's
  confidence in the map; format/representation matters more than
  byte count.

  Variant 3 tests the inverse: same content as the original (re-exports
  included, full kind names, real file paths with src/.ts), but in
  YAML syntax instead of JSON. YAML's whitespace structure is more
  scannable than compact JSON's bracket-dense form. Hypothesis: YAML
  representation should at least match variant 1's mechanism win;
  possibly do better if YAML is genuinely more LLM-readable.

  Generated by `yq -P -o yaml` from the canonical surface-map JSON.
  Variant 3 surface map: 115 KB / ~28K tokens (vs variant 1 JSON 87 KB
  / ~22K tokens, +30% larger). Variant role file: 141 KB.

  Identical apparatus to variants 1+2: codex SHA aff280e, settings.
  model: opus, loom-workaround guild-level role overrides, same brief,
  same rig template. The only delta is the variant role file copied.

  Reference baseline: trial 5 (writ w-mooouo4t, ses-mooova47) —
  $9.04, 15.92 min, single attempt, clean.
  Variant 1 (JSON): $7.88 (-13%), -79% Bash, -76% Grep.
  Variant 2 (tight): $8.24 (-9%, +4.6% vs v1), Bash back to baseline.
  H1 sustain: >=25% reader-analyst cost reduction with no Tier 1/2
  quality regression.

  waitForRigTerminal=true with a 30-min cap.

frameworkVersion: '0.1.298'

fixtures:
  - id: codex
    engineId: lab.codex-setup
    givens:
      upstreamRepo: /workspace/nexus
      # Same SHA the baseline pinned (parent of cartograph commission's
      # sealed commit 607b572 — codex state the original planner saw).
      baseSha: aff280e75add02bd25e1af0e9467e8a81bfbcd41

  - id: test-guild
    engineId: lab.guild-setup
    dependsOn: [codex]
    givens:
      # Plugin set identical to calibration-baseline.yaml.
      plugins:
        - { name: '@shardworks/stacks-apparatus', version: '0.1.298' }
        - { name: '@shardworks/tools-apparatus', version: '0.1.298' }
        - { name: '@shardworks/codexes-apparatus', version: '0.1.298' }
        - { name: '@shardworks/clerk-apparatus', version: '0.1.298' }
        - { name: '@shardworks/ratchet-apparatus', version: '0.1.298' }
        - { name: '@shardworks/fabricator-apparatus', version: '0.1.298' }
        - { name: '@shardworks/animator-apparatus', version: '0.1.298' }
        - { name: '@shardworks/loom-apparatus', version: '0.1.298' }
        - { name: '@shardworks/claude-code-apparatus', version: '0.1.298' }
        - { name: '@shardworks/spider-apparatus', version: '0.1.298' }
        - { name: '@shardworks/clockworks-apparatus', version: '0.1.298' }
        - { name: '@shardworks/astrolabe-apparatus', version: '0.1.298' }
      config:
        # Model + role overrides identical to baseline. See
        # calibration-baseline.yaml for the rationale on each.
        settings:
          model: opus
        loom:
          roles:
            artificer:
              permissions:
                - 'clerk:*'
                - 'tools:*'
            patron:
              permissions: []
            astrolabe.sage-primer-attended:
              permissions:
                - 'astrolabe:read'
                - 'astrolabe:write'
                - 'clerk:read'
                - 'ratchet:read'
              strict: true
            astrolabe.sage-primer-solo:
              permissions:
                - 'astrolabe:read'
                - 'astrolabe:write'
                - 'clerk:read'
                - 'ratchet:read'
              strict: true
            astrolabe.sage-writer:
              permissions:
                - 'astrolabe:read'
                - 'astrolabe:write'
                - 'clerk:read'
                - 'ratchet:read'
              strict: true
        animator:
          sessionProvider: 'claude-code'
        astrolabe:
          patronRole: 'patron'
        spider:
          variables:
            role: 'artificer'
          # lab.plan-only template — identical to baseline.
          rigTemplates:
            lab.plan-only:
              engines:
                - id: plan-init
                  designId: astrolabe.plan-init
                  upstream: []
                  givens:
                    writ: '${writ}'
                - id: draft
                  designId: draft
                  upstream: [plan-init]
                  givens:
                    writ: '${writ}'
                - id: reader-analyst
                  designId: astrolabe.reader-analyst
                  upstream: [draft]
                  givens:
                    prompt: 'Plan ID: ${yields.plan-init.planId}'
                    cwd: '${yields.draft.path}'
                    writ: '${writ}'
                    metadata:
                      engineId: reader-analyst
                - id: inventory-check
                  designId: astrolabe.inventory-check
                  upstream: [reader-analyst]
                  givens:
                    planId: '${yields.plan-init.planId}'
                - id: patron-anima
                  designId: astrolabe.patron-anima
                  upstream: [inventory-check]
                  givens:
                    planId: '${yields.plan-init.planId}'
                    cwd: '${yields.draft.path}'
                    writ: '${writ}'
                - id: decision-review
                  designId: astrolabe.decision-review
                  upstream: [patron-anima]
                  givens:
                    planId: '${yields.plan-init.planId}'
                - id: spec-writer
                  designId: anima-session
                  upstream: [decision-review]
                  givens:
                    role: astrolabe.sage-writer
                    prompt: |
                      Plan ID: ${yields.plan-init.planId}

                      Decision summary:
                      ${yields.decision-review.decisionSummary}
                    cwd: '${yields.draft.path}'
                    writ: '${writ}'
                    metadata:
                      engineId: spec-writer
                - id: plan-finalize
                  designId: astrolabe.plan-finalize
                  upstream: [spec-writer]
                  givens:
                    planId: '${yields.plan-init.planId}'
                - id: observation-lift
                  designId: astrolabe.observation-lift
                  upstream: [plan-finalize]
                  givens:
                    planId: '${yields.plan-init.planId}'
              resolutionEngine: observation-lift
          rigTemplateMappings:
            mandate: lab.plan-only
      # X018 INTERVENTION: the sage-primer-attended role file is the
      # variant — it splices the surface-map orientation section into
      # the upstream prompt. sage-primer-solo and sage-writer remain
      # the upstream copies (variants table covers attended only).
      files:
        - sourcePath: /workspace/nexus-mk2/experiments/X018-package-surface-map-injection/variants/sage-primer-attended-with-surface-map-yaml-aff280e7.md
          guildPath: roles/astrolabe.sage-primer-attended.md
        - sourcePath: /workspace/nexus/packages/plugins/astrolabe/sage-primer-solo.md
          guildPath: roles/astrolabe.sage-primer-solo.md
        - sourcePath: /workspace/nexus/packages/plugins/astrolabe/sage-writer.md
          guildPath: roles/astrolabe.sage-writer.md

  - id: daemon
    engineId: lab.daemon-setup
    dependsOn: [test-guild]
    givens: {}

scenario:

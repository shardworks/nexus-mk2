slug: x018-with-surface-map-tight-cartograph
title: X018 variant 2 — cartograph commission, tight surface map (levers 1+2+3)
codex: nexus

description: |
  X018 variant trial 2: same cartograph commission as variant 1, but
  with a tighter surface-map representation (Lever A still — test-guild
  prompt override; just a smaller injection payload).

  Three byte-shrink levers stacked (per scripts/tighten-surface-map.ts):

  - Lever 1: drop re-export records (498 of 1310 records collapsed
    into a single `publicApi:` line per re-exporting file).
  - Lever 2: flat one-line-per-kind representation (no JSON brackets;
    `int: A, B, C` per kind per file).
  - Lever 3: strip predictable prefixes (`src/`, `.ts`, `@shardworks/`,
    `-apparatus`).

  Injected payload: 29.5 KB tight text vs 87 KB compact JSON in
  variant 1 (-66%). Variant role file: 55 KB vs 112 KB in variant 1
  (-51% of total role-file bytes).

  Identical apparatus to variant 1 (`with-surface-map.yaml`): codex
  SHA aff280e, settings.model: opus, loom-workaround guild-level role
  overrides, same brief, same rig template. The only delta is the
  variant role file copied via `files:`.

  Reference baseline: trial 5 (writ w-mooouo4t, ses-mooova47) —
  $9.04, 15.92 min, single attempt, clean.
  Variant 1 result: $7.88 (-13%), 13.95 min (-12%); -79% Bash, -76% Grep.
  H1 sustain: >=25% reader-analyst cost reduction with no Tier 1/2
  quality regression.

  Hypothesis: shrinking the surface-map payload by ~66% should shrink
  the cache-write tax (~$0.36 in variant 1 -> ~$0.12) and reduce
  per-turn cache-read overhead. Estimated cost effect: $7.88 -> ~$7.30
  (-19% from baseline). Mechanism (Bash/Grep cuts) should hold; tighter
  format may also relax the variant-1 Tier 1 scope-count flag (variant 1
  produced 3 scope items vs baseline 5 -- possibly a verbose-prompt
  artifact).

  waitForRigTerminal=true with a 30-min cap. Per variant 1: outer rig
  completes cleanly in ~23 min when no rate limits hit; abandon-and-
  reconstitute procedure available if rate limits cascade.

frameworkVersion: '0.1.298'

fixtures:
  - id: codex
    engineId: lab.codex-setup
    givens:
      upstreamRepo: /workspace/nexus
      # Same SHA the baseline pinned (parent of cartograph commission's
      # sealed commit 607b572 — codex state the original planner saw).
      baseSha: aff280e75add02bd25e1af0e9467e8a81bfbcd41

  - id: test-guild
    engineId: lab.guild-setup
    dependsOn: [codex]
    givens:
      # Plugin set identical to calibration-baseline.yaml.
      plugins:
        - { name: '@shardworks/stacks-apparatus', version: '0.1.298' }
        - { name: '@shardworks/tools-apparatus', version: '0.1.298' }
        - { name: '@shardworks/codexes-apparatus', version: '0.1.298' }
        - { name: '@shardworks/clerk-apparatus', version: '0.1.298' }
        - { name: '@shardworks/ratchet-apparatus', version: '0.1.298' }
        - { name: '@shardworks/fabricator-apparatus', version: '0.1.298' }
        - { name: '@shardworks/animator-apparatus', version: '0.1.298' }
        - { name: '@shardworks/loom-apparatus', version: '0.1.298' }
        - { name: '@shardworks/claude-code-apparatus', version: '0.1.298' }
        - { name: '@shardworks/spider-apparatus', version: '0.1.298' }
        - { name: '@shardworks/clockworks-apparatus', version: '0.1.298' }
        - { name: '@shardworks/astrolabe-apparatus', version: '0.1.298' }
      config:
        # Model + role overrides identical to baseline. See
        # calibration-baseline.yaml for the rationale on each.
        settings:
          model: opus
        loom:
          roles:
            artificer:
              permissions:
                - 'clerk:*'
                - 'tools:*'
            patron:
              permissions: []
            astrolabe.sage-primer-attended:
              permissions:
                - 'astrolabe:read'
                - 'astrolabe:write'
                - 'clerk:read'
                - 'ratchet:read'
              strict: true
            astrolabe.sage-primer-solo:
              permissions:
                - 'astrolabe:read'
                - 'astrolabe:write'
                - 'clerk:read'
                - 'ratchet:read'
              strict: true
            astrolabe.sage-writer:
              permissions:
                - 'astrolabe:read'
                - 'astrolabe:write'
                - 'clerk:read'
                - 'ratchet:read'
              strict: true
        animator:
          sessionProvider: 'claude-code'
        astrolabe:
          patronRole: 'patron'
        spider:
          variables:
            role: 'artificer'
          # lab.plan-only template — identical to baseline.
          rigTemplates:
            lab.plan-only:
              engines:
                - id: plan-init
                  designId: astrolabe.plan-init
                  upstream: []
                  givens:
                    writ: '${writ}'
                - id: draft
                  designId: draft
                  upstream: [plan-init]
                  givens:
                    writ: '${writ}'
                - id: reader-analyst
                  designId: astrolabe.reader-analyst
                  upstream: [draft]
                  givens:
                    prompt: 'Plan ID: ${yields.plan-init.planId}'
                    cwd: '${yields.draft.path}'
                    writ: '${writ}'
                    metadata:
                      engineId: reader-analyst
                - id: inventory-check
                  designId: astrolabe.inventory-check
                  upstream: [reader-analyst]
                  givens:
                    planId: '${yields.plan-init.planId}'
                - id: patron-anima
                  designId: astrolabe.patron-anima
                  upstream: [inventory-check]
                  givens:
                    planId: '${yields.plan-init.planId}'
                    cwd: '${yields.draft.path}'
                    writ: '${writ}'
                - id: decision-review
                  designId: astrolabe.decision-review
                  upstream: [patron-anima]
                  givens:
                    planId: '${yields.plan-init.planId}'
                - id: spec-writer
                  designId: anima-session
                  upstream: [decision-review]
                  givens:
                    role: astrolabe.sage-writer
                    prompt: |
                      Plan ID: ${yields.plan-init.planId}

                      Decision summary:
                      ${yields.decision-review.decisionSummary}
                    cwd: '${yields.draft.path}'
                    writ: '${writ}'
                    metadata:
                      engineId: spec-writer
                - id: plan-finalize
                  designId: astrolabe.plan-finalize
                  upstream: [spec-writer]
                  givens:
                    planId: '${yields.plan-init.planId}'
                - id: observation-lift
                  designId: astrolabe.observation-lift
                  upstream: [plan-finalize]
                  givens:
                    planId: '${yields.plan-init.planId}'
              resolutionEngine: observation-lift
          rigTemplateMappings:
            mandate: lab.plan-only
      # X018 INTERVENTION: the sage-primer-attended role file is the
      # variant — it splices the surface-map orientation section into
      # the upstream prompt. sage-primer-solo and sage-writer remain
      # the upstream copies (variants table covers attended only).
      files:
        - sourcePath: /workspace/nexus-mk2/experiments/X018-package-surface-map-injection/variants/sage-primer-attended-with-surface-map-tight-aff280e7.md
          guildPath: roles/astrolabe.sage-primer-attended.md
        - sourcePath: /workspace/nexus/packages/plugins/astrolabe/sage-primer-solo.md
          guildPath: roles/astrolabe.sage-primer-solo.md
        - sourcePath: /workspace/nexus/packages/plugins/astrolabe/sage-writer.md
          guildPath: roles/astrolabe.sage-writer.md

  - id: daemon
    engineId: lab.daemon-setup
    dependsOn: [test-guild]
    givens: {}

scenario:
  engineId: lab.commission-post-xguild
  givens:
    briefPath: /workspace/nexus-mk2/experiments/X018-package-surface-map-injection/briefs/cartograph-replay.md
    waitForRigTerminal: true
    timeoutMs: 1800000   # 30 min cap

probes:
  - id: context
    engineId: lab.probe-trial-context
    givens: {}
  - id: stacks
    engineId: lab.probe-stacks-dump
    givens: {}
  - id: commits
    engineId: lab.probe-git-range
    givens: {}

archive:
  engineId: lab.archive
  givens: {}

slug: x021-rig-moji64hs-baseline
title: X021 control baseline — vision-keeper deletion replay (verbatim plan, calibration)
codex: nexus

description: |
  X021 control calibration trial. Replays the vision-keeper
  deletion commission (production rig-moji64hs, plan
  w-moji63xm-9ebd9a8a302c, real-world full-rig cost $20.39) under
  lab.implement-only with the verbatim plan rendered as the brief.
  Mechanical doc-cleanup commission with near-zero cite-by-path
  patterns (zero "see X.ts:line for type" cites, zero "no changes
  expected" tags).

  Pairs with rig-moji64hs-v4-combined.yaml to test H3: variants
  applied to this rig should produce ~no cost effect, confirming
  the mechanism is "cite-by-path → inline" rather than "smaller
  spec is cheaper."

  The brief is the inventory + scope + decisions + observations +
  spec sections of the production plan concatenated with section
  headers preserved (briefs/rig-moji64hs-baseline.md). The
  implementer reads this directly; no astrolabe runs.

  The artificer role file is shipped from the X021 fixtures dir
  (snapshot of /workspace/vibers/roles/artificer.md taken at
  X021 activation). Same pattern as X020.

  Codex pinned to d6e34097 — the codex state the original
  implementer saw on 2026-04-29 when draft-moji64zc was created.

  Frameworked at 0.1.300-x019.0 (matching X020's pin so the lab
  apparatus stack is identical across active experiments).

  Build/test commands are workspace-wide because the commission's
  acceptance signal mandates `pnpm install && pnpm -r build && pnpm
  -r test` across the full monorepo (the commission deletes a
  package, so per-package filters won't catch the cross-package
  effects).

  waitForRigTerminal=true with a 60-min cap. ANTHROPIC_API_KEY
  flows via process.env to the daemon.

frameworkVersion: '0.1.300-x019.0'

fixtures:
  - id: codex
    engineId: lab.codex-setup
    givens:
      upstreamRepo: /workspace/nexus
      # Base SHA of draft-moj12hm9 — the codex state the original
      # implementer saw when starting work on the periodic-tick
      # commission (2026-04-28).
      baseSha: d6e34097f698df66d595f81f928320eafde8276f

  - id: test-guild
    engineId: lab.guild-setup
    dependsOn: [codex]
    givens:
      # Implement-only plugin set per
      # experiments/lab-operations/running-trials.md#standard-plugin-sets.
      # Mirrors X020's set (which Sean validated).
      plugins:
        - { name: '@shardworks/stacks-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/tools-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/codexes-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/clerk-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/ratchet-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/fabricator-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/animator-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/loom-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/claude-code-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/spider-apparatus', version: '0.1.300-x019.0' }
        - { name: '@shardworks/clockworks-apparatus', version: '0.1.300-x019.0' }
      config:
        settings:
          model: opus
        loom:
          roles:
            artificer:
              permissions:
                - 'clerk:*'
                - 'tools:*'
        animator:
          sessionProvider: 'claude-code'
        spider:
          variables:
            role: 'artificer'
            # rig-moj12h4o touches the reckoner apparatus
            # (core source + new tick.ts + replacement test surface)
            # plus a kit-contribution edge to clockworks. Build/test
            # the affected packages directly. The reckoner package's
            # test surface is the load-bearing verification.
            buildCommand: 'pnpm -w build'
            testCommand: 'pnpm -w test'
      # Production artificer role file — snapshotted under fixtures/
      # at X021 activation. Sean's note (2026-05-03): the artificer
      # role instructions live in vibers/roles/artificer.md, not in
      # the framework or any plugin. The framework's loom auto-loads
      # <home>/roles/<roleName>.md for every guild-configured role,
      # so for production fidelity we must ship this file into the
      # fresh test guild via files:.
      files:
        - sourcePath: ../fixtures/test-guild/roles/artificer.md
          guildPath: roles/artificer.md

  - id: daemon
    engineId: lab.daemon-setup
    dependsOn: [test-guild]
    givens: {}

scenario:
  engineId: lab.commission-post-xguild
  givens:
    briefPath: ../briefs/rig-moji64hs-baseline.md
    waitForRigTerminal: true
    timeoutMs: 3600000   # 60 min cap

probes:
  - id: context
    engineId: lab.probe-trial-context
    givens: {}
  - id: stacks
    engineId: lab.probe-stacks-dump
    givens: {}
  - id: commits
    engineId: lab.probe-git-range
    givens: {}

archive:
  engineId: lab.archive
  givens: {}

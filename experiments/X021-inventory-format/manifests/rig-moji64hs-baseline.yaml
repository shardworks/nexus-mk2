slug: x021-rig-moji64hs-baseline
title: X021 control baseline — vision-keeper deletion (verbatim spec)
codex: nexus

description: |
  Control-rig calibration baseline. The brief is the verbatim PlanDoc
  spec for w-moji63xm (vision-keeper deletion sweep) — same content the
  production implementer received in its prompt at rig-moji64hs.

  The control rig has minimal pure-read share (~1.9% in production),
  which is the H3 hypothesis: applying any of the substantive
  interventions to a rig with no read-bloat shouldn't move cost. This
  baseline anchors the H3 measurement.

  Migrated from xguild shape 2026-05-07 — see
  HANDOFF-claude-direct-migration.md.

  Codex pinned to d6e34097 — parent of first sealed commit 721c9ec.

frameworkVersion: '0.1.304'


  (rig-moj12h4o baseline ~25K chars across reckoner + clockworks types).

  Compared against rig-moj12h4o-baseline.yaml under the same doctype
  (claude-direct). Migrated from xguild shape 2026-05-07 — see
  HANDOFF-claude-direct-migration.md.


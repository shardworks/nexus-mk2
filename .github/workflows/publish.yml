name: Publish

on:
  push:
    tags: ["v*"]

# OIDC token for npm trusted publishers (+ provenance attestation).
# Also works with a classic NPM_TOKEN secret for bootstrapping new packages.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      # If NPM_TOKEN is set, use it (for bootstrapping new packages before
      # trusted publishers are configured). Otherwise, the OIDC id-token
      # permission handles auth via trusted publishers.
      - name: Publish all packages
        run: pnpm -r publish --no-git-checks --access public
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || '' }}

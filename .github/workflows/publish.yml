name: Publish

on:
  push:
    branches: [main]

# OIDC token for npm trusted publishers (+ provenance attestation).
# Also works with a classic NPM_TOKEN secret for bootstrapping new packages.
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    # Don't run on version-bump commits pushed by this workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v6
        with:
          # Need a token that can push back to main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity (needed by tests that shell out to git)
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@shardworks.dev"

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      # Read current version and fail if >= 1.0.0
      - name: Check version guard
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          if [ "$MAJOR" -ge 1 ]; then
            echo "::error::Auto-publish is disabled for stable versions (>= 1.0.0). Use a manual release process."
            exit 1
          fi
          # Bump patch: 0.1.2 -> 0.1.3
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEW_VERSION"

      # Update version in all package.json files
      - name: Bump version
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"
          # Update root package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # Update all workspace package.json files
          for f in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$f', 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync('$f', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      # Rebuild so dist/ has the new version if any package embeds it
      - run: pnpm build

      # Publish all packages
      - name: Publish all packages
        run: pnpm -r publish --no-git-checks --access public
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || '' }}

      # Commit version bump back to main
      - name: Commit version bump
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin main --tags
